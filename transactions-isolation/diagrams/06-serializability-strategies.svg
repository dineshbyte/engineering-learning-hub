<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" font-family="sans-serif">
  <defs>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .ax{stroke:#444;stroke-width:1.4}
      .curve{stroke:#1f4e79;stroke-width:2.6;fill:none}
      .grow{fill:#dbe7f3;opacity:0.6}
      .shrink{fill:#f3e3d6;opacity:0.6}
      .lbl{font-size:11.5px;fill:#222}
      .cap{font-size:11px;fill:#555}
      .dash{stroke:#b00000;stroke-width:1.8;stroke-dasharray:5 4}
      .sbox{fill:#f5f5f3;stroke:#999;stroke-width:1.3}
      .sT{font-size:12.5px;font-weight:bold;fill:#111}
      .sS{font-size:10.5px;fill:#555}
    </style>
  </defs>
  <rect width="980" height="520" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" class="title">Two-phase locking: grow, then shrink</text>

  <!-- shaded phases -->
  <rect class="grow" x="92" y="240" width="268" height="162"/>
  <rect class="shrink" x="360" y="240" width="180" height="162"/>

  <!-- axes -->
  <line class="ax" x1="92" y1="100" x2="92" y2="402"/>
  <line class="ax" x1="92" y1="402" x2="600" y2="402"/>
  <text x="84" y="406" text-anchor="end" class="cap">0</text>
  <text x="84" y="336" text-anchor="end" class="cap">1</text>
  <text x="84" y="266" text-anchor="end" class="cap">2</text>
  <text x="60" y="250" class="cap" transform="rotate(-90 60 250)">locks held</text>
  <text x="346" y="424" text-anchor="middle" class="cap">time →</text>

  <!-- staircase -->
  <polyline class="curve" points="92,402 160,402 160,332 250,332 250,262 360,262 360,332 450,332 450,402 540,402"/>

  <text x="150" y="324" class="lbl">acquire A</text>
  <text x="252" y="254" class="lbl">acquire B</text>
  <text x="300" y="252" class="lbl" fill="#1f7a1f">● COMMIT</text>
  <text x="368" y="326" class="lbl">release B</text>
  <text x="458" y="396" class="lbl">release A</text>

  <line class="dash" x1="360" y1="240" x2="360" y2="402"/>
  <text x="364" y="232" class="cap" fill="#b00000">first release — no lock taken after this</text>

  <text x="200" y="392" text-anchor="middle" class="h">GROWING</text>
  <text x="450" y="392" text-anchor="middle" class="h">SHRINKING</text>

  <!-- side: 3 strategies -->
  <line x1="640" y1="60" x2="640" y2="470" stroke="#dcdcdc"/>
  <text x="810" y="80" text-anchor="middle" class="h">three ways to be serializable</text>
  <rect class="sbox" x="670" y="100" width="280" height="86" rx="6"/>
  <text x="686" y="124" class="sT">Serial execution</text>
  <text x="686" y="146" class="sS">no concurrency — one transaction at a time</text>
  <text x="686" y="164" class="sS">(single thread; VoltDB, Redis)</text>
  <rect class="sbox" x="670" y="200" width="280" height="86" rx="6"/>
  <text x="686" y="224" class="sT">Two-phase locking (2PL)</text>
  <text x="686" y="246" class="sS">pessimistic — lock and wait</text>
  <text x="686" y="264" class="sS">deadlocks possible; the chart at left</text>
  <rect class="sbox" x="670" y="300" width="280" height="86" rx="6"/>
  <text x="686" y="324" class="sT">Serializable Snapshot Isolation</text>
  <text x="686" y="346" class="sS">optimistic — run on a snapshot,</text>
  <text x="686" y="364" class="sS">detect read-write conflicts, abort the loser</text>

  <text x="810" y="430" text-anchor="middle" class="cap">spectrum: forbid concurrency → block → allow-then-abort</text>
</svg>
