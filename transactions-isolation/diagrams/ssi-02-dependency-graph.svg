<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" font-family="sans-serif">
  <defs>
    <marker id="sg1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <marker id="sgr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b00000"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .node{fill:#eef1f4;stroke:#444;stroke-width:1.6}
      .nodeT{font-size:14px;font-weight:bold;fill:#111}
      .edge{stroke:#444;stroke-width:1.8;fill:none}
      .edgeR{stroke:#b00000;stroke-width:2;fill:none}
      .lbl{font-size:12px;font-weight:bold;fill:#111}
      .lblR{font-size:12px;font-weight:bold;fill:#b00000}
      .desc{font-size:10.5px;fill:#555}
      .hd{font-size:13px;font-weight:bold;fill:#111}
      .ok{font-size:12px;font-weight:bold;fill:#1f7a1f}
      .no{font-size:12px;font-weight:bold;fill:#b00000}
      .panel{fill:#fafbfc;stroke:#dde2e8;stroke-width:1.2}
    </style>
  </defs>
  <rect width="1040" height="560" fill="#ffffff"/>
  <text x="520" y="28" text-anchor="middle" class="title">Three dependency edges — and serializable ⟺ the graph has no cycle</text>

  <!-- three edge types -->
  <rect class="panel" x="30" y="50" width="610" height="300" rx="10"/>
  <text x="335" y="76" text-anchor="middle" class="hd">The edges: "must come before"</text>

  <!-- wr -->
  <circle class="node" cx="110" cy="140" r="26"/><text x="110" y="145" text-anchor="middle" class="nodeT">T1</text>
  <circle class="node" cx="300" cy="140" r="26"/><text x="300" y="145" text-anchor="middle" class="nodeT">T2</text>
  <line class="edge" x1="138" y1="140" x2="272" y2="140" marker-end="url(#sg1)"/>
  <text x="205" y="130" text-anchor="middle" class="lbl">wr</text>
  <text x="360" y="132" class="desc">T1 writes x,</text><text x="360" y="148" class="desc">T2 reads that version.</text>

  <!-- ww -->
  <circle class="node" cx="110" cy="220" r="26"/><text x="110" y="225" text-anchor="middle" class="nodeT">T1</text>
  <circle class="node" cx="300" cy="220" r="26"/><text x="300" y="225" text-anchor="middle" class="nodeT">T2</text>
  <line class="edge" x1="138" y1="220" x2="272" y2="220" marker-end="url(#sg1)"/>
  <text x="205" y="210" text-anchor="middle" class="lbl">ww</text>
  <text x="360" y="212" class="desc">T1's version of x is</text><text x="360" y="228" class="desc">overwritten by T2.</text>

  <!-- rw -->
  <circle class="node" cx="110" cy="300" r="26" fill="#fbeaea" stroke="#b00000"/><text x="110" y="305" text-anchor="middle" class="nodeT">T1</text>
  <circle class="node" cx="300" cy="300" r="26" fill="#fbeaea" stroke="#b00000"/><text x="300" y="305" text-anchor="middle" class="nodeT">T2</text>
  <line class="edgeR" x1="138" y1="300" x2="272" y2="300" marker-end="url(#sgr)"/>
  <text x="205" y="290" text-anchor="middle" class="lblR">rw</text>
  <text x="360" y="286" class="desc" fill="#b00000">T1 reads OLD x; T2 writes a</text><text x="360" y="302" class="desc" fill="#b00000">NEWER x T1 didn't see →</text><text x="360" y="318" class="desc" fill="#b00000">T1 before T2. SI can't stop it.</text>

  <!-- acyclic vs cyclic -->
  <rect class="panel" x="660" y="50" width="350" height="300" rx="10"/>
  <text x="835" y="76" text-anchor="middle" class="hd">The rule</text>

  <!-- acyclic -->
  <circle class="node" cx="720" cy="140" r="22"/><text x="720" y="145" text-anchor="middle" class="nodeT" font-size="12">A</text>
  <circle class="node" cx="835" cy="140" r="22"/><text x="835" y="145" text-anchor="middle" class="nodeT" font-size="12">B</text>
  <circle class="node" cx="950" cy="140" r="22"/><text x="950" y="145" text-anchor="middle" class="nodeT" font-size="12">C</text>
  <line class="edge" x1="742" y1="140" x2="813" y2="140" marker-end="url(#sg1)"/>
  <line class="edge" x1="857" y1="140" x2="928" y2="140" marker-end="url(#sg1)"/>
  <text x="835" y="186" text-anchor="middle" class="ok">acyclic → serial order A,B,C ✓</text>

  <!-- cyclic -->
  <circle class="node" cx="760" cy="252" r="22" fill="#fbeaea" stroke="#b00000"/><text x="760" y="257" text-anchor="middle" class="nodeT" font-size="12">A</text>
  <circle class="node" cx="910" cy="252" r="22" fill="#fbeaea" stroke="#b00000"/><text x="910" y="257" text-anchor="middle" class="nodeT" font-size="12">B</text>
  <line class="edgeR" x1="782" y1="244" x2="888" y2="244" marker-end="url(#sgr)"/>
  <line class="edgeR" x1="888" y1="262" x2="782" y2="262" marker-end="url(#sgr)"/>
  <text x="835" y="300" text-anchor="middle" class="no">cycle → no serial order ✗</text>
  <text x="835" y="320" text-anchor="middle" class="desc">"A before B AND B before A"</text>

  <rect x="120" y="380" width="800" height="150" rx="10" fill="#f6f7f6" stroke="#ddd"/>
  <text x="520" y="408" text-anchor="middle" class="title" font-size="13">A history is serializable if and only if its dependency graph is acyclic.</text>
  <text x="140" y="440" class="desc">• SI already blocks ww and cross-transaction wr cycles (first-committer-wins; you only read committed snapshot versions).</text>
  <text x="140" y="464" class="desc">• So the ONLY way an SI history goes non-serializable is a cycle built from rw-antidependencies — the red edge above.</text>
  <text x="140" y="488" class="ok" font-size="12">That narrows the entire detection problem to: watch the rw-edges.</text>
  <text x="140" y="512" class="desc">Adya 1999 · Bernstein/Hadzilacos/Goodman — multiversion serialization graph.</text>
</svg>
