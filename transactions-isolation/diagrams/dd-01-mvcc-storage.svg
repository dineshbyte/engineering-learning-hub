<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 540" font-family="sans-serif">
  <defs>
    <marker id="au1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .heap{fill:none;stroke:#bbb;stroke-width:1.4;stroke-dasharray:5 4}
      .live{fill:#dff0e3;stroke:#1f7a1f;stroke-width:1.5}
      .dead{fill:#f0f0f0;stroke:#aaa;stroke-width:1.2}
      .row{fill:#dbe7f3;stroke:#2a6099;stroke-width:1.5}
      .undo{fill:#fde7d6;stroke:#b06000;stroke-width:1.3}
      .tT{font-size:11px;font-weight:bold;fill:#111}
      .dT{font-size:11px;fill:#999}
      .sub{font-size:10px;fill:#555}
      .mono{font-size:10px;font-family:monospace;fill:#222}
      .arr{stroke:#555;stroke-width:1.5;fill:none}
    </style>
  </defs>
  <rect width="1020" height="540" fill="#ffffff"/>
  <text x="510" y="26" text-anchor="middle" class="title">Two MVCC storage models, opposite choices</text>
  <line x1="510" y1="46" x2="510" y2="500" stroke="#dcdcdc"/>

  <!-- POSTGRES -->
  <text x="250" y="72" text-anchor="middle" class="h">PostgreSQL — append into the heap</text>
  <rect class="heap" x="40" y="90" width="420" height="180" rx="6"/><text x="56" y="108" class="sub">table heap (row id = 1)</text>
  <rect class="dead" x="60" y="120" width="380" height="36" rx="4"/><text x="74" y="138" class="dT">val = A</text><text x="200" y="142" class="mono">xmin 100 · xmax 150   (dead)</text>
  <rect class="dead" x="60" y="162" width="380" height="36" rx="4"/><text x="74" y="180" class="dT">val = B</text><text x="200" y="184" class="mono">xmin 150 · xmax 200   (dead)</text>
  <rect class="live" x="60" y="204" width="380" height="36" rx="4"/><text x="74" y="222" class="tT">val = C</text><text x="200" y="226" class="mono">xmin 200 · xmax —    (live)</text>
  <text x="40" y="310" class="sub">UPDATE inserts a NEW tuple and stamps the old one's xmax.</text>
  <text x="40" y="330" class="sub">Both versions sit in the heap; dead tuples wait for <tspan font-weight="bold">VACUUM</tspan>.</text>
  <text x="40" y="354" class="sub" fill="#1f7a1f">+ latest row read in place · simple rollback</text>
  <text x="40" y="374" class="sub" fill="#b00000">− table bloats; needs VACUUM</text>

  <!-- INNODB -->
  <text x="760" y="72" text-anchor="middle" class="h">InnoDB — in-place + undo log</text>
  <rect class="row" x="560" y="110" width="400" height="44" rx="5"/><text x="576" y="130" class="tT">id=1 · val = C  (current, in place)</text><text x="576" y="146" class="mono">DB_TRX_ID 200 · DB_ROLL_PTR →</text>
  <rect class="undo" x="600" y="186" width="320" height="34" rx="4"/><text x="616" y="207" class="mono">undo: val = B  (by txn 150)</text>
  <rect class="undo" x="600" y="232" width="320" height="34" rx="4"/><text x="616" y="253" class="mono">undo: val = A  (by txn 100)</text>
  <line class="arr" x1="760" y1="154" x2="760" y2="184" marker-end="url(#au1)"/>
  <line class="arr" x1="760" y1="220" x2="760" y2="230" marker-end="url(#au1)"/>
  <text x="940" y="207" class="sub">undo</text><text x="940" y="222" class="sub">chain</text>
  <text x="560" y="310" class="sub">Row updated IN PLACE; the previous version goes to the undo log.</text>
  <text x="560" y="330" class="sub">Read an old version = walk the undo chain backward; <tspan font-weight="bold">purge</tspan> cleans it.</text>
  <text x="560" y="354" class="sub" fill="#1f7a1f">+ table stays compact</text>
  <text x="560" y="374" class="sub" fill="#b00000">− old-version reads pay to walk undo; long readers grow undo</text>

  <rect x="120" y="440" width="780" height="44" rx="8" fill="#f6f7f6" stroke="#ddd"/>
  <text x="510" y="462" text-anchor="middle" class="h">Same snapshot-isolation guarantee — but Postgres keeps history in the table, InnoDB in an undo log.</text>
  <text x="510" y="479" text-anchor="middle" class="sub">That one choice decides how reads, cleanup, and the 3 a.m. page all behave.</text>
</svg>
