<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 540" font-family="sans-serif">
  <defs>
    <marker id="sd1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b00000"/></marker>
    <marker id="sdg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#999"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .node{fill:#eef1f4;stroke:#444;stroke-width:1.6}
      .pivot{fill:#fff3d6;stroke:#b58a3b;stroke-width:2.6}
      .nodeT{font-size:14px;font-weight:bold;fill:#111}
      .sub{font-size:10.5px;fill:#555}
      .edgeR{stroke:#b00000;stroke-width:2.4;fill:none}
      .edgeG{stroke:#999;stroke-width:1.8;fill:none;stroke-dasharray:6 4}
      .lblR{font-size:13px;font-weight:bold;fill:#b00000}
      .hd{font-size:13px;font-weight:bold;fill:#111}
      .pin{font-size:12px;font-weight:bold;fill:#8a5a00}
    </style>
  </defs>
  <rect width="1040" height="540" fill="#ffffff"/>
  <text x="520" y="28" text-anchor="middle" class="title">The dangerous structure: two consecutive rw-edges meeting at a pivot</text>

  <!-- three nodes in a row -->
  <circle class="node" cx="180" cy="220" r="44"/><text x="180" y="218" text-anchor="middle" class="nodeT">T-in</text><text x="180" y="238" text-anchor="middle" class="sub">reads x</text>
  <circle class="pivot" cx="520" cy="220" r="52"/><text x="520" y="214" text-anchor="middle" class="nodeT">T-pivot</text><text x="520" y="234" text-anchor="middle" class="pin">in + out</text>
  <circle class="node" cx="860" cy="220" r="44"/><text x="860" y="214" text-anchor="middle" class="nodeT">T-out</text><text x="860" y="234" text-anchor="middle" class="sub">commits first</text>

  <!-- rw edges -->
  <line class="edgeR" x1="226" y1="216" x2="466" y2="216" marker-end="url(#sd1)"/>
  <text x="346" y="200" text-anchor="middle" class="lblR">rw →</text>
  <text x="346" y="248" text-anchor="middle" class="sub">T-in didn't see pivot's write</text>

  <line class="edgeR" x1="574" y1="216" x2="814" y2="216" marker-end="url(#sd1)"/>
  <text x="694" y="200" text-anchor="middle" class="lblR">rw →</text>
  <text x="694" y="248" text-anchor="middle" class="sub">pivot didn't see out's write</text>

  <!-- the closing edge (maybe) -->
  <path class="edgeG" d="M 820 250 Q 520 400 220 250" marker-end="url(#sdg)"/>
  <text x="520" y="368" text-anchor="middle" class="sub" fill="#777">…some path back closes a cycle (or doesn't — see below)</text>

  <!-- pivot callout -->
  <rect x="420" y="296" width="200" height="40" rx="8" fill="#fff8e8" stroke="#b58a3b"/>
  <text x="520" y="313" text-anchor="middle" class="pin">the pivot has BOTH</text>
  <text x="520" y="329" text-anchor="middle" class="sub">an inbound and an outbound rw-edge</text>

  <rect x="80" y="406" width="880" height="118" rx="10" fill="#f6f7f6" stroke="#ddd"/>
  <text x="520" y="434" text-anchor="middle" class="title" font-size="13">Fekete's theorem (2005): every non-serializable SI history contains this exact shape.</text>
  <text x="100" y="464" class="sub">• You never need the whole graph — just spot one transaction that is the meeting point of two rw-edges. Break any of the three and the cycle can't form.</text>
  <text x="100" y="488" class="sub">• NECESSARY but NOT sufficient: the pattern appears in every anomaly — and also in some perfectly serializable histories (the back-path runs the other way).</text>
  <text x="100" y="512" class="lblR" font-size="12">A detector that aborts on the pattern is therefore conservative — it catches every anomaly AND some innocents.</text>
</svg>
