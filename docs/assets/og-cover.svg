<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171636"/>
      <stop offset="1" stop-color="#0c2a27"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b54e6"/>
      <stop offset="1" stop-color="#0f8a7e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="2" y="2" width="1196" height="626" rx="22" fill="none" stroke="#2c3a52" stroke-width="2"/>

  <!-- brand row -->
  <g transform="translate(72,74)">
    <rect width="56" height="56" rx="13" fill="url(#logo)"/>
    <g fill="#ffffff">
      <rect x="13" y="13" width="13" height="13" rx="3"/><rect x="30" y="13" width="13" height="13" rx="3"/>
      <rect x="13" y="30" width="13" height="13" rx="3"/><rect x="30" y="30" width="13" height="13" rx="3"/>
    </g>
    <text x="76" y="38" font-size="26" letter-spacing="3" fill="#9fb0c8" font-weight="bold">STACKDEPTH</text>
  </g>

  <!-- headline -->
  <text x="72" y="270" font-size="74" font-weight="bold" fill="#ffffff">System design &amp; AI engineering,</text>
  <text x="72" y="352" font-size="74" font-weight="bold" fill="#9fe7da">from first principles.</text>

  <!-- tagline -->
  <text x="72" y="416" font-size="30" fill="#c4cfdd">Visual-first lessons · interactive quizzes · interview panels · cheat sheets</text>

  <!-- 9 track accent chips -->
  <g transform="translate(72,470)">
    <rect x="0"   y="0" width="120" height="34" rx="17" fill="#5b54e6"/><text x="60"   y="23" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">AI Agents</text>
    <rect x="130" y="0" width="104" height="34" rx="17" fill="#b5179e"/><text x="182"  y="23" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">Context</text>
    <rect x="244" y="0" width="78"  height="34" rx="17" fill="#1f77d0"/><text x="283"  y="23" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">REST</text>
    <rect x="332" y="0" width="82"  height="34" rx="17" fill="#0f8a7e"/><text x="373"  y="23" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">Bloom</text>
    <rect x="424" y="0" width="132" height="34" rx="17" fill="#c2700f"/><text x="490"  y="23" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">Distributed</text>
    <rect x="566" y="0" width="100" height="34" rx="17" fill="#2f8a4e"/><text x="616"  y="23" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">Storage</text>
    <rect x="676" y="0" width="74"  height="34" rx="17" fill="#8a3fbf"/><text x="713"  y="23" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">Txns</text>
    <rect x="760" y="0" width="116" height="34" rx="17" fill="#d6455d"/><text x="818"  y="23" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">Streaming</text>
    <rect x="886" y="0" width="86"  height="34" rx="17" fill="#0e7c98"/><text x="929"  y="23" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">Design</text>
  </g>

  <!-- footer line -->
  <text x="72" y="582" font-size="24" fill="#7f8fa6">dineshbyte.github.io/engineering-learning-hub</text>
  <text x="1128" y="582" text-anchor="end" font-size="24" fill="#9fe7da" font-weight="bold">★ open source · MIT</text>
</svg>
