<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171636"/>
      <stop offset="1" stop-color="#0c2a27"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b54e6"/>
      <stop offset="1" stop-color="#0f8a7e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="2" y="2" width="1196" height="626" rx="22" fill="none" stroke="#2c3a52" stroke-width="2"/>

  <!-- brand row -->
  <g transform="translate(72,70)">
    <rect width="56" height="56" rx="13" fill="url(#logo)"/>
    <g fill="#ffffff">
      <rect x="13" y="13" width="13" height="13" rx="3"/><rect x="30" y="13" width="13" height="13" rx="3"/>
      <rect x="13" y="30" width="13" height="13" rx="3"/><rect x="30" y="30" width="13" height="13" rx="3"/>
    </g>
    <text x="76" y="38" font-size="27" letter-spacing="3" fill="#cdd6e3" font-weight="bold">ENGINEERING VAULT</text>
  </g>

  <!-- motto headline -->
  <text x="72" y="250" font-size="70" font-weight="bold" fill="#ffffff">Built while learning.</text>
  <text x="72" y="330" font-size="70" font-weight="bold" fill="#9fe7da">Shared so others can learn.</text>

  <!-- descriptor -->
  <text x="72" y="394" font-size="26" fill="#c4cfdd">A public vault of engineering lessons, architecture reviews &amp; AI systems notes</text>

  <!-- domain chips -->
  <g transform="translate(72,470)" font-size="16" font-weight="bold" fill="#fff">
    <rect x="0"   y="0" width="130" height="38" rx="19" fill="#5b54e6"/><text x="65"  y="24" text-anchor="middle">AI Systems</text>
    <rect x="144" y="0" width="149" height="38" rx="19" fill="#0f8a7e"/><text x="218" y="24" text-anchor="middle">Architecture</text>
    <rect x="307" y="0" width="159" height="38" rx="19" fill="#1f77d0"/><text x="386" y="24" text-anchor="middle">System Design</text>
    <rect x="480" y="0" width="245" height="38" rx="19" fill="#c2700f"/><text x="602" y="24" text-anchor="middle">Engineering Interviews</text>
    <rect x="739" y="0" width="130" height="38" rx="19" fill="#d6455d"/><text x="804" y="24" text-anchor="middle">Production</text>
  </g>

  <!-- footer line -->
  <text x="72" y="582" font-size="24" fill="#7f8fa6">dineshbyte.github.io/engineering-learning-hub</text>
  <text x="1128" y="582" text-anchor="end" font-size="24" fill="#9fe7da" font-weight="bold">free &#183; learning in public</text>
</svg>
