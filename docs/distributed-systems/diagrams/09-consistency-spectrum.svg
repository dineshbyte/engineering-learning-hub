<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="sans-serif">
  <defs>
    <marker id="ah9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:14px;font-weight:bold;fill:#111}
      .rung{font-size:13px;font-weight:bold;fill:#111}
      .sub{font-size:11px;fill:#444}
      .cap{font-size:11.5px;fill:#555}
      .nodeT{font-size:11px;font-weight:bold;fill:#111}
      .node{fill:#eee;stroke:#333;stroke-width:1.3}
      .life{stroke:#9a9a9a;stroke-width:1;stroke-dasharray:3 3}
      .msg{stroke:#222;stroke-width:1.6;fill:none}
      .mlbl{font-size:11px;fill:#333}
      .ok{font-size:11.5px;font-weight:bold;fill:#236b3c}
      .stale{font-size:11.5px;font-weight:bold;fill:#b06000}
    </style>
  </defs>
  <rect width="980" height="560" fill="#ffffff"/>
  <text x="490" y="26" text-anchor="middle" class="title">Consistency is a ladder, not a switch</text>
  <line x1="500" y1="44" x2="500" y2="540" stroke="#dcdcdc"/>

  <!-- LEFT ladder -->
  <text x="40" y="66" class="h">↑ stronger: fewer anomalies, more coordination</text>
  <rect x="60" y="430" width="380" height="44" rx="4" fill="#f3f3f3" stroke="#ccc"/>
  <text x="74" y="450" class="rung">Eventual</text><text x="74" y="467" class="sub">replicas converge once writes stop</text>
  <rect x="60" y="378" width="380" height="44" rx="4" fill="#e9eef2" stroke="#bcc"/>
  <text x="74" y="398" class="rung">Session guarantees</text><text x="74" y="415" class="sub">read-your-writes, monotonic reads (per client)</text>
  <rect x="60" y="326" width="380" height="44" rx="4" fill="#dde7ee" stroke="#abc"/>
  <text x="74" y="346" class="rung">Causal</text><text x="74" y="363" class="sub">happens-before preserved; concurrent writes free</text>
  <rect x="60" y="274" width="380" height="44" rx="4" fill="#c8d8e6" stroke="#89a"/>
  <text x="74" y="294" class="rung">Linearizable</text><text x="74" y="311" class="sub">one real-time copy, single object</text>
  <rect x="60" y="222" width="380" height="44" rx="4" fill="#b6c9da" stroke="#789" stroke-dasharray="5 4"/>
  <text x="74" y="242" class="rung">Strict serializable</text><text x="74" y="259" class="sub">linearizable + multi-object transactions</text>

  <!-- CAP boundary -->
  <line x1="56" y1="322" x2="446" y2="322" stroke="#b00000" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="470" y="322" text-anchor="middle" class="cap" fill="#b00000" transform="rotate(-90 470 322)">CAP boundary</text>
  <text x="250" y="210" text-anchor="middle" class="cap">↑ CP: sacrifices availability under partition</text>
  <text x="250" y="478" text-anchor="middle" class="cap">↓ AP: stays available under partition</text>

  <!-- RIGHT examples -->
  <text x="740" y="66" text-anchor="middle" class="h">One write, then an immediate read</text>

  <!-- eventual panel -->
  <text x="640" y="96" text-anchor="middle" class="rung">Eventual</text>
  <rect class="node" x="540" y="106" width="44" height="22" rx="3"/><text x="562" y="121" text-anchor="middle" class="nodeT">Writer</text>
  <rect class="node" x="618" y="106" width="44" height="22" rx="3"/><text x="640" y="121" text-anchor="middle" class="nodeT">Repl A</text>
  <rect class="node" x="696" y="106" width="44" height="22" rx="3"/><text x="718" y="121" text-anchor="middle" class="nodeT">Repl B</text>
  <line class="life" x1="562" y1="128" x2="562" y2="250"/>
  <line class="life" x1="640" y1="128" x2="640" y2="250"/>
  <line class="life" x1="718" y1="128" x2="718" y2="250"/>
  <text x="566" y="150" class="mlbl">write x=1</text>
  <line class="msg" x1="562" y1="154" x2="636" y2="168" marker-end="url(#ah9)"/>
  <line class="msg" x1="718" y1="186" x2="566" y2="200" marker-end="url(#ah9)"/>
  <text x="600" y="184" class="stale">read x → 0 (stale, ALLOWED)</text>
  <line class="msg" x1="640" y1="206" x2="714" y2="232" stroke-dasharray="5 3" marker-end="url(#ah9)"/>
  <text x="648" y="226" class="mlbl">propagates later</text>

  <!-- linearizable panel -->
  <text x="640" y="296" text-anchor="middle" class="rung">Linearizable</text>
  <rect class="node" x="540" y="306" width="44" height="22" rx="3"/><text x="562" y="321" text-anchor="middle" class="nodeT">Writer</text>
  <rect class="node" x="618" y="306" width="44" height="22" rx="3"/><text x="640" y="321" text-anchor="middle" class="nodeT">Repl A</text>
  <rect class="node" x="696" y="306" width="44" height="22" rx="3"/><text x="718" y="321" text-anchor="middle" class="nodeT">Repl B</text>
  <line class="life" x1="562" y1="328" x2="562" y2="470"/>
  <line class="life" x1="640" y1="328" x2="640" y2="470"/>
  <line class="life" x1="718" y1="328" x2="718" y2="470"/>
  <line x1="600" y1="352" x2="600" y2="470" stroke="#999" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="566" y="350" class="mlbl">write x=1</text>
  <line class="msg" x1="562" y1="356" x2="636" y2="370" marker-end="url(#ah9)"/>
  <text x="612" y="404" class="ok">read x → 1 (REQUIRED)</text>
  <line class="msg" x1="718" y1="408" x2="606" y2="420" marker-end="url(#ah9)"/>
  <text x="606" y="452" text-anchor="middle" class="cap">no staleness window</text>

  <text x="490" y="526" text-anchor="middle" class="cap">Up the ladder removes anomalies but costs availability/latency. The starkest difference: may a read just after a write return the old value?</text>
</svg>
