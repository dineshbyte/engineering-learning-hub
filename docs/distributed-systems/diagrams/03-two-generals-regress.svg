<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" font-family="sans-serif">
  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <style>
      .title{font-size:17px;font-weight:bold;fill:#111}
      .lbl{font-size:12.5px;fill:#222}
      .cap{font-size:12.5px;fill:#444}
      .ask{font-size:12px;font-style:italic;fill:#b00000}
      .nodeT{font-size:13px;font-weight:bold;fill:#111}
      .node{fill:#eee;stroke:#333;stroke-width:1.5}
      .life{stroke:#9a9a9a;stroke-width:1;stroke-dasharray:3 3}
      .msg{stroke:#222;stroke-width:1.8;fill:none}
      .dots{font-size:22px;font-weight:bold;fill:#777}
    </style>
  </defs>

  <rect width="760" height="500" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" class="title">Two Generals: the acknowledgement regress never ends</text>

  <rect class="node" x="108" y="50" width="120" height="28" rx="4"/>
  <text x="168" y="69" text-anchor="middle" class="nodeT">General 1</text>
  <rect class="node" x="532" y="50" width="120" height="28" rx="4"/>
  <text x="592" y="69" text-anchor="middle" class="nodeT">General 2</text>
  <line class="life" x1="168" y1="78" x2="168" y2="420"/>
  <line class="life" x1="592" y1="78" x2="592" y2="420"/>

  <!-- m1 -->
  <text x="300" y="108" class="lbl">"Attack at dawn"</text>
  <line class="msg" x1="168" y1="114" x2="588" y2="134" marker-end="url(#arrow3)"/>
  <!-- m2 -->
  <text x="300" y="160" class="lbl">"Confirmed — dawn"</text>
  <line class="msg" x1="592" y1="166" x2="172" y2="186" marker-end="url(#arrow3)"/>
  <!-- m3 -->
  <text x="300" y="212" class="lbl">"Got your confirmation"</text>
  <line class="msg" x1="168" y1="218" x2="588" y2="238" marker-end="url(#arrow3)"/>
  <!-- m4 -->
  <text x="300" y="264" class="lbl">"Got your acknowledgement"</text>
  <line class="msg" x1="592" y1="270" x2="172" y2="290" marker-end="url(#arrow3)"/>

  <text x="300" y="318" class="ask">…but did THIS one get through? Send another to be sure…</text>

  <text x="168" y="356" text-anchor="middle" class="dots">⋮</text>
  <text x="592" y="356" text-anchor="middle" class="dots">⋮</text>
  <text x="380" y="360" text-anchor="middle" class="dots">∞</text>

  <text x="380" y="448" text-anchor="middle" class="cap">Every message needs its own confirmation — forever.</text>
  <text x="380" y="470" text-anchor="middle" class="cap">No finite exchange makes both sides <tspan font-style="italic">certain</tspan> they agree.</text>
</svg>
