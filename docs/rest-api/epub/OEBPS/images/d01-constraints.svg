<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 380" role="img">
  <title>The six REST architectural constraints around a central REST node</title>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif;fill:#111}
    .b{fill:#f2f2f2;stroke:#222;stroke-width:1.5}
    .ctr{fill:#222;stroke:#222;stroke-width:1.5}
    .ct{fill:#fff;font-weight:bold;font-size:15px}
    .ln{stroke:#222;stroke-width:1.4}
    .lbl{font-size:14px}
    .opt{font-size:11px;fill:#555}
  </style>
  <line class="ln" x1="310" y1="190" x2="100" y2="43"/>
  <line class="ln" x1="310" y1="190" x2="520" y2="43"/>
  <line class="ln" x1="310" y1="190" x2="100" y2="190"/>
  <line class="ln" x1="310" y1="190" x2="520" y2="190"/>
  <line class="ln" x1="310" y1="190" x2="100" y2="337"/>
  <line class="ln" x1="310" y1="190" x2="520" y2="337"/>
  <rect class="ctr" x="232" y="166" width="156" height="48" rx="8"/>
  <text class="ct" x="310" y="195" text-anchor="middle">REST = constraints</text>
  <rect class="b" x="20" y="20" width="160" height="46" rx="6"/>
  <text class="lbl" x="100" y="48" text-anchor="middle">1 · Client–Server</text>
  <rect class="b" x="440" y="20" width="160" height="46" rx="6"/>
  <text class="lbl" x="520" y="48" text-anchor="middle">2 · Stateless</text>
  <rect class="b" x="20" y="167" width="160" height="46" rx="6"/>
  <text class="lbl" x="100" y="195" text-anchor="middle">3 · Cacheable</text>
  <rect class="b" x="440" y="167" width="160" height="46" rx="6"/>
  <text class="lbl" x="520" y="195" text-anchor="middle">4 · Uniform interface</text>
  <rect class="b" x="20" y="314" width="160" height="46" rx="6"/>
  <text class="lbl" x="100" y="342" text-anchor="middle">5 · Layered system</text>
  <rect class="b" x="440" y="314" width="160" height="46" rx="6"/>
  <text class="lbl" x="520" y="338" text-anchor="middle">6 · Code-on-demand</text>
  <text class="opt" x="520" y="353" text-anchor="middle">(optional)</text>
</svg>
