<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" role="img">
  <title>Richardson Maturity Model as an ascending staircase L0 to L3</title>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif;fill:#111}
    .s{fill:#f2f2f2;stroke:#222;stroke-width:1.5}
    .lvl{font-size:15px;font-weight:bold}
    .d{font-size:12px;fill:#444}
    .ln{stroke:#222;stroke-width:1.4;fill:none}
    .note{font-size:12px;fill:#555;font-style:italic}
  </style>
  <rect class="s" x="20"  y="250" width="130" height="80"/>
  <text class="lvl" x="85"  y="278" text-anchor="middle">L0</text>
  <text class="d"   x="85"  y="298" text-anchor="middle">one URI,</text>
  <text class="d"   x="85"  y="314" text-anchor="middle">one verb (POX)</text>
  <rect class="s" x="160" y="195" width="130" height="135"/>
  <text class="lvl" x="225" y="223" text-anchor="middle">L1</text>
  <text class="d"   x="225" y="243" text-anchor="middle">resources</text>
  <text class="d"   x="225" y="259" text-anchor="middle">(many URIs)</text>
  <rect class="s" x="300" y="140" width="130" height="190"/>
  <text class="lvl" x="365" y="168" text-anchor="middle">L2</text>
  <text class="d"   x="365" y="188" text-anchor="middle">HTTP verbs +</text>
  <text class="d"   x="365" y="204" text-anchor="middle">status codes</text>
  <rect class="s" x="440" y="70"  width="150" height="260"/>
  <text class="lvl" x="515" y="98"  text-anchor="middle">L3</text>
  <text class="d"   x="515" y="118" text-anchor="middle">hypermedia</text>
  <text class="d"   x="515" y="134" text-anchor="middle">(HATEOAS)</text>
  <path class="ln" d="M30 340 L600 60" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 z" fill="#222"/></marker></defs>
  <text class="note" x="300" y="350" text-anchor="middle">most production "REST" APIs stop at L2 — a deliberate, defensible choice</text>
</svg>
