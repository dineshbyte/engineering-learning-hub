<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 410" role="img">
  <title>Async patterns: 202 Accepted with a status resource the client polls, and a signed at-least-once webhook callback</title>
  <defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 z" fill="#222"/></marker></defs>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif;fill:#111}
    .hd{fill:#222} .ht{fill:#fff;font-weight:bold;font-size:13px}
    .life{stroke:#888;stroke-width:1.2;stroke-dasharray:4 4}
    .msg{stroke:#222;stroke-width:1.4;fill:none}
    .m{font-size:12px} .sec{font-size:12px;fill:#555;font-style:italic}
  </style>
  <rect class="hd" x="55"  y="14" width="120" height="30" rx="5"/><text class="ht" x="115" y="34" text-anchor="middle">Client</text>
  <rect class="hd" x="445" y="14" width="120" height="30" rx="5"/><text class="ht" x="505" y="34" text-anchor="middle">Server</text>
  <line class="life" x1="115" y1="44" x2="115" y2="402"/>
  <line class="life" x1="505" y1="44" x2="505" y2="402"/>
  <text class="sec" x="20" y="68">A · Async request–reply (poll)</text>
  <line class="msg" x1="115" y1="88"  x2="505" y2="88"  marker-end="url(#ar)"/><text class="m" x="125" y="82">POST /exports</text>
  <line class="msg" x1="505" y1="116" x2="115" y2="116" marker-end="url(#ar)"/><text class="m" x="160" y="110">202 Accepted · Location: /exports/{id}</text>
  <line class="msg" x1="115" y1="148" x2="505" y2="148" marker-end="url(#ar)"/><text class="m" x="125" y="142">GET /exports/{id}</text>
  <line class="msg" x1="505" y1="176" x2="115" y2="176" marker-end="url(#ar)"/><text class="m" x="170" y="170">200 · status: running …then succeeded + result link</text>
  <line x1="0" y1="206" x2="620" y2="206" stroke="#ccc"/>
  <text class="sec" x="20" y="234">B · Webhook callback (push)</text>
  <line class="msg" x1="505" y1="264" x2="115" y2="264" marker-end="url(#ar)"/><text class="m" x="150" y="258">POST callback · event + HMAC signature</text>
  <line class="msg" x1="115" y1="292" x2="505" y2="292" marker-end="url(#ar)"/><text class="m" x="160" y="286">2xx ack (fast) — then process async</text>
  <text class="m" x="20" y="328">Delivery is at-least-once and unordered, so the consumer must:</text>
  <text class="m" x="34" y="350">• be idempotent — dedupe on event id</text>
  <text class="m" x="34" y="370">• verify the signature + reject stale timestamps (replay)</text>
  <text class="m" x="34" y="390">• expect retries with backoff → dead-letter on give-up</text>
</svg>
