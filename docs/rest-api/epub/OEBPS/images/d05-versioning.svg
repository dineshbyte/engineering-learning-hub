<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 330" role="img">
  <title>API evolution: additive non-breaking changes on v1, then a breaking change forks v2 while v1 is deprecated and sunset</title>
  <defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 z" fill="#222"/></marker></defs>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif;fill:#111}
    .trk{stroke:#222;stroke-width:2;fill:none}
    .tick{stroke:#222;stroke-width:1.4}
    .v{font-size:14px;font-weight:bold}
    .n{font-size:11px;fill:#444} .g{font-size:11px;fill:#777}
    .star{fill:#222}
  </style>
  <text class="v" x="20" y="86">v1</text>
  <path class="trk" d="M50 100 L470 100"/>
  <line class="tick" x1="120" y1="92" x2="120" y2="108"/><text class="n" x="120" y="84" text-anchor="middle">+optional field</text>
  <line class="tick" x1="220" y1="92" x2="220" y2="108"/><text class="n" x="220" y="84" text-anchor="middle">+endpoint</text>
  <line class="tick" x1="320" y1="92" x2="320" y2="108"/><text class="n" x="320" y="84" text-anchor="middle">+response field</text>
  <text class="g" x="60" y="126">additive · non-breaking · tolerant readers ignore unknown fields → no version bump</text>
  <polygon class="star" points="470,90 476,102 489,103 479,112 482,125 470,118 458,125 461,112 451,103 464,102"/>
  <text class="n" x="470" y="148" text-anchor="middle">breaking change</text>
  <path class="trk" d="M470 100 C 510 100, 510 210, 550 210" stroke-dasharray="0"/>
  <text class="v" x="20" y="216">v2</text>
  <path class="trk" d="M150 210 L550 210"/>
  <text class="g" x="160" y="200">new major version (e.g. date-based); existing clients pinned to v1</text>
  <path class="trk" d="M470 100 L470 250" stroke-dasharray="5 4"/>
  <path class="trk" d="M470 250 L560 250" marker-end="url(#ar)"/>
  <text class="n" x="475" y="270">v1 continues, now Deprecation + Sunset headers (RFC 8594)</text>
  <text class="g" x="475" y="288">→ migration guide, generous window, monitor usage, then retire</text>
</svg>
