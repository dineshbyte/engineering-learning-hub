<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="sans-serif">
  <defs>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .tri{fill:#f6f8fb;stroke:#9aa9c0;stroke-width:1.6}
      .corner{font-size:13px;font-weight:bold;fill:#26356b}
      .cs{font-size:10.5px;fill:#555}
      .dot{stroke:#222;stroke-width:1}
      .pt{font-size:12px;font-weight:bold;fill:#111}
      .cap{font-size:11.5px;fill:#555}
    </style>
  </defs>
  <rect width="900" height="560" fill="#ffffff"/>
  <text x="450" y="28" text-anchor="middle" class="title">The amplification trade-off: pick two corners, the third suffers</text>

  <polygon class="tri" points="450,90 150,440 750,440"/>

  <!-- corners -->
  <circle cx="450" cy="90" r="6" fill="#2a6099"/>
  <text x="450" y="74" text-anchor="middle" class="corner">low READ amp</text>
  <text x="450" y="58" text-anchor="middle" class="cs">fast lookups</text>
  <circle cx="150" cy="440" r="6" fill="#2a6099"/>
  <text x="150" y="468" text-anchor="middle" class="corner">low WRITE amp</text>
  <text x="150" y="484" text-anchor="middle" class="cs">cheap ingest, flash-friendly</text>
  <circle cx="750" cy="440" r="6" fill="#2a6099"/>
  <text x="750" y="468" text-anchor="middle" class="corner">low SPACE amp</text>
  <text x="750" y="484" text-anchor="middle" class="cs">tight disk usage</text>

  <!-- strategy points -->
  <circle class="dot" cx="560" cy="250" r="9" fill="#1f7a1f"/><text x="576" y="248" class="pt" fill="#1f7a1f">Leveled (LCS)</text><text x="576" y="264" class="cs">low read + low space · pays WRITE</text>
  <circle class="dot" cx="270" cy="360" r="9" fill="#b06000"/><text x="190" y="340" class="pt" fill="#b06000">Size-tiered (STCS)</text><text x="160" y="324" class="cs">low write · pays READ + SPACE</text>
  <circle class="dot" cx="470" cy="370" r="8" fill="#6b4fa0"/><text x="486" y="368" class="pt" fill="#52407e">TWCS</text><text x="486" y="383" class="cs">time-series: whole old buckets drop</text>

  <rect x="180" y="510" width="540" height="34" rx="8" fill="#f6f7f6" stroke="#ddd"/>
  <text x="450" y="532" text-anchor="middle" class="cap">RUM conjecture (Athanassoulis et al. 2016): you optimize Read, Update, or Memory — at most two at once.</text>
</svg>
