<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="sans-serif">
  <defs>
    <marker id="aa4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#666"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .hb{fill:#dce8f3;stroke:#2a6099;stroke-width:1.5}
      .ha{fill:#f6ead2;stroke:#b58a3b;stroke-width:1.5}
      .hT{font-size:13px;font-weight:bold;fill:#111}
      .rl{font-size:12px;font-weight:bold;fill:#333}
      .sev{font-size:11px;font-weight:bold}
      .grid{stroke:#ddd;stroke-width:1}
      .inset{fill:#fafafa;stroke:#ccc;stroke-width:1.2}
      .insT{font-size:11.5px;font-weight:bold;fill:#111}
      .small{font-size:10px;fill:#555}
      .slot{fill:#eee;stroke:#888;stroke-width:1}
      .slotHi{fill:#ffd9a0;stroke:#b58a3b;stroke-width:1.4}
      .bar{stroke:#777;stroke-width:1;fill:none}
    </style>
  </defs>
  <rect width="980" height="560" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" class="title">B-tree vs LSM-tree: the amplification trade-off</text>

  <!-- headers -->
  <rect class="hb" x="250" y="56" width="150" height="34" rx="5"/><text x="325" y="78" text-anchor="middle" class="hT">B-TREE</text>
  <rect class="ha" x="420" y="56" width="150" height="34" rx="5"/><text x="495" y="78" text-anchor="middle" class="hT">LSM-TREE</text>

  <!-- row labels -->
  <text x="40" y="140" class="rl">Read amplification</text>
  <text x="40" y="240" class="rl">Write amplification</text>
  <text x="40" y="340" class="rl">Space amplification</text>
  <line class="grid" x1="40" y1="160" x2="580" y2="160"/>
  <line class="grid" x1="40" y1="260" x2="580" y2="260"/>
  <line class="grid" x1="40" y1="360" x2="580" y2="360"/>

  <!-- meters: helper bars 3-wide. green=#2f8a4e amber=#cf8a2a red=#c0392b -->
  <!-- Read: B LOW(green1), LSM HIGH(red3) -->
  <g>
    <rect x="290" y="118" width="18" height="20" fill="#2f8a4e" stroke="#777"/><rect x="312" y="118" width="18" height="20" fill="#eee" stroke="#777"/><rect x="334" y="118" width="18" height="20" fill="#eee" stroke="#777"/>
    <text x="356" y="134" class="sev" fill="#2f8a4e">LOW</text>
    <rect x="460" y="118" width="18" height="20" fill="#c0392b" stroke="#777"/><rect x="482" y="118" width="18" height="20" fill="#c0392b" stroke="#777"/><rect x="504" y="118" width="18" height="20" fill="#c0392b" stroke="#777"/>
    <text x="526" y="134" class="sev" fill="#c0392b">HIGH</text>
  </g>
  <!-- Write: B HIGH(orange3), LSM LOW(green1) -->
  <g>
    <rect x="290" y="218" width="18" height="20" fill="#cf8a2a" stroke="#777"/><rect x="312" y="218" width="18" height="20" fill="#cf8a2a" stroke="#777"/><rect x="334" y="218" width="18" height="20" fill="#cf8a2a" stroke="#777"/>
    <text x="356" y="234" class="sev" fill="#cf8a2a">HIGH</text>
    <rect x="460" y="218" width="18" height="20" fill="#2f8a4e" stroke="#777"/><rect x="482" y="218" width="18" height="20" fill="#eee" stroke="#777"/><rect x="504" y="218" width="18" height="20" fill="#eee" stroke="#777"/>
    <text x="526" y="234" class="sev" fill="#2f8a4e">LOW</text>
  </g>
  <!-- Space: B LOW(green1), LSM MEDIUM(amber2) -->
  <g>
    <rect x="290" y="318" width="18" height="20" fill="#2f8a4e" stroke="#777"/><rect x="312" y="318" width="18" height="20" fill="#eee" stroke="#777"/><rect x="334" y="318" width="18" height="20" fill="#eee" stroke="#777"/>
    <text x="356" y="334" class="sev" fill="#2f8a4e">LOW</text>
    <rect x="460" y="318" width="18" height="20" fill="#cf8a2a" stroke="#777"/><rect x="482" y="318" width="18" height="20" fill="#cf8a2a" stroke="#777"/><rect x="504" y="318" width="18" height="20" fill="#eee" stroke="#777"/>
    <text x="526" y="334" class="sev" fill="#cf8a2a">MED</text>
  </g>
  <text x="310" y="392" text-anchor="middle" class="small">wins reads + space</text>
  <text x="495" y="392" text-anchor="middle" class="small">wins writes</text>

  <!-- INSETS -->
  <line x1="610" y1="50" x2="610" y2="470" stroke="#dcdcdc"/>
  <rect class="inset" x="630" y="70" width="320" height="150" rx="6"/>
  <text x="646" y="92" class="insT">B-tree write: rewrite page in place</text>
  <rect x="700" y="108" width="160" height="40" rx="3" fill="#eef1f4" stroke="#666"/>
  <rect class="slot" x="700" y="108" width="26" height="40"/><rect class="slotHi" x="726" y="108" width="26" height="40"/><rect class="slot" x="752" y="108" width="26" height="40"/><rect class="slot" x="778" y="108" width="26" height="40"/><rect class="slot" x="804" y="108" width="26" height="40"/><rect class="slot" x="830" y="108" width="30" height="40"/>
  <text x="780" y="170" text-anchor="middle" class="small">whole 4 KB page rewritten (one key changed)</text>
  <text x="646" y="170" class="small">WAL →</text><text x="646" y="200" class="small">written twice</text>

  <rect class="inset" x="630" y="240" width="320" height="160" rx="6"/>
  <text x="646" y="262" class="insT">LSM write: append now, compact later</text>
  <rect x="646" y="276" width="110" height="32" rx="4" fill="#eaf2fb" stroke="#2a6099"/><text x="701" y="296" text-anchor="middle" class="small">memtable</text>
  <text x="646" y="324" class="small" fill="#2f8a4e">append (fast)</text>
  <rect x="780" y="276" width="150" height="14" fill="#f0ead8" stroke="#999"/><text x="936" y="287" class="small" text-anchor="end">L0</text>
  <rect x="780" y="296" width="150" height="14" fill="#f0ead8" stroke="#999"/>
  <rect x="780" y="316" width="150" height="14" fill="#f0ead8" stroke="#999"/><rect x="800" y="318" width="20" height="10" fill="#ddd"/><text x="824" y="327" class="small" fill="#999">stale copy</text>
  <line x1="855" y1="290" x2="855" y2="372" stroke="#999" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#aa4)"/>
  <text x="700" y="368" class="small">compaction (later) merges + rewrites</text>

  <rect x="40" y="500" width="910" height="40" rx="8" fill="#f3f6f3" stroke="#cdd9cd"/>
  <text x="495" y="525" text-anchor="middle" class="hT">Write-heavy → LSM     ·     Read-heavy / predictable latency → B-tree</text>
</svg>
