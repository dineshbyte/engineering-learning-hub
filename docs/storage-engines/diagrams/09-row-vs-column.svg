<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="sans-serif">
  <defs>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .cell{fill:#f4f4f2;stroke:#999;stroke-width:1}
      .hot{fill:#ffe0b3;stroke:#b06000;stroke-width:1.2}
      .cold{fill:#eeeeee;stroke:#ccc;stroke-width:1}
      .v{font-size:9.5px;fill:#222;font-family:monospace}
      .vc{font-size:9.5px;fill:#999;font-family:monospace}
      .rl{font-size:10px;fill:#666;font-family:monospace}
      .cap{font-size:11px;fill:#555}
      .bracket{stroke:#b06000;stroke-width:1.5;fill:none}
      .hotT{font-size:11px;font-weight:bold;fill:#a6601a}
    </style>
  </defs>
  <rect width="1000" height="600" fill="#ffffff"/>
  <text x="500" y="24" text-anchor="middle" class="title">Row vs column storage — same query, far less scanned under columnar</text>
  <text x="500" y="46" text-anchor="middle" class="cap">columns:  id · region · status · ts · qty · amount     ·     query:  SUM(amount) BY region  (reads 2 of 6)</text>
  <line x1="500" y1="60" x2="500" y2="520" stroke="#dcdcdc"/>

  <!-- ROW STORAGE -->
  <text x="250" y="84" text-anchor="middle" class="h">ROW STORAGE (good for OLTP)</text>
  <!-- 6 rows, each 6 cells: id region status ts qty amount ; shade region(2) and amount(6) -->
  <g>
    <!-- row template: x from 60, cell w 62 -->
    <!-- R1 -->
    <text x="48" y="124" text-anchor="end" class="rl">R1</text>
    <rect class="cell" x="60" y="110" width="62" height="26"/><text x="91" y="127" text-anchor="middle" class="v">1</text>
    <rect class="hot"  x="122" y="110" width="62" height="26"/><text x="153" y="127" text-anchor="middle" class="v">us-e</text>
    <rect class="cell" x="184" y="110" width="62" height="26"/><text x="215" y="127" text-anchor="middle" class="v">paid</text>
    <rect class="cell" x="246" y="110" width="62" height="26"/><text x="277" y="127" text-anchor="middle" class="v">9:01</text>
    <rect class="cell" x="308" y="110" width="62" height="26"/><text x="339" y="127" text-anchor="middle" class="v">2</text>
    <rect class="hot"  x="370" y="110" width="62" height="26"/><text x="401" y="127" text-anchor="middle" class="v">40</text>
  </g>
  <g>
    <text x="48" y="158" text-anchor="end" class="rl">R2</text>
    <rect class="cell" x="60" y="144" width="62" height="26"/><text x="91" y="161" text-anchor="middle" class="v">2</text>
    <rect class="hot"  x="122" y="144" width="62" height="26"/><text x="153" y="161" text-anchor="middle" class="v">eu-w</text>
    <rect class="cell" x="184" y="144" width="62" height="26"/><text x="215" y="161" text-anchor="middle" class="v">paid</text>
    <rect class="cell" x="246" y="144" width="62" height="26"/><text x="277" y="161" text-anchor="middle" class="v">9:02</text>
    <rect class="cell" x="308" y="144" width="62" height="26"/><text x="339" y="161" text-anchor="middle" class="v">1</text>
    <rect class="hot"  x="370" y="144" width="62" height="26"/><text x="401" y="161" text-anchor="middle" class="v">15</text>
  </g>
  <g>
    <text x="48" y="192" text-anchor="end" class="rl">R3</text>
    <rect class="cell" x="60" y="178" width="62" height="26"/><text x="91" y="195" text-anchor="middle" class="v">3</text>
    <rect class="hot"  x="122" y="178" width="62" height="26"/><text x="153" y="195" text-anchor="middle" class="v">us-e</text>
    <rect class="cell" x="184" y="178" width="62" height="26"/><text x="215" y="195" text-anchor="middle" class="v">fail</text>
    <rect class="cell" x="246" y="178" width="62" height="26"/><text x="277" y="195" text-anchor="middle" class="v">9:05</text>
    <rect class="cell" x="308" y="178" width="62" height="26"/><text x="339" y="195" text-anchor="middle" class="v">3</text>
    <rect class="hot"  x="370" y="178" width="62" height="26"/><text x="401" y="195" text-anchor="middle" class="v">60</text>
  </g>
  <g>
    <text x="48" y="226" text-anchor="end" class="rl">R4</text>
    <rect class="cell" x="60" y="212" width="62" height="26"/><text x="91" y="229" text-anchor="middle" class="v">4</text>
    <rect class="hot"  x="122" y="212" width="62" height="26"/><text x="153" y="229" text-anchor="middle" class="v">us-e</text>
    <rect class="cell" x="184" y="212" width="62" height="26"/><text x="215" y="229" text-anchor="middle" class="v">paid</text>
    <rect class="cell" x="246" y="212" width="62" height="26"/><text x="277" y="229" text-anchor="middle" class="v">9:06</text>
    <rect class="cell" x="308" y="212" width="62" height="26"/><text x="339" y="229" text-anchor="middle" class="v">1</text>
    <rect class="hot"  x="370" y="212" width="62" height="26"/><text x="401" y="229" text-anchor="middle" class="v">20</text>
  </g>
  <g>
    <text x="48" y="260" text-anchor="end" class="rl">R5</text>
    <rect class="cell" x="60" y="246" width="62" height="26"/><text x="91" y="263" text-anchor="middle" class="v">5</text>
    <rect class="hot"  x="122" y="246" width="62" height="26"/><text x="153" y="263" text-anchor="middle" class="v">eu-w</text>
    <rect class="cell" x="184" y="246" width="62" height="26"/><text x="215" y="263" text-anchor="middle" class="v">paid</text>
    <rect class="cell" x="246" y="246" width="62" height="26"/><text x="277" y="263" text-anchor="middle" class="v">9:09</text>
    <rect class="cell" x="308" y="246" width="62" height="26"/><text x="339" y="263" text-anchor="middle" class="v">4</text>
    <rect class="hot"  x="370" y="246" width="62" height="26"/><text x="401" y="263" text-anchor="middle" class="v">80</text>
  </g>
  <text x="246" y="300" text-anchor="middle" class="hotT">all 6 columns dragged off disk to read 2</text>

  <!-- COLUMN STORAGE -->
  <text x="750" y="84" text-anchor="middle" class="h">COLUMN STORAGE (good for OLAP)</text>
  <!-- 6 column blocks x from 545, w 64 -->
  <g>
    <!-- id (cold) -->
    <rect class="cold" x="545" y="100" width="56" height="170"/><text x="573" y="96" text-anchor="middle" class="rl">id</text>
    <text x="573" y="120" text-anchor="middle" class="vc">1·2·3</text><text x="573" y="138" text-anchor="middle" class="vc">4·5·6</text>
    <!-- region (HOT) -->
    <rect class="hot" x="607" y="100" width="56" height="170"/><text x="635" y="96" text-anchor="middle" class="rl">region</text>
    <text x="635" y="120" text-anchor="middle" class="v">us-e</text><text x="635" y="138" text-anchor="middle" class="v">eu-w</text><text x="635" y="156" text-anchor="middle" class="v">us-e</text><text x="635" y="174" text-anchor="middle" class="v">us-e</text><text x="635" y="192" text-anchor="middle" class="v">eu-w</text><text x="635" y="210" text-anchor="middle" class="v">ap-s</text>
    <!-- status (cold) -->
    <rect class="cold" x="669" y="100" width="56" height="170"/><text x="697" y="96" text-anchor="middle" class="rl">status</text>
    <!-- ts (cold) -->
    <rect class="cold" x="731" y="100" width="56" height="170"/><text x="759" y="96" text-anchor="middle" class="rl">ts</text>
    <!-- qty (cold) -->
    <rect class="cold" x="793" y="100" width="56" height="170"/><text x="821" y="96" text-anchor="middle" class="rl">qty</text>
    <!-- amount (HOT) -->
    <rect class="hot" x="855" y="100" width="56" height="170"/><text x="883" y="96" text-anchor="middle" class="rl">amount</text>
    <text x="883" y="120" text-anchor="middle" class="v">40</text><text x="883" y="138" text-anchor="middle" class="v">15</text><text x="883" y="156" text-anchor="middle" class="v">60</text><text x="883" y="174" text-anchor="middle" class="v">20</text><text x="883" y="192" text-anchor="middle" class="v">80</text><text x="883" y="210" text-anchor="middle" class="v">30</text>
  </g>
  <text x="635" y="246" text-anchor="middle" class="cap">repeats compress well</text>
  <text x="750" y="300" text-anchor="middle" class="hotT">reads just 2 of 6 blocks — other 4 untouched</text>

  <text x="500" y="356" text-anchor="middle" class="h">Same query: row store reads ~6/6 columns of data; column store reads ~2/6.</text>
  <rect x="120" y="384" width="760" height="40" rx="8" fill="#f6f5f2" stroke="#ddd"/>
  <text x="500" y="409" text-anchor="middle" class="cap">OLTP (fetch one whole record) → row storage.    OLAP (scan few columns over many rows) → column storage.</text>
</svg>
