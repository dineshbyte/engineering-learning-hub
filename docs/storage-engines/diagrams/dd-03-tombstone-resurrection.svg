<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="sans-serif">
  <defs>
    <marker id="at3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .hbad{font-size:13px;font-weight:bold;fill:#b00000}
      .hgood{font-size:13px;font-weight:bold;fill:#1f7a1f}
      .old{fill:#eef1f4;stroke:#666;stroke-width:1.4}
      .tomb{fill:#fde7d6;stroke:#b06000;stroke-width:1.4}
      .gone{fill:#f4f4f4;stroke:#bbb;stroke-width:1.2;stroke-dasharray:4 3}
      .sstT{font-size:12px;font-weight:bold;fill:#111}
      .sub{font-size:10.5px;fill:#444}
      .arr{stroke:#444;stroke-width:1.5;fill:none}
      .boxBad{fill:#fbeaea;stroke:#b00000;stroke-width:1.5}
      .boxGood{fill:#e9f6ec;stroke:#1f7a1f;stroke-width:1.5}
      .resT{font-size:13px;font-weight:bold;fill:#b00000}
      .okT{font-size:13px;font-weight:bold;fill:#1f7a1f}
    </style>
  </defs>
  <rect width="1000" height="540" fill="#ffffff"/>
  <text x="500" y="26" text-anchor="middle" class="title">Tombstone resurrection: drop the marker too early and the value comes back</text>
  <line x1="500" y1="46" x2="500" y2="470" stroke="#dcdcdc"/>

  <!-- LEFT: wrong -->
  <text x="40" y="74" class="hbad">Premature tombstone GC — UNSAFE</text>
  <rect class="old" x="40" y="92" width="200" height="40" rx="5"/><text x="56" y="116" class="sstT">old SSTable:  x = 5  (seq 10)</text>
  <rect class="tomb" x="40" y="146" width="200" height="40" rx="5"/><text x="56" y="170" class="sstT" fill="#a05000">new SSTable:  tombstone x (seq 50)</text>
  <line class="arr" x1="250" y1="166" x2="300" y2="166" marker-end="url(#at3)"/>
  <text x="260" y="158" class="sub">compaction</text>
  <rect class="gone" x="304" y="146" width="180" height="40" rx="5"/><text x="394" y="170" text-anchor="middle" class="sub">tombstone purged (looked old)</text>
  <text x="40" y="216" class="sub">…but the old SSTable with x = 5 was NOT compacted away yet.</text>
  <rect class="boxBad" x="40" y="240" width="430" height="56" rx="6"/>
  <text x="56" y="264" class="resT">read x  →  returns 5</text>
  <text x="56" y="284" class="sub">the deleted value RESURRECTED — no tombstone left to mask it.</text>

  <!-- RIGHT: right -->
  <text x="540" y="74" class="hgood">Retain until past all older copies — SAFE</text>
  <rect class="old" x="540" y="92" width="200" height="40" rx="5"/><text x="556" y="116" class="sstT">old SSTable:  x = 5  (seq 10)</text>
  <rect class="tomb" x="540" y="146" width="200" height="40" rx="5"/><text x="556" y="170" class="sstT" fill="#a05000">tombstone x (seq 50) — KEPT</text>
  <line class="arr" x1="640" y1="200" x2="640" y2="230" marker-end="url(#at3)"/>
  <text x="650" y="220" class="sub">compaction merges BOTH together</text>
  <rect class="boxGood" x="540" y="240" width="430" height="56" rx="6"/>
  <text x="556" y="264" class="okT">tombstone shadows x = 5  →  both dropped</text>
  <text x="556" y="284" class="sub">read x  →  not found.  Correct.</text>

  <rect x="120" y="350" width="760" height="74" rx="8" fill="#fff7e6" stroke="#b58a3b"/>
  <text x="500" y="376" text-anchor="middle" class="hbad" fill="#7a5a10">A tombstone must outlive every older SSTable that still holds the key.</text>
  <text x="500" y="398" text-anchor="middle" class="sub">Purge it only once compaction has carried it past all older copies (leveled: the bottom level).</text>
  <text x="500" y="416" text-anchor="middle" class="sub">Distributed: also wait gc_grace_seconds (default 10 days) so every replica learns of the delete first.</text>
</svg>
