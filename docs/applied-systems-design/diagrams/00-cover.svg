<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1920" font-family="sans-serif">
  <defs>
    <marker id="cd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8a93a0"/></marker>
  </defs>
  <rect width="1200" height="1920" fill="#14171c"/>
  <rect x="40" y="40" width="1120" height="1840" fill="none" stroke="#2b313b" stroke-width="2" rx="14"/>

  <text x="600" y="228" text-anchor="middle" fill="#7f8a98" font-size="30" letter-spacing="7">A GUIDED LEARNING TRACK · BOOK 5 · THE CAPSTONE</text>

  <text x="600" y="412" text-anchor="middle" fill="#f5f7fa" font-size="100" font-weight="bold" letter-spacing="1">APPLIED</text>
  <text x="600" y="534" text-anchor="middle" fill="#f5f7fa" font-size="92" font-weight="bold" letter-spacing="1">SYSTEMS DESIGN</text>

  <line x1="410" y1="594" x2="790" y2="594" stroke="#e8b53f" stroke-width="4"/>
  <text x="600" y="660" text-anchor="middle" fill="#e8b53f" font-size="36" letter-spacing="5">DESIGN REAL SYSTEMS END TO END</text>

  <!-- HERO: web architecture -->
  <g transform="translate(180,750)">
    <rect x="0" y="0" width="840" height="640" rx="16" fill="#1b1f26" stroke="#2c323c" stroke-width="2"/>
    <text x="420" y="70" text-anchor="middle" fill="#8a93a0" font-size="24">the building blocks</text>

    <!-- Client -->
    <rect x="40" y="150" width="130" height="56" rx="8" fill="#262b33" stroke="#cdd4dd" stroke-width="2"/><text x="105" y="184" text-anchor="middle" fill="#f5f7fa" font-size="24">Client</text>
    <line x1="170" y1="178" x2="222" y2="178" stroke="#8a93a0" stroke-width="2.5" marker-end="url(#cd)"/>
    <!-- LB -->
    <rect x="226" y="150" width="150" height="56" rx="8" fill="#262b33" stroke="#cdd4dd" stroke-width="2"/><text x="301" y="178" text-anchor="middle" fill="#f5f7fa" font-size="20">Load</text><text x="301" y="200" text-anchor="middle" fill="#f5f7fa" font-size="20">Balancer</text>
    <line x1="376" y1="178" x2="428" y2="178" stroke="#8a93a0" stroke-width="2.5" marker-end="url(#cd)"/>
    <!-- App -->
    <rect x="432" y="150" width="150" height="56" rx="8" fill="#262b33" stroke="#cdd4dd" stroke-width="2"/><text x="507" y="184" text-anchor="middle" fill="#f5f7fa" font-size="22">App tier</text>

    <!-- Cache (amber) -->
    <line x1="582" y1="166" x2="648" y2="130" stroke="#8a93a0" stroke-width="2.5" marker-end="url(#cd)"/>
    <rect x="652" y="104" width="150" height="52" rx="8" fill="#33301f" stroke="#e8b53f" stroke-width="2"/><text x="727" y="136" text-anchor="middle" fill="#f5f7fa" font-size="22">Cache</text>
    <!-- DB -->
    <line x1="582" y1="190" x2="648" y2="220" stroke="#8a93a0" stroke-width="2.5" marker-end="url(#cd)"/>
    <rect x="652" y="198" width="150" height="52" rx="8" fill="#262b33" stroke="#cdd4dd" stroke-width="2"/><text x="727" y="230" text-anchor="middle" fill="#f5f7fa" font-size="22">Database</text>

    <!-- Queue -> Worker -->
    <line x1="507" y1="206" x2="507" y2="318" stroke="#8a93a0" stroke-width="2.5" marker-end="url(#cd)"/>
    <rect x="432" y="322" width="150" height="50" rx="8" fill="#262b33" stroke="#cdd4dd" stroke-width="2"/><text x="507" y="353" text-anchor="middle" fill="#f5f7fa" font-size="22">Queue</text>
    <line x1="582" y1="347" x2="648" y2="347" stroke="#8a93a0" stroke-width="2.5" marker-end="url(#cd)"/>
    <rect x="652" y="322" width="150" height="50" rx="8" fill="#262b33" stroke="#cdd4dd" stroke-width="2"/><text x="727" y="353" text-anchor="middle" fill="#f5f7fa" font-size="22">Worker</text>

    <text x="420" y="450" text-anchor="middle" fill="#8a93a0" font-size="23">cache · replicate · partition · queue · tune consistency</text>
  </g>

  <rect x="120" y="1470" width="960" height="300" rx="16" fill="none" stroke="#e8b53f" stroke-width="2"/>
  <text x="600" y="1545" text-anchor="middle" fill="#e8b53f" font-size="30" letter-spacing="6">9 DESIGNS</text>
  <text x="600" y="1620" text-anchor="middle" fill="#f5f7fa" font-size="40" font-weight="bold">Shortener · Rate Limiter · Feed · Cache</text>
  <text x="600" y="1668" text-anchor="middle" fill="#f5f7fa" font-size="40" font-weight="bold">Queue · KV Store</text>
  <text x="600" y="1724" text-anchor="middle" fill="#aab2bd" font-size="28">the method · estimation · trade-offs</text>

  <text x="600" y="1838" text-anchor="middle" fill="#646e7a" font-size="26">Book 5 of the series · the finale · Xu · DDIA</text>
</svg>
