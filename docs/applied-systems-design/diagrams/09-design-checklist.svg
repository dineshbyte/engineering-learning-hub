<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="sans-serif">
  <defs>
    <marker id="ad9b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker>
    <style>
      .title{font-size:17px;font-weight:bold;fill:#111}
      .step{fill:#eef1f4;stroke:#5566aa;stroke-width:1.3}
      .stepHi{fill:#fff3d6;stroke:#b58a3b;stroke-width:1.8}
      .stepT{font-size:13px;font-weight:bold;fill:#26356b}
      .sub{font-size:10px;fill:#555}
      .num{font-size:12px;font-weight:bold;fill:#fff}
      .arr{stroke:#555;stroke-width:1.5;fill:none}
      .side{fill:#f6f7fa;stroke:#ccc;stroke-width:1.2}
      .h{font-size:13px;font-weight:bold;fill:#444;letter-spacing:1px}
      .chip{stroke-width:1.2}
      .chipT{font-size:12px;font-weight:bold;fill:#111}
      .chipG{font-size:9px;fill:#555}
    </style>
  </defs>
  <rect width="1000" height="600" fill="#ffffff"/>
  <text x="500" y="30" text-anchor="middle" class="title">The systems-design method — one page, any prompt</text>

  <!-- 7 steps -->
  <g>
    <rect class="step" x="40" y="60" width="560" height="50" rx="6"/><circle cx="62" cy="85" r="11" fill="#5566aa"/><text x="62" y="89" text-anchor="middle" class="num">1</text><text x="84" y="82" class="stepT">Clarify requirements</text><text x="84" y="99" class="sub">functional + non-functional, read:write ratio</text>
    <rect class="step" x="40" y="124" width="560" height="50" rx="6"/><circle cx="62" cy="149" r="11" fill="#5566aa"/><text x="62" y="153" text-anchor="middle" class="num">2</text><text x="84" y="146" class="stepT">Estimate scale</text><text x="84" y="163" class="sub">QPS, storage, bandwidth (back-of-envelope)</text>
    <rect class="step" x="40" y="188" width="560" height="50" rx="6"/><circle cx="62" cy="213" r="11" fill="#5566aa"/><text x="62" y="217" text-anchor="middle" class="num">3</text><text x="84" y="210" class="stepT">Define the API</text><text x="84" y="227" class="sub">endpoints, request/response shapes</text>
    <rect class="step" x="40" y="252" width="560" height="50" rx="6"/><circle cx="62" cy="277" r="11" fill="#5566aa"/><text x="62" y="281" text-anchor="middle" class="num">4</text><text x="84" y="274" class="stepT">Define the data model</text><text x="84" y="291" class="sub">tables / keys, access patterns</text>
    <rect class="step" x="40" y="316" width="560" height="50" rx="6"/><circle cx="62" cy="341" r="11" fill="#5566aa"/><text x="62" y="345" text-anchor="middle" class="num">5</text><text x="84" y="338" class="stepT">High-level design</text><text x="84" y="355" class="sub">boxes + arrows, name the components</text>
    <rect class="stepHi" x="40" y="380" width="560" height="50" rx="6"/><circle cx="62" cy="405" r="11" fill="#b58a3b"/><text x="62" y="409" text-anchor="middle" class="num">6</text><text x="84" y="402" class="stepT" fill="#7a5a10">Deep-dive the bottleneck</text><text x="84" y="419" class="sub">find the hot path, name the lever + cost</text>
    <rect class="step" x="40" y="444" width="560" height="50" rx="6" fill="#e6e8ee"/><circle cx="62" cy="469" r="11" fill="#5566aa"/><text x="62" y="473" text-anchor="middle" class="num">7</text><text x="84" y="466" class="stepT">State the trade-offs</text><text x="84" y="483" class="sub">what you chose, what you rejected, why</text>
  </g>
  <g class="arr"><line x1="320" y1="110" x2="320" y2="124" marker-end="url(#ad9b)"/><line x1="320" y1="174" x2="320" y2="188" marker-end="url(#ad9b)"/><line x1="320" y1="238" x2="320" y2="252" marker-end="url(#ad9b)"/><line x1="320" y1="302" x2="320" y2="316" marker-end="url(#ad9b)"/><line x1="320" y1="366" x2="320" y2="380" marker-end="url(#ad9b)"/><line x1="320" y1="430" x2="320" y2="444" marker-end="url(#ad9b)"/></g>

  <!-- levers -->
  <rect class="side" x="650" y="60" width="320" height="434" rx="10"/>
  <text x="810" y="86" text-anchor="middle" class="h">RECURRING LEVERS</text>
  <rect class="chip" x="676" y="104" width="268" height="50" rx="25" fill="#e7eef7" stroke="#9bb4d4"/><text x="700" y="128" class="chipT">Cache</text><text x="700" y="144" class="chipG">read latency</text>
  <rect class="chip" x="676" y="164" width="268" height="50" rx="25" fill="#eaf4ec" stroke="#9bcaa6"/><text x="700" y="188" class="chipT">Replicate</text><text x="700" y="204" class="chipG">read throughput + availability</text>
  <rect class="chip" x="676" y="224" width="268" height="50" rx="25" fill="#f6efe3" stroke="#d4bd93"/><text x="700" y="248" class="chipT">Partition / Shard</text><text x="700" y="264" class="chipG">write throughput + storage</text>
  <rect class="chip" x="676" y="284" width="268" height="50" rx="25" fill="#f1ebf6" stroke="#bca6d0"/><text x="700" y="308" class="chipT">Queue (async)</text><text x="700" y="324" class="chipG">decouple + absorb spikes</text>
  <rect class="chip" x="676" y="344" width="268" height="50" rx="25" fill="#f7eaea" stroke="#d4a0a0"/><text x="700" y="368" class="chipT">Tune consistency</text><text x="700" y="384" class="chipG">freshness vs speed</text>
  <rect class="chip" x="676" y="404" width="268" height="50" rx="25" fill="#eef1f4" stroke="#aab" /><text x="700" y="428" class="chipT">Load-balance</text><text x="700" y="444" class="chipG">spread traffic</text>
  <text x="810" y="480" text-anchor="middle" class="chipG">apply these at steps 5 and 6</text>

  <text x="500" y="540" text-anchor="middle" class="sub" font-style="italic" font-size="13">Run it in order, out loud, every time.</text>
</svg>
