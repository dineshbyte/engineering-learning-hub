<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" role="img">
  <title>Resource and URI design: shallow containment plus top-level access and reified actions, versus over-deep nesting</title>
  <defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 z" fill="#222"/></marker></defs>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif;fill:#111}
    .b{fill:#f2f2f2;stroke:#222;stroke-width:1.4}
    .u{font-family:"Courier New",monospace;font-size:12px}
    .ln{stroke:#222;stroke-width:1.3;fill:none}
    .h{font-size:13px;font-weight:bold} .x{font-size:13px;font-weight:bold;fill:#000}
    .n{font-size:11px;fill:#555}
  </style>
  <text class="h" x="20" y="24">Prefer (shallow + direct)</text>
  <rect class="b" x="20"  y="40"  width="150" height="34" rx="5"/><text class="u" x="32" y="62">/customers</text>
  <rect class="b" x="60"  y="92"  width="170" height="34" rx="5"/><text class="u" x="72" y="114">/customers/{id}</text>
  <rect class="b" x="100" y="144" width="210" height="34" rx="5"/><text class="u" x="112" y="166">/customers/{id}/orders</text>
  <path class="ln" d="M95 74 L95 92" marker-end="url(#ar)"/>
  <path class="ln" d="M145 126 L145 144" marker-end="url(#ar)"/>
  <text class="n" x="100" y="196">↑ containment, one level deep</text>
  <rect class="b" x="20"  y="220" width="160" height="34" rx="5"/><text class="u" x="32" y="242">/orders/{id}</text>
  <text class="n" x="190" y="242">direct access (don't force the parent path)</text>
  <rect class="b" x="20"  y="266" width="200" height="34" rx="5"/><text class="u" x="32" y="288">POST /refunds</text>
  <text class="n" x="232" y="288">an action reified as a resource</text>
  <rect class="b" x="20"  y="312" width="270" height="34" rx="5"/><text class="u" x="32" y="334">/orders?customer_id=7</text>
  <text class="n" x="300" y="334">filter instead of deep nesting</text>
  <line x1="360" y1="20" x2="360" y2="346" stroke="#bbb" stroke-width="1"/>
  <text class="x" x="380" y="24">Avoid</text>
  <rect x="380" y="40" width="225" height="36" rx="5" fill="#fff" stroke="#222" stroke-dasharray="5 3"/>
  <text class="u" x="390" y="63">/customers/1/orders/9/items/3</text>
  <text class="n" x="380" y="96">✗ couples URLs to a hierarchy that</text>
  <text class="n" x="380" y="112">   breaks when relationships change</text>
  <rect x="380" y="140" width="225" height="36" rx="5" fill="#fff" stroke="#222" stroke-dasharray="5 3"/>
  <text class="u" x="390" y="163">POST /createOrder</text>
  <text class="n" x="380" y="196">✗ verb in the path — the HTTP</text>
  <text class="n" x="380" y="212">   method is already the verb</text>
  <rect x="380" y="240" width="225" height="36" rx="5" fill="#fff" stroke="#222" stroke-dasharray="5 3"/>
  <text class="u" x="390" y="263">/orders/1001  (sequential id)</text>
  <text class="n" x="380" y="296">✗ enumerable — leaks volume,</text>
  <text class="n" x="380" y="312">   invites BOLA; use opaque ids</text>
</svg>
