<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 380" role="img">
  <title>ETags drive both conditional GET returning 304 and conditional writes returning 412 for optimistic concurrency</title>
  <defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 z" fill="#222"/></marker></defs>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif;fill:#111}
    .hd{fill:#222} .ht{fill:#fff;font-weight:bold;font-size:13px}
    .life{stroke:#888;stroke-width:1.2;stroke-dasharray:4 4}
    .msg{stroke:#222;stroke-width:1.4;fill:none}
    .m{font-size:12px} .sec{font-size:12px;fill:#555;font-style:italic}
  </style>
  <rect class="hd" x="55"  y="14" width="120" height="30" rx="5"/><text class="ht" x="115" y="34" text-anchor="middle">Client</text>
  <rect class="hd" x="445" y="14" width="120" height="30" rx="5"/><text class="ht" x="505" y="34" text-anchor="middle">Server</text>
  <line class="life" x1="115" y1="44" x2="115" y2="372"/>
  <line class="life" x1="505" y1="44" x2="505" y2="372"/>
  <text class="sec" x="20" y="68">Read — get the current version tag</text>
  <line class="msg" x1="115" y1="88"  x2="505" y2="88"  marker-end="url(#ar)"/><text class="m" x="125" y="82">GET /doc/42</text>
  <line class="msg" x1="505" y1="116" x2="115" y2="116" marker-end="url(#ar)"/><text class="m" x="180" y="110">200 OK · ETag: "v1"</text>
  <line x1="0" y1="140" x2="620" y2="140" stroke="#eee"/>
  <text class="sec" x="20" y="164">Conditional GET — caching</text>
  <line class="msg" x1="115" y1="184" x2="505" y2="184" marker-end="url(#ar)"/><text class="m" x="125" y="178">GET /doc/42 · If-None-Match: "v1"</text>
  <line class="msg" x1="505" y1="212" x2="115" y2="212" marker-end="url(#ar)"/><text class="m" x="180" y="206">304 Not Modified · (no body)</text>
  <line x1="0" y1="236" x2="620" y2="236" stroke="#eee"/>
  <text class="sec" x="20" y="260">Conditional write — optimistic concurrency</text>
  <text class="m" x="200" y="284" fill="#555">…meanwhile someone else saved → server is now "v2"…</text>
  <line class="msg" x1="115" y1="312" x2="505" y2="312" marker-end="url(#ar)"/><text class="m" x="125" y="306">PUT /doc/42 · If-Match: "v1"</text>
  <line class="msg" x1="505" y1="340" x2="115" y2="340" marker-end="url(#ar)"/><text class="m" x="180" y="334">412 Precondition Failed · re-fetch &amp; merge</text>
  <text class="sec" x="310" y="368" text-anchor="middle">same ETag = cache validator AND lost-update guard</text>
</svg>
