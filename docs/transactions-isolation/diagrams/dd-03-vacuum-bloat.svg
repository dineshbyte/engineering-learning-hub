<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" font-family="sans-serif">
  <defs>
    <marker id="ab3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .axis{stroke:#333;stroke-width:1.4}
      .cap{font-size:11px;fill:#555}
      .long{fill:#fbeaea;stroke:#b00000;stroke-width:1.5}
      .horizon{stroke:#b00000;stroke-width:2;stroke-dasharray:6 4}
      .hT{font-size:11px;font-weight:bold;fill:#b00000}
      .dead{fill:#f0c8c8;stroke:#b06060;stroke-width:1}
      .vac{fill:#eef1f4;stroke:#444;stroke-width:1.3}
      .bloat{fill:#e0857d;opacity:0.55}
      .bad{font-size:11.5px;font-weight:bold;fill:#b00000}
      .good{font-size:11px;font-weight:bold;fill:#1f7a1f}
    </style>
  </defs>
  <rect width="1080" height="520" fill="#ffffff"/>
  <text x="540" y="26" text-anchor="middle" class="title">The long-transaction bloat trap: one idle transaction pins cleanup database-wide</text>

  <!-- axis -->
  <line class="axis" x1="120" y1="380" x2="1000" y2="380" marker-end="url(#ab3)"/>
  <text x="1008" y="384" class="cap">transaction id / time →</text>
  <text x="120" y="400" class="cap">xid 100</text><text x="940" y="400" class="cap">now</text>

  <!-- long txn bar -->
  <rect class="long" x="120" y="80" width="820" height="34" rx="6"/>
  <text x="530" y="102" text-anchor="middle" class="bad">T_long — open for an hour (or idle in transaction) · snapshot pinned at xid 100</text>

  <!-- xmin horizon -->
  <line class="horizon" x1="150" y1="70" x2="150" y2="390"/>
  <text x="156" y="68" class="hT">xmin horizon = 100 (oldest open snapshot)</text>

  <!-- dead tuples created later -->
  <text x="300" y="160" class="cap">dead tuples created by ongoing updates (xids 150, 200, 250, 300 …)</text>
  <rect class="dead" x="320" y="172" width="26" height="22"/><rect class="dead" x="440" y="172" width="26" height="22"/><rect class="dead" x="560" y="172" width="26" height="22"/><rect class="dead" x="680" y="172" width="26" height="22"/><rect class="dead" x="800" y="172" width="26" height="22"/>
  <text x="333" y="188" text-anchor="middle" class="cap" font-size="8">150</text><text x="453" y="188" text-anchor="middle" class="cap" font-size="8">200</text><text x="573" y="188" text-anchor="middle" class="cap" font-size="8">250</text><text x="693" y="188" text-anchor="middle" class="cap" font-size="8">300</text>

  <!-- vacuum -->
  <rect class="vac" x="320" y="230" width="520" height="44" rx="6"/>
  <text x="580" y="252" text-anchor="middle" class="bad">VACUUM: may remove only tuples with xmax &lt; 100</text>
  <text x="580" y="268" text-anchor="middle" class="cap">→ removes NONE — every dead tuple is newer than the pinned horizon.</text>

  <!-- bloat growth -->
  <rect class="bloat" x="320" y="300" width="520" height="40" rx="4"/>
  <text x="580" y="325" text-anchor="middle" class="bad">table + index BLOAT grows, unbounded — and freezing stalls too (→ wraparound risk)</text>

  <rect x="160" y="430" width="760" height="60" rx="10" fill="#e9f6ec" stroke="#1f7a1f"/>
  <text x="540" y="454" text-anchor="middle" class="good">VACUUM is only ever as current as your OLDEST open transaction.</text>
  <text x="540" y="476" text-anchor="middle" class="cap">Fix: cap with idle_in_transaction_session_timeout · watch pg_stat_activity backend_xmin · alert on n_dead_tup.</text>
</svg>
