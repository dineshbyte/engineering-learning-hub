<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="sans-serif">
  <defs>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .col{font-size:11.5px;font-weight:bold;fill:#111}
      .row{font-size:12.5px;font-weight:bold;fill:#111}
      .cap{font-size:11px;fill:#555}
      .grid{stroke:#d2d2d2;stroke-width:1}
      .chk{stroke:#1f7a1f;stroke-width:3;fill:none}
      .x{stroke:#b00000;stroke-width:2.6}
      .siRow{fill:#f3eef7}
      .topRow{fill:#eaf4ec}
    </style>
  </defs>
  <rect width="880" height="560" fill="#ffffff"/>
  <text x="440" y="26" text-anchor="middle" class="title">Isolation levels × anomalies — which are prevented (✓) vs possible (✗)</text>

  <!-- row backgrounds -->
  <rect class="topRow" x="230" y="118" width="600" height="64"/>
  <rect class="siRow" x="230" y="182" width="600" height="64"/>

  <!-- column headers -->
  <g class="col" text-anchor="middle">
    <text x="290" y="92">Dirty</text><text x="290" y="106">read</text>
    <text x="410" y="92">Non-rep.</text><text x="410" y="106">read</text>
    <text x="530" y="92">Lost</text><text x="530" y="106">update</text>
    <text x="650" y="92">Write</text><text x="650" y="106">skew</text>
    <text x="770" y="92">Phantom</text>
  </g>

  <!-- grid lines -->
  <g class="grid">
    <line x1="230" y1="118" x2="830" y2="118"/><line x1="230" y1="182" x2="830" y2="182"/>
    <line x1="230" y1="246" x2="830" y2="246"/><line x1="230" y1="310" x2="830" y2="310"/>
    <line x1="230" y1="374" x2="830" y2="374"/><line x1="230" y1="438" x2="830" y2="438"/>
    <line x1="230" y1="118" x2="230" y2="438"/><line x1="350" y1="118" x2="350" y2="438"/>
    <line x1="470" y1="118" x2="470" y2="438"/><line x1="590" y1="118" x2="590" y2="438"/>
    <line x1="710" y1="118" x2="710" y2="438"/><line x1="830" y1="118" x2="830" y2="438"/>
  </g>

  <!-- row labels -->
  <g class="row" text-anchor="end">
    <text x="222" y="155">Serializable</text>
    <text x="222" y="219">Snapshot Isolation *</text>
    <text x="222" y="283">Repeatable Read (ANSI)</text>
    <text x="222" y="347">Read Committed</text>
    <text x="222" y="411">Read Uncommitted</text>
  </g>

  <!-- helper marks: rows at cy 150,214,278,342,406 ; cols cx 290,410,530,650,770 -->
  <!-- Row1 Serializable: all checks -->
  <g class="chk">
    <polyline points="281,150 287,157 300,142"/><polyline points="401,150 407,157 420,142"/><polyline points="521,150 527,157 540,142"/><polyline points="641,150 647,157 660,142"/><polyline points="761,150 767,157 780,142"/>
  </g>
  <!-- Row2 SI: chk chk chk X chk -->
  <g class="chk"><polyline points="281,214 287,221 300,206"/><polyline points="401,214 407,221 420,206"/><polyline points="521,214 527,221 540,206"/><polyline points="761,214 767,221 780,206"/></g>
  <circle cx="650" cy="214" r="16" fill="none" stroke="#b00000" stroke-width="2"/>
  <g class="x"><line x1="642" y1="206" x2="658" y2="222"/><line x1="658" y1="206" x2="642" y2="222"/></g>
  <!-- Row3 RR(ANSI): chk chk chk X X -->
  <g class="chk"><polyline points="281,278 287,285 300,270"/><polyline points="401,278 407,285 420,270"/><polyline points="521,278 527,285 540,270"/></g>
  <g class="x"><line x1="642" y1="270" x2="658" y2="286"/><line x1="658" y1="270" x2="642" y2="286"/><line x1="762" y1="270" x2="778" y2="286"/><line x1="778" y1="270" x2="762" y2="286"/></g>
  <!-- Row4 RC: chk X X X X -->
  <g class="chk"><polyline points="281,342 287,349 300,334"/></g>
  <g class="x"><line x1="402" y1="334" x2="418" y2="350"/><line x1="418" y1="334" x2="402" y2="350"/><line x1="522" y1="334" x2="538" y2="350"/><line x1="538" y1="334" x2="522" y2="350"/><line x1="642" y1="334" x2="658" y2="350"/><line x1="658" y1="334" x2="642" y2="350"/><line x1="762" y1="334" x2="778" y2="350"/><line x1="778" y1="334" x2="762" y2="350"/></g>
  <!-- Row5 RU: all X -->
  <g class="x"><line x1="282" y1="398" x2="298" y2="414"/><line x1="298" y1="398" x2="282" y2="414"/><line x1="402" y1="398" x2="418" y2="414"/><line x1="418" y1="398" x2="402" y2="414"/><line x1="522" y1="398" x2="538" y2="414"/><line x1="538" y1="398" x2="522" y2="414"/><line x1="642" y1="398" x2="658" y2="414"/><line x1="658" y1="398" x2="642" y2="414"/><line x1="762" y1="398" x2="778" y2="414"/><line x1="778" y1="398" x2="762" y2="414"/></g>

  <text x="650" y="468" text-anchor="middle" class="cap" fill="#b00000">Snapshot Isolation looks strong — but write skew leaks through.</text>

  <rect x="40" y="486" width="800" height="56" rx="8" fill="#f7f7f5" stroke="#ddd"/>
  <text x="52" y="508" class="cap">* Names lie across vendors: Postgres "Repeatable Read" = the Snapshot Isolation row · Oracle "Serializable" = the Snapshot Isolation row ·</text>
  <text x="52" y="528" class="cap">Postgres true SERIALIZABLE = the top row (via SSI).  Reason from the cells, not the label.</text>
</svg>
