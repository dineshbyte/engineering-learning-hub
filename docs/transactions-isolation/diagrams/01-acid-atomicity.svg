<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 580" font-family="sans-serif">
  <defs>
    <style>
      .title{font-size:17px;font-weight:bold;fill:#111}
      .bad{font-size:14px;font-weight:bold;fill:#b00000}
      .good{font-size:14px;font-weight:bold;fill:#1f7a1f}
      .lbl{font-size:12.5px;fill:#222}
      .cap{font-size:11.5px;fill:#555}
      .box{fill:#eef1f4;stroke:#444;stroke-width:1.4}
      .ghost{fill:#f4f4f4;stroke:#bbb;stroke-width:1.2;stroke-dasharray:4 3}
      .life{stroke:#9a9a9a;stroke-width:1.2;stroke-dasharray:3 3}
      .stateBad{fill:#fbeaea;stroke:#b00000;stroke-width:1.6}
      .stateGood{fill:#e9f6ec;stroke:#1f7a1f;stroke-width:1.6}
      .crash{stroke:#b00000;stroke-width:2.6;fill:none}
      .roll{stroke:#1f7a1f;stroke-width:1.8;fill:none}
    </style>
  </defs>
  <rect width="980" height="580" fill="#ffffff"/>
  <text x="490" y="28" text-anchor="middle" class="title">Atomicity: all-or-nothing</text>
  <line x1="490" y1="44" x2="490" y2="520" stroke="#dcdcdc"/>

  <!-- LEFT: non-atomic -->
  <text x="245" y="66" text-anchor="middle" class="bad">NON-ATOMIC (broken)</text>
  <text x="245" y="92" text-anchor="middle" class="cap">start:  A = $500   ·   B = $500   (sum $1000)</text>
  <line class="life" x1="245" y1="104" x2="245" y2="300"/>
  <rect class="box" x="180" y="120" width="130" height="30" rx="4"/>
  <text x="245" y="140" text-anchor="middle" class="lbl">W1: A −= 100</text>
  <text x="245" y="172" text-anchor="middle" class="cap">A = $400, B = $500</text>
  <!-- crash -->
  <polyline class="crash" points="210,196 235,210 218,222 248,238"/>
  <text x="300" y="220" class="bad">CRASH</text>
  <rect class="stateBad" x="120" y="262" width="250" height="56" rx="6"/>
  <text x="245" y="286" text-anchor="middle" class="lbl">A = $400 · B = $500</text>
  <text x="245" y="306" text-anchor="middle" class="bad">$100 vanished — sum is $900</text>

  <!-- RIGHT: atomic -->
  <text x="735" y="66" text-anchor="middle" class="good">ATOMIC (correct)</text>
  <text x="735" y="92" text-anchor="middle" class="cap">start:  A = $500   ·   B = $500   (sum $1000)</text>
  <line class="life" x1="735" y1="104" x2="735" y2="320"/>
  <rect class="ghost" x="670" y="120" width="130" height="30" rx="4"/>
  <text x="735" y="140" text-anchor="middle" class="cap">W1: A −= 100 (uncommitted)</text>
  <!-- crash same height -->
  <polyline class="crash" points="700,196 725,210 708,222 738,238"/>
  <text x="790" y="220" class="bad">CRASH</text>
  <!-- rollback -->
  <path class="roll" d="M735,262 q-60,-6 -58,-44" marker-end="url(#rb)"/>
  <text x="612" y="252" class="good">ROLLBACK</text>
  <text x="612" y="268" class="cap">(WAL undo)</text>
  <rect class="stateGood" x="610" y="284" width="250" height="56" rx="6"/>
  <text x="735" y="308" text-anchor="middle" class="lbl">A = $500 · B = $500</text>
  <text x="735" y="328" text-anchor="middle" class="good">both writes undone — sum still $1000</text>
  <defs><marker id="rb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f7a1f"/></marker></defs>

  <text x="490" y="404" text-anchor="middle" class="cap">The crash strikes at the same instant in both — only the final state differs.</text>
  <rect x="80" y="430" width="820" height="64" rx="8" fill="#f7f7f5" stroke="#ddd"/>
  <text x="490" y="456" text-anchor="middle" class="cap">Atomicity = abort / rollback, <tspan font-weight="bold">not</tspan> concurrency (that's Isolation).</text>
  <text x="490" y="478" text-anchor="middle" class="cap">The <tspan font-weight="bold">C</tspan> in ACID — "sum of balances unchanged" — is an <tspan font-style="italic">application</tspan> invariant the database can't define for you.</text>
</svg>
