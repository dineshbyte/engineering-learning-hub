<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="sans-serif">
  <defs>
    <marker id="ak2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .box{fill:#eef1f4;stroke:#444;stroke-width:1.4}
      .hash{fill:#f3eef7;stroke:#6b4fa0;stroke-width:1.4}
      .topic{fill:none;stroke:#bbb;stroke-width:1.4;stroke-dasharray:5 4}
      .group{fill:none;stroke:#2a6099;stroke-width:1.4;stroke-dasharray:5 4}
      .cell{fill:#f6f6f4;stroke:#888;stroke-width:1}
      .hot{fill:#ffe0b3;stroke:#b06000;stroke-width:1.2}
      .pl{font-size:12px;font-weight:bold;fill:#111}
      .lbl{font-size:11px;fill:#222}
      .cap{font-size:11px;fill:#555}
      .mono{font-size:10px;fill:#333;font-family:monospace}
      .off{font-size:9px;fill:#888}
      .arr{stroke:#777;stroke-width:1.4;fill:none}
    </style>
  </defs>
  <rect width="1000" height="560" fill="#ffffff"/>
  <text x="500" y="26" text-anchor="middle" class="title">A Kafka topic = several independent ordered logs (partitions)</text>

  <!-- PRODUCER -->
  <rect class="box" x="30" y="120" width="110" height="40" rx="5"/><text x="85" y="145" text-anchor="middle" class="pl">PRODUCER</text>
  <rect class="hash" x="30" y="180" width="110" height="34" rx="5"/><text x="85" y="202" text-anchor="middle" class="lbl" fill="#52407e">hash(key) % 3</text>
  <text x="30" y="248" class="mono">acct-42 → P0</text>
  <text x="30" y="266" class="mono">acct-99 → P2</text>
  <text x="30" y="284" class="mono">acct-42 → P0</text>
  <text x="30" y="304" class="cap">same key → same partition</text>

  <!-- TOPIC -->
  <rect class="topic" x="300" y="96" width="380" height="280" rx="8"/>
  <text x="490" y="116" text-anchor="middle" class="pl">TOPIC: orders</text>
  <!-- P0 -->
  <text x="320" y="160" class="pl">P0</text>
  <g><rect class="hot" x="350" y="142" width="42" height="34"/><text x="371" y="190" text-anchor="middle" class="off">0</text>
     <rect class="cell" x="392" y="142" width="42" height="34"/><text x="413" y="190" text-anchor="middle" class="off">1</text>
     <rect class="cell" x="434" y="142" width="42" height="34"/><text x="455" y="190" text-anchor="middle" class="off">2</text>
     <rect class="hot" x="476" y="142" width="42" height="34"/><text x="497" y="190" text-anchor="middle" class="off">3</text></g>
  <text x="540" y="164" class="cap">acct-42 →</text>
  <!-- P1 -->
  <text x="320" y="232" class="pl">P1</text>
  <g><rect class="cell" x="350" y="214" width="42" height="34"/><text x="371" y="262" text-anchor="middle" class="off">0</text>
     <rect class="cell" x="392" y="214" width="42" height="34"/><text x="413" y="262" text-anchor="middle" class="off">1</text>
     <rect class="cell" x="434" y="214" width="42" height="34"/><text x="455" y="262" text-anchor="middle" class="off">2</text></g>
  <!-- P2 -->
  <text x="320" y="304" class="pl">P2</text>
  <g><rect class="cell" x="350" y="286" width="42" height="34"/><text x="371" y="334" text-anchor="middle" class="off">0</text>
     <rect class="hot" x="392" y="286" width="42" height="34"/><text x="413" y="334" text-anchor="middle" class="off">1</text>
     <rect class="cell" x="434" y="286" width="42" height="34"/><text x="455" y="334" text-anchor="middle" class="off">2</text>
     <rect class="cell" x="476" y="286" width="42" height="34"/><text x="497" y="334" text-anchor="middle" class="off">3</text>
     <rect class="cell" x="518" y="286" width="42" height="34"/><text x="539" y="334" text-anchor="middle" class="off">4</text></g>
  <text x="586" y="308" class="cap">acct-99</text>

  <!-- producer arrows -->
  <line class="arr" x1="140" y1="170" x2="348" y2="158" marker-end="url(#ak2)"/>
  <line class="arr" x1="140" y1="195" x2="348" y2="230" marker-end="url(#ak2)"/>
  <line class="arr" x1="140" y1="205" x2="348" y2="300" marker-end="url(#ak2)"/>

  <!-- CONSUMER GROUP -->
  <rect class="group" x="760" y="120" width="210" height="230" rx="8"/>
  <text x="865" y="142" text-anchor="middle" class="pl" fill="#26577e">GROUP: billing</text>
  <rect class="box" x="790" y="160" width="150" height="50" rx="5"/><text x="865" y="182" text-anchor="middle" class="pl">C1</text><text x="865" y="200" text-anchor="middle" class="cap">owns P0, P1</text>
  <rect class="box" x="790" y="270" width="150" height="50" rx="5"/><text x="865" y="292" text-anchor="middle" class="pl">C2</text><text x="865" y="310" text-anchor="middle" class="cap">owns P2</text>
  <line class="arr" x1="520" y1="158" x2="788" y2="178" marker-end="url(#ak2)"/>
  <line class="arr" x1="478" y1="230" x2="788" y2="192" marker-end="url(#ak2)"/>
  <line class="arr" x1="562" y1="302" x2="788" y2="294" marker-end="url(#ak2)"/>
  <text x="700" y="372" text-anchor="middle" class="cap">each partition → exactly one consumer in the group</text>

  <text x="500" y="420" text-anchor="middle" class="cap" font-style="italic">Ordering is guaranteed WITHIN a partition (by offset) — NEVER across partitions.</text>
</svg>
