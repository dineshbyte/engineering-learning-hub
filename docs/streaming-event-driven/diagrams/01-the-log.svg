<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="sans-serif">
  <defs>
    <marker id="alg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#333"/></marker>
    <marker id="aA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b06000"/></marker>
    <marker id="aB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2a6099"/></marker>
    <marker id="aC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2f8a4e"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .cell{fill:#eef1f4;stroke:#555;stroke-width:1.3}
      .tail{fill:#fafafa;stroke:#aaa;stroke-width:1.2;stroke-dasharray:4 3}
      .off{font-size:14px;font-weight:bold;fill:#111}
      .lbl{font-size:12px;fill:#222}
      .cap{font-size:11.5px;fill:#555}
      .prod{fill:#f1f1ef;stroke:#444;stroke-width:1.4}
      .cA{font-size:12px;font-weight:bold;fill:#b06000}
      .cB{font-size:12px;font-weight:bold;fill:#2a6099}
      .cC{font-size:12px;font-weight:bold;fill:#2f8a4e}
    </style>
  </defs>
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="480" y="28" text-anchor="middle" class="title">A log: one producer appends, many readers at their own offset</text>

  <text x="120" y="130" class="lbl">LOG (append-only, immutable)</text>
  <g>
    <rect class="cell" x="120" y="142" width="84" height="56"/><text x="162" y="177" text-anchor="middle" class="off">0</text>
    <rect class="cell" x="204" y="142" width="84" height="56"/><text x="246" y="177" text-anchor="middle" class="off">1</text>
    <rect class="cell" x="288" y="142" width="84" height="56"/><text x="330" y="177" text-anchor="middle" class="off">2</text>
    <rect class="cell" x="372" y="142" width="84" height="56"/><text x="414" y="177" text-anchor="middle" class="off">3</text>
    <rect class="cell" x="456" y="142" width="84" height="56"/><text x="498" y="177" text-anchor="middle" class="off">4</text>
    <rect class="cell" x="540" y="142" width="84" height="56"/><text x="582" y="177" text-anchor="middle" class="off">5</text>
    <rect class="cell" x="624" y="142" width="84" height="56"/><text x="666" y="177" text-anchor="middle" class="off">6</text>
    <rect class="cell" x="708" y="142" width="84" height="56"/><text x="750" y="177" text-anchor="middle" class="off">7</text>
    <rect class="tail" x="792" y="142" width="84" height="56"/><text x="834" y="177" text-anchor="middle" class="cap">8…</text>
  </g>
  <rect class="prod" x="800" y="74" width="120" height="40" rx="5"/><text x="860" y="99" text-anchor="middle" class="lbl">PRODUCER</text>
  <line x1="860" y1="114" x2="840" y2="140" stroke="#333" stroke-width="1.8" marker-end="url(#alg)"/>
  <text x="700" y="112" class="cap">append at tail →</text>

  <!-- consumers -->
  <line x1="750" y1="270" x2="750" y2="202" stroke="#b06000" stroke-width="2.4" marker-end="url(#aA)"/>
  <text x="750" y="292" text-anchor="middle" class="cA">Consumer A · offset 7</text>
  <text x="750" y="308" text-anchor="middle" class="cap">caught up</text>
  <line x1="498" y1="330" x2="498" y2="202" stroke="#2a6099" stroke-width="2.4" marker-end="url(#aB)"/>
  <text x="498" y="352" text-anchor="middle" class="cB">Consumer B · offset 4</text>
  <line x1="330" y1="390" x2="330" y2="202" stroke="#2f8a4e" stroke-width="2.4" marker-end="url(#aC)"/>
  <text x="330" y="412" text-anchor="middle" class="cC">Consumer C · offset 2</text>
  <text x="330" y="428" text-anchor="middle" class="cap">replaying history</text>

  <rect x="120" y="452" width="720" height="50" rx="8" fill="#f7f7f5" stroke="#ddd"/>
  <text x="136" y="473" class="cap"><tspan font-weight="bold">QUEUE:</tspan> deletes on read · serves ONE consumer (competing).</text>
  <text x="136" y="492" class="cap"><tspan font-weight="bold">LOG:</tspan> retains records · serves MANY independent readers, each at its own offset · any reader can replay.</text>
</svg>
