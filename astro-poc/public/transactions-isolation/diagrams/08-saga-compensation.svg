<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="sans-serif">
  <defs>
    <marker id="afg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f7a1f"/></marker>
    <marker id="acmp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b00000"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .step{fill:#eef1f4;stroke:#444;stroke-width:1.5}
      .stepT{font-size:13px;font-weight:bold;fill:#111}
      .stepS{font-size:10.5px;fill:#236b3c}
      .fwd{stroke:#1f7a1f;stroke-width:2;fill:none}
      .fwdL{font-size:11px;fill:#1f7a1f}
      .cmp{stroke:#b00000;stroke-width:1.8;fill:none;stroke-dasharray:6 4}
      .cmpL{font-size:11px;fill:#b00000}
      .cap{font-size:11.5px;fill:#555}
      .x{stroke:#b00000;stroke-width:3}
      .badT{font-size:12px;font-weight:bold;fill:#b00000}
    </style>
  </defs>
  <rect width="960" height="440" fill="#ffffff"/>
  <text x="480" y="28" text-anchor="middle" class="title">Saga: commit forward, compensate backward</text>

  <!-- forward arrows -->
  <text x="320" y="118" text-anchor="middle" class="fwdL">order.created</text>
  <line class="fwd" x1="250" y1="124" x2="392" y2="124" marker-end="url(#afg)"/>
  <text x="640" y="118" text-anchor="middle" class="fwdL">payment.charged</text>
  <line class="fwd" x1="570" y1="124" x2="712" y2="124" marker-end="url(#afg)"/>

  <!-- steps -->
  <rect class="step" x="80" y="130" width="170" height="64" rx="6"/>
  <text x="165" y="158" text-anchor="middle" class="stepT">T1: Create Order</text>
  <text x="165" y="180" text-anchor="middle" class="stepS">local txn · COMMIT</text>
  <rect class="step" x="400" y="130" width="170" height="64" rx="6"/>
  <text x="485" y="158" text-anchor="middle" class="stepT">T2: Charge Payment</text>
  <text x="485" y="180" text-anchor="middle" class="stepS">local txn · COMMIT</text>
  <rect class="step" x="720" y="130" width="170" height="64" rx="6" stroke="#b00000"/>
  <text x="805" y="158" text-anchor="middle" class="stepT">T3: Reserve Inventory</text>
  <text x="805" y="180" text-anchor="middle" class="badT">FAILS — out of stock</text>
  <line class="x" x1="788" y1="138" x2="822" y2="172"/><line class="x" x1="822" y1="138" x2="788" y2="172"/>

  <!-- compensation arrows (backward) -->
  <text x="640" y="250" text-anchor="middle" class="cmpL">C2: Refund Payment</text>
  <line class="cmp" x1="770" y1="226" x2="540" y2="256" marker-end="url(#acmp)"/>
  <text x="320" y="288" text-anchor="middle" class="cmpL">C1: Cancel Order</text>
  <line class="cmp" x1="455" y1="262" x2="230" y2="292" marker-end="url(#acmp)"/>
  <text x="805" y="222" text-anchor="middle" class="cap">undo runs in reverse: C2 then C1</text>

  <text x="165" y="324" text-anchor="middle" class="cmpL">Order: CANCELLED</text>
  <text x="485" y="338" text-anchor="middle" class="cmpL">Payment: REFUNDED</text>

  <rect x="150" y="360" width="660" height="56" rx="8" fill="#fbeaea" stroke="#b00000"/>
  <text x="480" y="382" text-anchor="middle" class="cap">Compensations are <tspan font-weight="bold">semantic undo</tspan> (new offsetting transactions), NOT database rollback —</text>
  <text x="480" y="402" text-anchor="middle" class="cap">T1 and T2 already committed durably and may have been observed.</text>
</svg>
