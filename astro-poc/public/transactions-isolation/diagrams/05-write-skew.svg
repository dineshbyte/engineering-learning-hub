<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" font-family="sans-serif">
  <defs>
    <marker id="ar5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6fb0"/></marker>
    <marker id="aw5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c8761f"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .nodeT{font-size:13px;font-weight:bold;fill:#111}
      .node{fill:#eee;stroke:#333;stroke-width:1.5}
      .life{stroke:#9a9a9a;stroke-width:1.2;stroke-dasharray:3 3}
      .read{stroke:#3b6fb0;stroke-width:1.6;fill:none;stroke-dasharray:5 3}
      .write{stroke:#c8761f;stroke-width:1.8;fill:none}
      .lbl{font-size:12px;fill:#222}
      .cap{font-size:11.5px;fill:#555}
      .tbl{fill:#f5f5f3;stroke:#999;stroke-width:1.3}
      .good{font-size:12px;font-weight:bold;fill:#1f7a1f}
      .bad{font-size:13px;font-weight:bold;fill:#b00000}
    </style>
  </defs>
  <rect width="860" height="600" fill="#ffffff"/>
  <text x="430" y="26" text-anchor="middle" class="title">Write skew: an invariant no single transaction broke</text>
  <rect x="180" y="40" width="500" height="26" rx="4" fill="#eef4ea" stroke="#9ac3a4"/>
  <text x="430" y="58" text-anchor="middle" class="good">INVARIANT: at least one doctor on_call = true</text>

  <rect class="node" x="120" y="80" width="100" height="26" rx="4"/><text x="170" y="98" text-anchor="middle" class="nodeT">T1 · Alice</text>
  <rect class="node" x="640" y="80" width="100" height="26" rx="4"/><text x="690" y="98" text-anchor="middle" class="nodeT">T2 · Bob</text>
  <line class="life" x1="170" y1="106" x2="170" y2="500"/>
  <line class="life" x1="690" y1="106" x2="690" y2="500"/>

  <!-- shared table -->
  <rect class="tbl" x="358" y="120" width="144" height="74" rx="5"/>
  <text x="430" y="138" text-anchor="middle" class="cap">doctors</text>
  <text x="430" y="156" text-anchor="middle" class="lbl">alice: on_call ✓</text>
  <text x="430" y="174" text-anchor="middle" class="lbl">bob: on_call ✓</text>
  <text x="430" y="210" text-anchor="middle" class="lbl" fill="#26577e">on-call count = 2</text>

  <!-- reads -->
  <line class="read" x1="356" y1="180" x2="176" y2="240" marker-end="url(#ar5)"/>
  <text x="170" y="262" text-anchor="middle" class="lbl">r1: count → 2</text>
  <line class="read" x1="504" y1="184" x2="684" y2="262" marker-end="url(#ar5)"/>
  <text x="690" y="284" text-anchor="middle" class="lbl">r2: count → 2</text>
  <text x="430" y="248" text-anchor="middle" class="cap">both read the same pre-write snapshot (2)</text>
  <text x="170" y="296" text-anchor="middle" class="cap">"2 ≥ 1, safe to leave"</text>
  <text x="690" y="316" text-anchor="middle" class="cap">"2 ≥ 1, safe to leave"</text>

  <!-- writes -->
  <line class="write" x1="176" y1="350" x2="360" y2="368" marker-end="url(#aw5)"/>
  <text x="170" y="346" text-anchor="middle" class="lbl">w1: alice → false</text>
  <line class="write" x1="684" y1="392" x2="500" y2="376" marker-end="url(#aw5)"/>
  <text x="690" y="388" text-anchor="middle" class="lbl">w2: bob → false</text>
  <text x="430" y="356" text-anchor="middle" class="cap">writes hit <tspan font-weight="bold">different rows</tspan></text>
  <text x="430" y="416" text-anchor="middle" class="cap">no write-write conflict → Snapshot Isolation lets both commit</text>
  <text x="170" y="446" text-anchor="middle" class="good">COMMIT</text>
  <text x="690" y="446" text-anchor="middle" class="good">COMMIT</text>

  <rect x="290" y="470" width="280" height="56" rx="6" fill="#fbeaea" stroke="#b00000" stroke-width="1.6"/>
  <text x="430" y="492" text-anchor="middle" class="bad">on-call count = 0</text>
  <text x="430" y="512" text-anchor="middle" class="cap">INVARIANT VIOLATED — yet neither T1 nor T2 was wrong alone</text>

  <text x="430" y="560" text-anchor="middle" class="cap">Each read an overlapping set and wrote a disjoint row. That is write skew — and SI does not stop it.</text>
</svg>
