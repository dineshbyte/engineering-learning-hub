<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" font-family="sans-serif">
  <defs>
    <marker id="sa1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .lane{fill:#f7f8fa;stroke:#ccd2da;stroke-width:1.2}
      .laneA{fill:#eef5ff;stroke:#2a6099;stroke-width:1.4}
      .laneB{fill:#eefaf0;stroke:#1f7a1f;stroke-width:1.4}
      .step{font-size:12px;fill:#222}
      .mono{font-size:11px;font-family:monospace;fill:#222}
      .hd{font-size:13px;font-weight:bold;fill:#111}
      .sub{font-size:10.5px;fill:#555}
      .bad{font-size:13px;font-weight:bold;fill:#b00000}
      .good{font-size:11.5px;font-weight:bold;fill:#1f7a1f}
      .read{font-size:11px;font-weight:bold;fill:#26577e}
    </style>
  </defs>
  <rect width="1040" height="560" fill="#ffffff"/>
  <text x="520" y="28" text-anchor="middle" class="title">Write skew: both read "2 on call", each takes itself off — invariant "≥1 on call" breaks</text>

  <!-- shared table -->
  <rect class="lane" x="380" y="56" width="280" height="58" rx="8"/>
  <text x="520" y="78" text-anchor="middle" class="hd">on_call (shift = today)</text>
  <text x="520" y="100" text-anchor="middle" class="mono">Alice = true   ·   Bob = true   → count = 2</text>

  <!-- Alice lane -->
  <rect class="laneA" x="40" y="150" width="440" height="280" rx="10"/>
  <text x="260" y="176" text-anchor="middle" class="hd" fill="#26577e">Transaction A (Alice)</text>
  <text x="60" y="210" class="read">SELECT count(*) → 2</text>
  <text x="60" y="230" class="sub">snapshot @ start: sees Alice=true, Bob=true</text>
  <text x="60" y="266" class="step">"2 on call — fine, I can go off."</text>
  <rect x="60" y="284" width="360" height="34" rx="5" fill="#dbe7f3" stroke="#2a6099"/>
  <text x="74" y="306" class="mono">UPDATE on_call SET Alice = false</text>
  <text x="60" y="350" class="good">COMMIT ✓</text>
  <text x="60" y="372" class="sub">writes only Alice's row</text>

  <!-- Bob lane -->
  <rect class="laneB" x="560" y="150" width="440" height="280" rx="10"/>
  <text x="780" y="176" text-anchor="middle" class="hd" fill="#1f7a1f">Transaction B (Bob)</text>
  <text x="580" y="210" class="read" fill="#1f7a1f">SELECT count(*) → 2</text>
  <text x="580" y="230" class="sub">own snapshot @ start: sees Alice=true, Bob=true</text>
  <text x="580" y="266" class="step">"2 on call — fine, I can go off."</text>
  <rect x="580" y="284" width="360" height="34" rx="5" fill="#dcefe0" stroke="#1f7a1f"/>
  <text x="594" y="306" class="mono">UPDATE on_call SET Bob = false</text>
  <text x="580" y="350" class="good">COMMIT ✓</text>
  <text x="580" y="372" class="sub">writes only Bob's row — no row conflicts with A</text>

  <!-- no write-write conflict note -->
  <text x="520" y="408" text-anchor="middle" class="sub">different rows → no write-write conflict → first-committer-wins never fires</text>

  <!-- result -->
  <rect x="300" y="446" width="440" height="44" rx="8" fill="#fbeaea" stroke="#b00000"/>
  <text x="520" y="474" text-anchor="middle" class="bad">Result: 0 doctors on call — invariant violated</text>

  <rect x="120" y="506" width="800" height="40" rx="8" fill="#f6f7f6" stroke="#ddd"/>
  <text x="520" y="531" text-anchor="middle" class="hd">Serial A→B or B→A: the second reads count = 1 and is refused. No serial order yields this state.</text>
</svg>
