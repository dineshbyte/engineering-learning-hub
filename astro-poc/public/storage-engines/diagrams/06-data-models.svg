<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="sans-serif">
  <defs>
    <marker id="ad6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b06000"/></marker>
    <marker id="ae6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2a6099"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .tbl{fill:#f4f4f2;stroke:#888;stroke-width:1.2}
      .tblH{fill:#e7e7e3;stroke:#888;stroke-width:1.2}
      .mono{font-size:10.5px;fill:#222;font-family:monospace}
      .tag{font-size:9px;font-weight:bold;fill:#b06000}
      .join{stroke:#b06000;stroke-width:1.6;fill:none}
      .doc{fill:#eef5ff;stroke:#2a6099;stroke-width:1.4}
      .node{fill:#eee;stroke:#444;stroke-width:1.5}
      .edge{stroke:#2a6099;stroke-width:1.8;fill:none}
      .edgeL{font-size:10px;font-weight:bold;fill:#2a6099}
      .cap{font-size:11px;fill:#555}
    </style>
  </defs>
  <rect width="1000" height="560" fill="#ffffff"/>
  <text x="500" y="26" text-anchor="middle" class="title">Same data, three shapes — each makes a different relationship cheap</text>
  <line x1="340" y1="44" x2="340" y2="500" stroke="#dcdcdc"/>
  <line x1="672" y1="44" x2="672" y2="500" stroke="#dcdcdc"/>

  <!-- RELATIONAL -->
  <text x="175" y="70" text-anchor="middle" class="h">RELATIONAL</text>
  <rect class="tblH" x="40" y="84" width="240" height="22"/><text x="50" y="100" class="mono">users:  id(PK) | name | email</text>
  <rect class="tbl"  x="40" y="106" width="240" height="22"/><text x="50" y="122" class="mono">u1 | Ada | ada@x</text>
  <rect class="tblH" x="40" y="160" width="240" height="22"/><text x="50" y="176" class="mono">posts:  id | author_id(FK) | body</text>
  <rect class="tbl"  x="40" y="182" width="240" height="22"/><text x="50" y="198" class="mono">p1 | u1 | first!</text>
  <rect class="tbl"  x="40" y="204" width="240" height="22"/><text x="50" y="220" class="mono">p2 | u1 | again</text>
  <rect class="tblH" x="40" y="262" width="240" height="22"/><text x="50" y="278" class="mono">friends: user_id(FK) | friend_id(FK)</text>
  <rect class="tbl"  x="40" y="284" width="240" height="22"/><text x="50" y="300" class="mono">u1 | u2</text>
  <path class="join" d="M120,182 C 100,150 100,128 118,118" marker-end="url(#ad6)"/>
  <text x="60" y="150" class="tag">JOIN author_id = id</text>
  <text x="175" y="340" text-anchor="middle" class="cap">rows wired by FK values,</text>
  <text x="175" y="356" text-anchor="middle" class="cap">assembled at query time</text>

  <!-- DOCUMENT -->
  <text x="506" y="70" text-anchor="middle" class="h">DOCUMENT</text>
  <rect class="doc" x="356" y="84" width="300" height="220" rx="6"/>
  <text x="370" y="108" class="mono">{</text>
  <text x="382" y="126" class="mono">"id": "u1", "name": "Ada",</text>
  <text x="382" y="144" class="mono">"email": "ada@x",</text>
  <text x="382" y="162" class="mono">"posts": [</text>
  <rect x="392" y="170" width="248" height="58" rx="3" fill="#dcebfb" stroke="#9cc3ee"/>
  <text x="400" y="188" class="mono">{ "id":"p1", "body":"first!" },</text>
  <text x="400" y="206" class="mono">{ "id":"p2", "body":"again" }</text>
  <text x="382" y="246" class="mono">],</text>
  <text x="382" y="264" class="mono">"friends": ["u2"]</text>
  <text x="370" y="282" class="mono">}</text>
  <text x="506" y="340" text-anchor="middle" class="cap">everything for Ada in ONE</text>
  <text x="506" y="356" text-anchor="middle" class="cap">document — one contiguous read</text>

  <!-- GRAPH -->
  <text x="836" y="70" text-anchor="middle" class="h">GRAPH</text>
  <circle class="node" cx="740" cy="130" r="34"/><text x="740" y="135" text-anchor="middle" class="mono">Ada u1</text>
  <circle class="node" cx="920" cy="130" r="34"/><text x="920" y="135" text-anchor="middle" class="mono">Bob u2</text>
  <circle class="node" cx="730" cy="270" r="32"/><text x="730" y="275" text-anchor="middle" class="mono">Post p1</text>
  <circle class="node" cx="880" cy="290" r="32"/><text x="880" y="295" text-anchor="middle" class="mono">Post p2</text>
  <line class="edge" x1="774" y1="135" x2="886" y2="135" marker-end="url(#ae6)"/><text x="800" y="124" class="edgeL">FRIEND_OF</text>
  <line class="edge" x1="736" y1="164" x2="731" y2="236" marker-end="url(#ae6)"/><text x="690" y="210" class="edgeL">AUTHORED</text>
  <line class="edge" x1="756" y1="162" x2="862" y2="262" marker-end="url(#ae6)"/><text x="810" y="210" class="edgeL">AUTHORED</text>
  <text x="836" y="356" text-anchor="middle" class="cap">relationships are first-class,</text>
  <text x="836" y="372" text-anchor="middle" class="cap">labeled edges you walk</text>

  <text x="500" y="470" text-anchor="middle" class="cap">relational = ad-hoc joins   ·   document = load one aggregate   ·   graph = many-hop traversal.  Pick by the dominant access pattern.</text>
</svg>
