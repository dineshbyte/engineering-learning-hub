<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" font-family="sans-serif">
  <defs>
    <marker id="ah12" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .nodeT{font-size:12px;font-weight:bold;fill:#111}
      .node{fill:#eee;stroke:#333;stroke-width:1.4}
      .life{stroke:#9a9a9a;stroke-width:1;stroke-dasharray:3 3}
      .msg{stroke:#222;stroke-width:1.6;fill:none}
      .none{stroke:#999;stroke-width:1.4;fill:none;stroke-dasharray:6 4}
      .mlbl{font-size:11.5px;fill:#333}
      .cell{fill:#cfd6df;stroke:#555;stroke-width:1}
      .cellN{fill:#ffffff;stroke:#999;stroke-width:1;stroke-dasharray:3 2}
      .new{fill:#86b886;stroke:#2f6b2f;stroke-width:1}
      .sm{fill:#d8efd8;stroke:#2f8a4e;stroke-width:1.2}
      .smT{font-size:10px;fill:#236b3c}
      .cap{font-size:12px;fill:#555}
      .commit{stroke:#2f6b2f;stroke-width:2;stroke-dasharray:7 4}
    </style>
  </defs>
  <rect width="920" height="600" fill="#ffffff"/>
  <text x="460" y="24" text-anchor="middle" class="title">Raft log replication: append ≠ commit</text>

  <!-- nodes + log strips -->
  <!-- LEADER -->
  <rect class="node" x="96" y="40" width="68" height="24" rx="4"/><text x="130" y="57" text-anchor="middle" class="nodeT">LEADER</text>
  <rect class="cell" x="106" y="70" width="16" height="16"/><rect class="cell" x="122" y="70" width="16" height="16"/><rect class="new" x="138" y="70" width="16" height="16"/>
  <text x="146" y="100" text-anchor="middle" class="smT">x=7</text>
  <!-- followers -->
  <g>
    <rect class="node" x="276" y="40" width="48" height="24" rx="4"/><text x="300" y="57" text-anchor="middle" class="nodeT">F1</text>
    <rect class="cell" x="276" y="70" width="16" height="16"/><rect class="cell" x="292" y="70" width="16" height="16"/><rect class="cellN" x="308" y="70" width="16" height="16"/>
    <rect class="node" x="436" y="40" width="48" height="24" rx="4"/><text x="460" y="57" text-anchor="middle" class="nodeT">F2</text>
    <rect class="cell" x="436" y="70" width="16" height="16"/><rect class="cell" x="452" y="70" width="16" height="16"/><rect class="cellN" x="468" y="70" width="16" height="16"/>
    <rect class="node" x="596" y="40" width="48" height="24" rx="4"/><text x="620" y="57" text-anchor="middle" class="nodeT">F3</text>
    <rect class="cell" x="596" y="70" width="16" height="16"/><rect class="cell" x="612" y="70" width="16" height="16"/><rect class="cellN" x="628" y="70" width="16" height="16"/>
    <rect class="node" x="756" y="40" width="48" height="24" rx="4"/><text x="780" y="57" text-anchor="middle" class="nodeT">F4</text>
    <rect class="cell" x="756" y="70" width="16" height="16"/><rect class="cell" x="772" y="70" width="16" height="16"/><rect class="cellN" x="788" y="70" width="16" height="16"/>
  </g>
  <text x="60" y="82" text-anchor="end" class="cap">log:</text>

  <line class="life" x1="130" y1="106" x2="130" y2="580"/>
  <line class="life" x1="300" y1="106" x2="300" y2="580"/>
  <line class="life" x1="460" y1="106" x2="460" y2="580"/>
  <line class="life" x1="620" y1="106" x2="620" y2="580"/>
  <line class="life" x1="780" y1="106" x2="780" y2="580"/>

  <!-- client write -->
  <text x="30" y="124" class="mlbl">set x=7</text>
  <line class="msg" x1="24" y1="130" x2="126" y2="138" marker-end="url(#ah12)"/>
  <text x="138" y="128" class="cap">append index 3 (term 5)</text>

  <!-- AppendEntries -->
  <text x="210" y="162" class="mlbl">AppendEntries(idx 3, term 5) →</text>
  <line class="msg" x1="130" y1="156" x2="296" y2="184" marker-end="url(#ah12)"/>
  <line class="msg" x1="130" y1="158" x2="456" y2="190" marker-end="url(#ah12)"/>
  <line class="msg" x1="130" y1="160" x2="616" y2="196" marker-end="url(#ah12)"/>
  <line class="none" x1="130" y1="162" x2="776" y2="202" marker-end="url(#ah12)"/>
  <text x="640" y="186" class="cap">F4 partitioned</text>

  <!-- acks -->
  <text x="200" y="236" class="mlbl">ack</text>
  <line class="msg" x1="300" y1="220" x2="136" y2="248" marker-end="url(#ah12)"/>
  <line class="msg" x1="460" y1="222" x2="136" y2="252" marker-end="url(#ah12)"/>
  <line class="msg" x1="620" y1="224" x2="136" y2="256" marker-end="url(#ah12)"/>

  <!-- commit line -->
  <line class="commit" x1="40" y1="290" x2="880" y2="290"/>
  <text x="460" y="284" text-anchor="middle" class="cap" fill="#2f6b2f">COMMITTED — entry now stored on a majority (LEADER + F1 + F2 = 3 of 5).  F4 lagging does not block commit.</text>

  <!-- apply to state machine -->
  <rect class="sm" x="106" y="312" width="48" height="22" rx="3"/><text x="130" y="327" text-anchor="middle" class="smT">apply</text>
  <rect class="sm" x="278" y="312" width="44" height="22" rx="3"/><text x="300" y="327" text-anchor="middle" class="smT">apply</text>
  <rect class="sm" x="438" y="312" width="44" height="22" rx="3"/><text x="460" y="327" text-anchor="middle" class="smT">apply</text>
  <rect class="sm" x="598" y="312" width="44" height="22" rx="3"/><text x="620" y="327" text-anchor="middle" class="smT">apply</text>
  <text x="690" y="327" class="cap">→ state machine: x = 7</text>

  <!-- client ack -->
  <text x="30" y="366" class="mlbl">ok (committed)</text>
  <line class="msg" x1="126" y1="356" x2="24" y2="366" marker-end="url(#ah12)"/>

  <!-- F4 catch-up -->
  <text x="300" y="430" class="mlbl">later: F4 reconnects → AppendEntries (retry)</text>
  <line class="msg" x1="130" y1="436" x2="776" y2="452" marker-end="url(#ah12)"/>
  <rect class="new" x="788" y="468" width="16" height="16"/>
  <text x="780" y="500" text-anchor="middle" class="cap">F4 catches up</text>

  <text x="460" y="556" text-anchor="middle" class="cap">Append ≠ commit. An entry commits once a majority store it; only then is it applied and the client acked.</text>
  <text x="460" y="576" text-anchor="middle" class="cap">A lagging or partitioned follower catches up later, without affecting safety.</text>
</svg>
