<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="sans-serif">
  <defs>
    <marker id="af8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b00000"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .hbad{font-size:13px;font-weight:bold;fill:#b00000}
      .hgood{font-size:13px;font-weight:bold;fill:#1f7a1f}
      .sn{font-size:12px;font-weight:bold;fill:#111}
      .t1{fill:#eeeeee;stroke:#999;stroke-width:1}
      .t2{fill:#dbe7f3;stroke:#2a6099;stroke-width:1}
      .t3{fill:#fbe0e0;stroke:#b00000;stroke-width:1}
      .t4{fill:#dff0e3;stroke:#1f7a1f;stroke-width:1}
      .ct{font-size:10px;font-weight:bold;fill:#111}
      .idx{font-size:9px;fill:#888}
      .sub{font-size:10.5px;fill:#444}
      .lead{font-size:9px;font-weight:bold;fill:#1f7a1f}
      .box{fill:#fbeaea;stroke:#b00000;stroke-width:1.4}
      .boxG{fill:#e9f6ec;stroke:#1f7a1f;stroke-width:1.4}
    </style>
  </defs>
  <rect width="1000" height="600" fill="#ffffff"/>
  <text x="500" y="26" text-anchor="middle" class="title">Figure 8: an old-term entry on a majority is still not safe</text>
  <line x1="500" y1="44" x2="500" y2="520" stroke="#dcdcdc"/>

  <!-- LEFT: unsafe -->
  <text x="40" y="68" class="hbad">Counting replicas alone — UNSAFE</text>
  <!-- index header -->
  <text x="96" y="86" class="idx">1</text><text x="132" y="86" class="idx">2</text><text x="168" y="86" class="idx">3</text>
  <!-- S1 leader t4 -->
  <text x="40" y="106" class="sn">S1</text><rect class="t1" x="80" y="92" width="34" height="22"/><text x="97" y="108" text-anchor="middle" class="ct">t1</text><rect class="t2" x="116" y="92" width="34" height="22"/><text x="133" y="108" text-anchor="middle" class="ct">t2</text><text x="195" y="108" class="lead">leader t4</text>
  <text x="40" y="134" class="sn">S2</text><rect class="t1" x="80" y="120" width="34" height="22"/><text x="97" y="136" text-anchor="middle" class="ct">t1</text><rect class="t2" x="116" y="120" width="34" height="22"/><text x="133" y="136" text-anchor="middle" class="ct">t2</text>
  <text x="40" y="162" class="sn">S3</text><rect class="t1" x="80" y="148" width="34" height="22"/><text x="97" y="164" text-anchor="middle" class="ct">t1</text><rect class="t2" x="116" y="148" width="34" height="22"/><text x="133" y="164" text-anchor="middle" class="ct">t2</text>
  <text x="40" y="190" class="sn">S4</text><rect class="t1" x="80" y="176" width="34" height="22"/><text x="97" y="192" text-anchor="middle" class="ct">t1</text>
  <text x="40" y="218" class="sn">S5</text><rect class="t1" x="80" y="204" width="34" height="22"/><text x="97" y="220" text-anchor="middle" class="ct">t1</text><rect class="t3" x="116" y="204" width="34" height="22"/><text x="133" y="220" text-anchor="middle" class="ct">t3</text>
  <text x="40" y="252" class="sub">idx 2 (term 2, blue) sits on S1,S2,S3 — a majority.</text>
  <line x1="240" y1="262" x2="240" y2="300" stroke="#b00000" stroke-width="1.6" marker-end="url(#af8)"/>
  <rect class="box" x="40" y="304" width="430" height="86" rx="6"/>
  <text x="56" y="326" class="hbad">If S1 commits it now…</text>
  <text x="56" y="346" class="sub">S5's last entry is term 3 — a higher term — so S5's log looks</text>
  <text x="56" y="362" class="sub">"more up-to-date". S5 can win term 5 and force its idx2 (red, t3)</text>
  <text x="56" y="378" class="sub">onto S1,S2,S3 — overwriting the "committed" entry. Agreement broken.</text>

  <!-- RIGHT: safe -->
  <text x="540" y="68" class="hgood">Commit a current-term entry — SAFE</text>
  <text x="596" y="86" class="idx">1</text><text x="632" y="86" class="idx">2</text><text x="668" y="86" class="idx">3</text>
  <text x="540" y="106" class="sn">S1</text><rect class="t1" x="580" y="92" width="34" height="22"/><text x="597" y="108" text-anchor="middle" class="ct">t1</text><rect class="t2" x="616" y="92" width="34" height="22"/><text x="633" y="108" text-anchor="middle" class="ct">t2</text><rect class="t4" x="652" y="92" width="34" height="22"/><text x="669" y="108" text-anchor="middle" class="ct">t4</text><text x="695" y="108" class="lead">leader t4</text>
  <text x="540" y="134" class="sn">S2</text><rect class="t1" x="580" y="120" width="34" height="22"/><text x="597" y="136" text-anchor="middle" class="ct">t1</text><rect class="t2" x="616" y="120" width="34" height="22"/><text x="633" y="136" text-anchor="middle" class="ct">t2</text><rect class="t4" x="652" y="120" width="34" height="22"/><text x="669" y="136" text-anchor="middle" class="ct">t4</text>
  <text x="540" y="162" class="sn">S3</text><rect class="t1" x="580" y="148" width="34" height="22"/><text x="597" y="164" text-anchor="middle" class="ct">t1</text><rect class="t2" x="616" y="148" width="34" height="22"/><text x="633" y="164" text-anchor="middle" class="ct">t2</text><rect class="t4" x="652" y="148" width="34" height="22"/><text x="669" y="164" text-anchor="middle" class="ct">t4</text>
  <text x="540" y="190" class="sn">S4</text><rect class="t1" x="580" y="176" width="34" height="22"/><text x="597" y="192" text-anchor="middle" class="ct">t1</text>
  <text x="540" y="218" class="sn">S5</text><rect class="t1" x="580" y="204" width="34" height="22"/><text x="597" y="220" text-anchor="middle" class="ct">t1</text><rect class="t3" x="616" y="204" width="34" height="22"/><text x="633" y="220" text-anchor="middle" class="ct">t3</text>
  <text x="540" y="252" class="sub">idx 3 (term 4, green = current term) is on a majority.</text>
  <rect class="boxG" x="540" y="304" width="430" height="86" rx="6"/>
  <text x="556" y="326" class="hgood">idx 3 (t4) commits → idx 2 rides along (Log Matching).</text>
  <text x="556" y="346" class="sub">Now S5 lacks idx 3, so its log is no longer "up-to-date" —</text>
  <text x="556" y="362" class="sub">it can never win another election. idx 2 is permanently safe.</text>
  <text x="556" y="382" class="sub">Commit is only ever decided through a current-term entry.</text>

  <rect x="120" y="440" width="760" height="50" rx="8" fill="#fff7e6" stroke="#b58a3b"/>
  <text x="500" y="462" text-anchor="middle" class="h">The rule: a leader commits an entry only once it replicates an entry from its OWN term on a majority.</text>
  <text x="500" y="480" text-anchor="middle" class="sub">Earlier-term entries are committed indirectly, carried along by Log Matching.</text>
</svg>
