<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 500" font-family="sans-serif">
  <defs>
    <marker id="ab3c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b06000"/></marker>
    <marker id="ah3c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .barbg{fill:#f3f3f3;stroke:#999;stroke-width:1.2}
      .fill{fill:#7fa8d8}
      .full{fill:#e0857d}
      .cap{stroke:#b00000;stroke-width:1.6;stroke-dasharray:5 3}
      .nt{font-size:12px;font-weight:bold;fill:#111}
      .sub{font-size:10.5px;fill:#555}
      .bad{font-size:11px;font-weight:bold;fill:#b00000}
      .key{fill:#b06000;stroke:#7a4400;stroke-width:1}
      .ov{stroke:#b06000;stroke-width:2;fill:none}
    </style>
  </defs>
  <rect width="1020" height="500" fill="#ffffff"/>
  <text x="510" y="28" text-anchor="middle" class="title">Consistent hashing with bounded loads: overflow when a node is full</text>

  <!-- cap line across -->
  <line class="cap" x1="80" y1="120" x2="900" y2="120"/>
  <text x="910" y="124" class="bad">cap = (1+ε)·avg</text>

  <!-- nodes as capacity bars (container 120..320 = full height) -->
  <!-- N1 full -->
  <rect class="barbg" x="150" y="120" width="90" height="200"/><rect class="full" x="150" y="120" width="90" height="200"/><text x="195" y="340" text-anchor="middle" class="nt">N1</text><text x="195" y="356" text-anchor="middle" class="bad">FULL</text>
  <!-- N2 room -->
  <rect class="barbg" x="350" y="120" width="90" height="200"/><rect class="fill" x="350" y="200" width="90" height="120"/><text x="395" y="340" text-anchor="middle" class="nt">N2</text><text x="395" y="356" text-anchor="middle" class="sub">has room</text>
  <!-- N3 -->
  <rect class="barbg" x="550" y="120" width="90" height="200"/><rect class="fill" x="550" y="190" width="90" height="130"/><text x="595" y="340" text-anchor="middle" class="nt">N3</text>
  <!-- N4 -->
  <rect class="barbg" x="750" y="120" width="90" height="200"/><rect class="fill" x="750" y="170" width="90" height="150"/><text x="795" y="340" text-anchor="middle" class="nt">N4</text>

  <!-- incoming key -->
  <circle class="key" cx="195" cy="60" r="10"/><text x="215" y="64" class="sub">new key</text>
  <line x1="195" y1="70" x2="195" y2="116" stroke="#444" stroke-width="1.6" marker-end="url(#ah3c)"/>
  <text x="100" y="100" class="sub">home node →</text>

  <!-- overflow arrow N1 -> N2 -->
  <path class="ov" d="M242,140 C 300,90 320,90 372,196" marker-end="url(#ab3c)"/>
  <text x="300" y="108" class="bad">N1 full → walk clockwise</text>
  <circle class="key" cx="395" cy="208" r="9"/>
  <text x="395" y="184" text-anchor="middle" class="sub">placed in N2 (next with room)</text>

  <rect x="120" y="400" width="780" height="64" rx="10" fill="#f6f7f6" stroke="#ddd"/>
  <text x="510" y="426" text-anchor="middle" class="title" font-size="13">No node ever exceeds (1+ε)× the average load.</text>
  <text x="510" y="448" text-anchor="middle" class="sub">ε small → tighter balance but more overflow movement on change · ε large → looser but cheaper. (Mirrokni et al. 2016.)</text>
</svg>
