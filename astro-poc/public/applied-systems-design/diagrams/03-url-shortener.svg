<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" font-family="sans-serif">
  <defs>
    <marker id="au3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <marker id="ag3b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f7a1f"/></marker>
    <marker id="am3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b06000"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .band1{fill:#f6f6f4;stroke:#ddd;stroke-width:1}
      .band2{fill:#fff6ea;stroke:#e0c08a;stroke-width:1.4}
      .h{font-size:12px;font-weight:bold;fill:#111}
      .box{fill:#eef1f4;stroke:#444;stroke-width:1.3}
      .cache{fill:#fff3d6;stroke:#b58a3b;stroke-width:1.4}
      .b62{fill:#eef5ff;stroke:#2a6099;stroke-width:1.3}
      .kv{fill:#e9f6ec;stroke:#1f7a1f;stroke-width:1.4}
      .boxT{font-size:11px;font-weight:bold;fill:#111}
      .sub{font-size:9.5px;fill:#555}
      .arr{stroke:#444;stroke-width:1.5;fill:none}
      .hit{stroke:#1f7a1f;stroke-width:1.8;fill:none}
      .miss{stroke:#b06000;stroke-width:1.8;fill:none;stroke-dasharray:5 3}
      .qps{font-size:11px;font-weight:bold;fill:#b00000}
    </style>
  </defs>
  <rect width="1040" height="560" fill="#ffffff"/>
  <text x="520" y="26" text-anchor="middle" class="title">URL shortener: a thin write path, a hot cached read path</text>

  <!-- shared KV store (right) -->
  <rect class="kv" x="850" y="140" width="160" height="56" rx="8"/><text x="930" y="164" text-anchor="middle" class="boxT">Key-Value Store</text><text x="930" y="180" text-anchor="middle" class="sub">code → longUrl (Book 3)</text>
  <rect class="box" x="870" y="320" width="120" height="34" rx="6"/><text x="930" y="338" text-anchor="middle" class="sub">Read replicas</text><text x="930" y="350" text-anchor="middle" class="sub">(Book 1)</text>
  <line class="arr" x1="930" y1="196" x2="930" y2="318" stroke-dasharray="4 3" marker-end="url(#au3)"/><text x="940" y="260" class="sub">replicate</text>

  <!-- WRITE PATH -->
  <rect class="band1" x="20" y="58" width="800" height="100" rx="6"/>
  <text x="34" y="78" class="h">WRITE PATH</text><text x="120" y="78" class="qps">~1,160 wps (low volume)</text>
  <rect class="box" x="40" y="92" width="120" height="40" rx="5"/><text x="100" y="110" text-anchor="middle" class="boxT">Client</text><text x="100" y="124" text-anchor="middle" class="sub">POST /shorten</text>
  <line class="arr" x1="160" y1="112" x2="200" y2="112" marker-end="url(#au3)"/>
  <rect class="box" x="202" y="92" width="100" height="40" rx="5"/><text x="252" y="116" text-anchor="middle" class="boxT">App Server</text>
  <rect class="box" x="340" y="92" width="120" height="40" rx="5"/><text x="400" y="110" text-anchor="middle" class="sub">Counter (next id)</text><text x="400" y="124" text-anchor="middle" class="sub">atomic ++, Book 2</text>
  <line class="arr" x1="302" y1="112" x2="338" y2="112" marker-end="url(#au3)"/><text x="320" y="104" class="sub">id=125</text>
  <rect class="b62" x="500" y="92" width="120" height="40" rx="5"/><text x="560" y="110" text-anchor="middle" class="boxT" fill="#26577e">base62 encode</text><text x="560" y="124" text-anchor="middle" class="sub">125 → "cb"</text>
  <line class="arr" x1="460" y1="112" x2="498" y2="112" marker-end="url(#au3)"/>
  <line class="arr" x1="620" y1="112" x2="848" y2="150" marker-end="url(#au3)"/><text x="700" y="124" class="sub">store {code → url}</text>

  <!-- READ PATH (emphasized) -->
  <rect class="band2" x="20" y="240" width="800" height="150" rx="6"/>
  <text x="34" y="262" class="h">READ PATH</text><text x="120" y="262" class="qps">~116,000 rps — HOT critical path</text>
  <rect class="box" x="40" y="280" width="110" height="40" rx="5"/><text x="95" y="298" text-anchor="middle" class="boxT">Client</text><text x="95" y="312" text-anchor="middle" class="sub">GET /abc123</text>
  <line class="arr" x1="150" y1="300" x2="186" y2="300" marker-end="url(#au3)"/>
  <rect class="box" x="188" y="280" width="110" height="40" rx="5"/><text x="243" y="298" text-anchor="middle" class="sub">CDN / LB</text><text x="243" y="312" text-anchor="middle" class="sub">edge cache</text>
  <line class="arr" x1="298" y1="300" x2="334" y2="300" marker-end="url(#au3)"/>
  <rect class="box" x="336" y="280" width="100" height="40" rx="5"/><text x="386" y="304" text-anchor="middle" class="boxT">App Server</text>
  <line class="arr" x1="436" y1="300" x2="472" y2="300" marker-end="url(#au3)"/>
  <rect class="cache" x="474" y="280" width="120" height="40" rx="5"/><text x="534" y="298" text-anchor="middle" class="boxT">Cache (LRU)</text><text x="534" y="312" text-anchor="middle" class="sub">Redis</text>
  <path class="hit" d="M474,290 C 420,250 200,250 95,278" marker-end="url(#ag3b)"/><text x="280" y="246" class="sub" fill="#1f7a1f">HIT → 302 redirect (≈100 ns)</text>
  <line class="miss" x1="594" y1="300" x2="848" y2="330" marker-end="url(#am3)"/><text x="650" y="318" class="sub" fill="#b06000">MISS → read store</text>
  <path class="miss" d="M870,320 C 700,360 640,340 596,316" marker-end="url(#am3)"/><text x="700" y="372" class="sub" fill="#b06000">populate cache</text>

  <text x="420" y="430" text-anchor="middle" class="sub">The write path is thin; the read path is everything. CDN + cache absorb almost all reads before the store is touched.</text>
</svg>
