<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 520" font-family="sans-serif">
  <defs>
    <marker id="ae1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .box{fill:#eef1f4;stroke:#444;stroke-width:1.3}
      .pid{fill:#eef5ff;stroke:#2a6099;stroke-width:1.4}
      .brk{fill:#f6f6f4;stroke:#888;stroke-width:1.4}
      .batch{fill:#fff;stroke:#444;stroke-width:1.2}
      .acc{fill:#dff0e3;stroke:#1f7a1f;stroke-width:1.3}
      .dup{fill:#fff3d6;stroke:#b58a3b;stroke-width:1.3}
      .err{fill:#fbeaea;stroke:#b00000;stroke-width:1.3}
      .mono{font-size:12px;font-family:monospace;fill:#111}
      .vt{font-size:11px;font-weight:bold;fill:#111}
      .sub{font-size:10px;fill:#555}
      .arr{stroke:#444;stroke-width:1.4;fill:none}
      .good{font-size:11px;font-weight:bold;fill:#1f7a1f}
      .warn{font-size:11px;font-weight:bold;fill:#a6601a}
      .bad{font-size:11px;font-weight:bold;fill:#b00000}
    </style>
  </defs>
  <rect width="1020" height="520" fill="#ffffff"/>
  <text x="510" y="26" text-anchor="middle" class="title">The idempotent producer: the broker dedupes retries by sequence number</text>

  <rect class="pid" x="40" y="60" width="180" height="44" rx="6"/><text x="130" y="80" text-anchor="middle" class="vt" fill="#26577e">Producer · PID = 42</text><text x="130" y="96" text-anchor="middle" class="sub">monotonic seq per partition</text>
  <rect class="brk" x="780" y="60" width="200" height="44" rx="6"/><text x="880" y="80" text-anchor="middle" class="vt">Broker (partition P0)</text><text x="880" y="96" text-anchor="middle" class="sub">tracks last accepted seq</text>

  <!-- rows -->
  <!-- seq 0 -->
  <rect class="batch" x="60" y="140" width="120" height="30" rx="4"/><text x="120" y="160" text-anchor="middle" class="mono">seq = 0</text>
  <line class="arr" x1="180" y1="155" x2="540" y2="155" marker-end="url(#ae1)"/>
  <rect class="acc" x="544" y="140" width="420" height="30" rx="4"/><text x="560" y="160" class="good">seq = last+1 → ACCEPT · last = 0</text>
  <!-- seq 1 -->
  <rect class="batch" x="60" y="186" width="120" height="30" rx="4"/><text x="120" y="206" text-anchor="middle" class="mono">seq = 1</text>
  <line class="arr" x1="180" y1="201" x2="540" y2="201" marker-end="url(#ae1)"/>
  <rect class="acc" x="544" y="186" width="420" height="30" rx="4"/><text x="560" y="206" class="good">seq = last+1 → ACCEPT · last = 1</text>
  <!-- seq 1 retry -->
  <rect class="batch" x="60" y="232" width="160" height="30" rx="4"/><text x="140" y="252" text-anchor="middle" class="mono">seq = 1 (retry)</text>
  <line class="arr" x1="220" y1="247" x2="540" y2="247" marker-end="url(#ae1)"/>
  <rect class="dup" x="544" y="232" width="420" height="30" rx="4"/><text x="560" y="252" class="warn">seq ≤ last → DUPLICATE: ACK, do NOT re-append</text>
  <!-- seq 2 -->
  <rect class="batch" x="60" y="278" width="120" height="30" rx="4"/><text x="120" y="298" text-anchor="middle" class="mono">seq = 2</text>
  <line class="arr" x1="180" y1="293" x2="540" y2="293" marker-end="url(#ae1)"/>
  <rect class="acc" x="544" y="278" width="420" height="30" rx="4"/><text x="560" y="298" class="good">seq = last+1 → ACCEPT · last = 2</text>
  <!-- seq 4 gap -->
  <rect class="batch" x="60" y="324" width="120" height="30" rx="4"/><text x="120" y="344" text-anchor="middle" class="mono">seq = 4</text>
  <line class="arr" x1="180" y1="339" x2="540" y2="339" marker-end="url(#ae1)"/>
  <rect class="err" x="544" y="324" width="420" height="30" rx="4"/><text x="560" y="344" class="bad">seq &gt; last+1 (gap) → reject: OutOfOrderSequence</text>

  <rect x="120" y="400" width="780" height="64" rx="10" fill="#f6f7f6" stroke="#ddd"/>
  <text x="510" y="426" text-anchor="middle" class="title" font-size="13">A retried batch is silently de-duplicated; a missing batch is caught, not papered over.</text>
  <text x="510" y="448" text-anchor="middle" class="sub">Scope: within ONE producer session (one PID). A restart gets a new PID — only transactions dedupe across restarts.</text>
</svg>
