<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="sans-serif">
  <defs>
    <marker id="am2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .box{fill:#eef1f4;stroke:#444;stroke-width:1.4}
      .idle{fill:#fbeaea;stroke:#b00000;stroke-width:1.6}
      .op{fill:#eef5ff;stroke:#2a6099;stroke-width:1.6}
      .fix{fill:#e9f6ec;stroke:#1f7a1f;stroke-width:1.6}
      .boxT{font-size:12px;font-weight:bold;fill:#111}
      .wm{font-size:12px;font-weight:bold;fill:#52407e}
      .sub{font-size:10.5px;fill:#555}
      .arr{stroke:#444;stroke-width:1.6;fill:none}
      .bad{font-size:12px;font-weight:bold;fill:#b00000}
      .good{font-size:12px;font-weight:bold;fill:#1f7a1f}
    </style>
  </defs>
  <rect width="1000" height="500" fill="#ffffff"/>
  <text x="500" y="26" text-anchor="middle" class="title">An operator's watermark is the MINIMUM of its inputs — so one idle input stalls everything</text>

  <!-- inputs -->
  <rect class="box" x="40" y="90" width="180" height="44" rx="6"/><text x="60" y="112" class="boxT">Partition P0</text><text x="210" y="112" text-anchor="end" class="wm">wm 12:06</text><text x="60" y="127" class="sub">busy</text>
  <rect class="box" x="40" y="150" width="180" height="44" rx="6"/><text x="60" y="172" class="boxT">Partition P1</text><text x="210" y="172" text-anchor="end" class="wm">wm 12:05</text><text x="60" y="187" class="sub">busy</text>
  <rect class="idle" x="40" y="210" width="180" height="44" rx="6"/><text x="60" y="232" class="boxT" fill="#b00000">Partition P2</text><text x="210" y="232" text-anchor="end" class="wm" fill="#b00000">wm 12:01</text><text x="60" y="247" class="sub" fill="#b00000">IDLE — no data, stuck</text>

  <!-- operator -->
  <rect class="op" x="360" y="150" width="160" height="60" rx="8"/><text x="440" y="176" text-anchor="middle" class="boxT" fill="#26577e">Operator</text><text x="440" y="194" text-anchor="middle" class="sub" fill="#26577e">wm = min(inputs)</text>
  <line class="arr" x1="220" y1="112" x2="358" y2="166" marker-end="url(#am2)"/>
  <line class="arr" x1="220" y1="172" x2="358" y2="180" marker-end="url(#am2)"/>
  <line class="arr" x1="220" y1="232" x2="358" y2="196" marker-end="url(#am2)"/>

  <!-- output stuck -->
  <line class="arr" x1="520" y1="180" x2="600" y2="180" marker-end="url(#am2)"/>
  <rect class="idle" x="604" y="150" width="200" height="60" rx="8"/><text x="704" y="174" text-anchor="middle" class="bad">output wm = 12:01</text><text x="704" y="194" text-anchor="middle" class="sub">window [12:00–12:05) can't fire</text>
  <text x="704" y="234" text-anchor="middle" class="bad">STALLED — emits nothing, no error</text>
  <text x="440" y="240" text-anchor="middle" class="sub">the min is pinned by the idle partition</text>

  <!-- fix -->
  <rect class="fix" x="160" y="320" width="680" height="100" rx="10"/>
  <text x="500" y="346" text-anchor="middle" class="good">The fix: idleness detection (Flink withIdleness / Beam idle sources)</text>
  <text x="500" y="370" text-anchor="middle" class="sub">After a quiet period, mark P2 idle and EXCLUDE it from the minimum.</text>
  <text x="500" y="392" text-anchor="middle" class="good">wm = min(12:06, 12:05) = 12:05 → the window fires.</text>
  <text x="500" y="410" text-anchor="middle" class="sub">Re-include P2 the moment it produces data again.</text>
</svg>
