<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="sans-serif">
  <defs>
    <marker id="ae5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f7a1f"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .crud{fill:#f0f0f0;stroke:#999;stroke-width:1.3}
      .ev{fill:#e9f6ec;stroke:#1f7a1f;stroke-width:1.3}
      .evT{font-size:11px;fill:#1a5a30;font-family:monospace}
      .off{font-size:10px;fill:#888}
      .result{fill:#d8efd8;stroke:#1f7a1f;stroke-width:1.6}
      .lbl{font-size:12px;fill:#222}
      .cap{font-size:11px;fill:#555}
      .snap{stroke:#b06000;stroke-width:1.4;fill:none;stroke-dasharray:4 3}
    </style>
  </defs>
  <rect width="960" height="500" fill="#ffffff"/>
  <text x="480" y="26" text-anchor="middle" class="title">One account balance, two designs</text>

  <!-- CRUD -->
  <text x="40" y="68" class="h">CRUD — overwrite in place</text>
  <rect class="crud" x="40" y="80" width="240" height="70" rx="5"/>
  <text x="60" y="104" class="cap">accounts row · balance</text>
  <text x="120" y="132" class="lbl" fill="#aaa" text-decoration="line-through">100</text>
  <text x="180" y="132" class="lbl" font-weight="bold">120</text>
  <text x="320" y="118" class="cap">state only — previous values overwritten, history lost.</text>

  <!-- EVENT SOURCING -->
  <text x="40" y="210" class="h">EVENT SOURCING — append-only log</text>
  <g>
    <rect class="ev" x="40" y="224" width="150" height="44" rx="5"/><text x="50" y="250" class="evT">AccountOpened</text><text x="44" y="284" class="off">offset 1</text>
    <rect class="ev" x="200" y="224" width="150" height="44" rx="5"/><text x="210" y="250" class="evT">Deposited 100</text><text x="204" y="284" class="off">offset 2</text>
    <rect class="ev" x="360" y="224" width="150" height="44" rx="5"/><text x="370" y="250" class="evT">Deposited 50</text><text x="364" y="284" class="off">offset 3</text>
    <rect class="ev" x="560" y="224" width="150" height="44" rx="5"/><text x="570" y="250" class="evT">Withdrew 30</text><text x="564" y="284" class="off">offset 4</text>
  </g>
  <text x="730" y="250" class="cap">append →</text>
  <!-- snapshot -->
  <line class="snap" x1="525" y1="214" x2="525" y2="300"/>
  <text x="525" y="312" text-anchor="middle" class="cap" fill="#a6601a">snapshot @3: balance = 150</text>
  <text x="525" y="326" text-anchor="middle" class="cap" fill="#a6601a">(replay only events after it)</text>

  <!-- fold -->
  <line x1="375" y1="350" x2="560" y2="350" stroke="#1f7a1f" stroke-width="2" marker-end="url(#ae5)"/>
  <text x="270" y="354" class="cap" fill="#1f7a1f">replay / fold:  100 + 50 − 30 =</text>
  <rect class="result" x="570" y="330" width="160" height="44" rx="6"/>
  <text x="650" y="350" text-anchor="middle" class="lbl" font-weight="bold">balance = 120</text>
  <text x="650" y="367" text-anchor="middle" class="cap" fill="#236b3c">DERIVED — full history kept</text>

  <text x="480" y="430" text-anchor="middle" class="cap">Both yield 120 — but CRUD knows only the answer, while the event log keeps every cause and derives the answer by replay.</text>
</svg>
