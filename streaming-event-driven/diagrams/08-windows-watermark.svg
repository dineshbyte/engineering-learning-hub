<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="sans-serif">
  <defs>
    <marker id="aw8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6b4fa0"/></marker>
    <marker id="al8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b00000"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .win1{fill:#e7eef7;stroke:#9bb4d4;stroke-width:1}
      .win2{fill:#eaf4ec;stroke:#9bcaa6;stroke-width:1}
      .winL{font-size:11px;font-weight:bold;fill:#444}
      .axis{stroke:#333;stroke-width:1.6}
      .tick{font-size:11px;fill:#333}
      .dotL{fill:#2a6099;stroke:#1a4470;stroke-width:1}
      .dotR{fill:#2f8a4e;stroke:#1d5a30;stroke-width:1}
      .badge{font-size:10px;font-weight:bold;fill:#fff}
      .wm{stroke:#6b4fa0;stroke-width:2.4;stroke-dasharray:6 4}
      .wmT{font-size:11px;font-weight:bold;fill:#52407e}
      .late{fill:#c0392b;stroke:#8a2820;stroke-width:1}
      .lateT{font-size:11px;font-weight:bold;fill:#b00000}
      .cap{font-size:11px;fill:#555}
    </style>
  </defs>
  <rect width="1000" height="520" fill="#ffffff"/>
  <text x="500" y="26" text-anchor="middle" class="title">Event-time windows + watermark: out-of-order arrival, one late event dropped</text>

  <!-- windows -->
  <rect class="win1" x="120" y="120" width="340" height="200"/>
  <rect class="win2" x="460" y="120" width="340" height="200"/>
  <text x="290" y="138" text-anchor="middle" class="winL">window [12:00–12:05)</text>
  <text x="630" y="138" text-anchor="middle" class="winL">window [12:05–12:10)</text>

  <!-- axis -->
  <line class="axis" x1="80" y1="320" x2="900" y2="320" marker-end="url(#aw8)"/>
  <text x="908" y="324" class="cap">event time</text>
  <line x1="120" y1="316" x2="120" y2="324" class="axis"/><text x="120" y="342" text-anchor="middle" class="tick">12:00</text>
  <line x1="460" y1="316" x2="460" y2="324" class="axis"/><text x="460" y="342" text-anchor="middle" class="tick">12:05</text>
  <line x1="800" y1="316" x2="800" y2="324" class="axis"/><text x="800" y="342" text-anchor="middle" class="tick">12:10</text>

  <!-- events: x = event-time -->
  <!-- 12:01 x=188 badge1 ; 12:05 x=460 badge2 ; 12:03 x=324 badge3 ; 12:07 x=596 badge4 ; 12:02 x=256 badge5 -->
  <circle class="dotL" cx="188" cy="250" r="11"/><text x="188" y="254" text-anchor="middle" class="badge">1</text>
  <circle class="dotR" cx="466" cy="200" r="11"/><text x="466" y="204" text-anchor="middle" class="badge">2</text>
  <circle class="dotL" cx="324" cy="170" r="11"/><text x="324" y="174" text-anchor="middle" class="badge">3</text>
  <circle class="dotR" cx="596" cy="240" r="11"/><text x="596" y="244" text-anchor="middle" class="badge">4</text>
  <circle class="dotL" cx="256" cy="285" r="11"/><text x="256" y="289" text-anchor="middle" class="badge">5</text>
  <text x="324" y="150" text-anchor="middle" class="cap">arrives out of order:</text>
  <text x="380" y="120" text-anchor="middle" class="cap">event-time 12:03 (badge 3) seen AFTER 12:05 (badge 2)</text>

  <!-- watermark -->
  <line class="wm" x1="528" y1="110" x2="528" y2="330"/>
  <text x="540" y="98" class="wmT">watermark ≈ 12:06</text>
  <text x="540" y="380" class="wmT">"assume no events older than 12:06 remain</text>
  <text x="540" y="396" class="wmT">→ fire window [12:00–12:05)"</text>
  <path d="M524,360 C 460,360 360,360 300,322" stroke="#6b4fa0" stroke-width="1.6" fill="none" marker-end="url(#aw8)"/>

  <!-- late event -->
  <circle class="late" cx="392" cy="430" r="11"/><text x="392" y="434" text-anchor="middle" class="badge">6</text>
  <line x1="384" y1="422" x2="400" y2="438" stroke="#fff" stroke-width="2"/><line x1="400" y1="422" x2="384" y2="438" stroke="#fff" stroke-width="2"/>
  <text x="412" y="426" class="lateT">late event (event-time 12:04) arrives AFTER the watermark</text>
  <text x="412" y="442" class="lateT">→ dropped or sent to a side output</text>

  <text x="500" y="494" text-anchor="middle" class="cap">Watermarks trade completeness against latency: fire earlier = lower latency, more late data lost; fire later = more complete, slower.</text>
</svg>
