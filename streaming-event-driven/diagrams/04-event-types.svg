<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 500" font-family="sans-serif">
  <defs>
    <marker id="af4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2a6099"/></marker>
    <marker id="ab4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b06000"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .svc{fill:#eef1f4;stroke:#444;stroke-width:1.4}
      .svcT{font-size:12px;font-weight:bold;fill:#111}
      .env{fill:#eaf2fb;stroke:#2a6099;stroke-width:1.2}
      .envFat{fill:#dcebfb;stroke:#2a6099;stroke-width:1.4}
      .mono{font-size:10px;fill:#26577e;font-family:monospace}
      .fwd{stroke:#2a6099;stroke-width:1.8;fill:none}
      .back{stroke:#b06000;stroke-width:1.6;fill:none;stroke-dasharray:5 4}
      .backT{font-size:10.5px;font-weight:bold;fill:#b06000}
      .cap{font-size:11px;fill:#555}
    </style>
  </defs>
  <rect width="980" height="500" fill="#ffffff"/>
  <text x="490" y="26" text-anchor="middle" class="title">The same event, two styles: thin notification vs fat state transfer</text>
  <line x1="490" y1="44" x2="490" y2="440" stroke="#dcdcdc"/>

  <!-- LEFT: notification -->
  <text x="245" y="68" text-anchor="middle" class="h">EVENT NOTIFICATION (thin)</text>
  <rect class="svc" x="40" y="100" width="120" height="46" rx="6"/><text x="100" y="128" text-anchor="middle" class="svcT">Order service</text>
  <rect class="svc" x="330" y="100" width="120" height="46" rx="6"/><text x="390" y="128" text-anchor="middle" class="svcT">Shipping service</text>
  <rect class="env" x="190" y="92" width="120" height="26" rx="4"/><text x="250" y="109" text-anchor="middle" class="mono">{OrderPlaced, id:42}</text>
  <line class="fwd" x1="160" y1="123" x2="328" y2="123" marker-end="url(#af4)"/>
  <!-- callback -->
  <path class="back" d="M390,146 C 390,200 100,200 100,150" marker-end="url(#ab4)"/>
  <text x="245" y="196" text-anchor="middle" class="backT">callback: GET /orders/42</text>
  <line class="fwd" x1="160" y1="230" x2="328" y2="230" marker-end="url(#af4)"/>
  <text x="245" y="224" text-anchor="middle" class="mono">{ items, address, total }</text>
  <text x="245" y="290" text-anchor="middle" class="cap">small payload, loosely coupled —</text>
  <text x="245" y="306" text-anchor="middle" class="cap">but a callback per consumer; producer is a live dependency</text>

  <!-- RIGHT: state transfer -->
  <text x="735" y="68" text-anchor="middle" class="h">EVENT-CARRIED STATE TRANSFER (fat)</text>
  <rect class="svc" x="530" y="100" width="120" height="46" rx="6"/><text x="590" y="128" text-anchor="middle" class="svcT">Order service</text>
  <rect class="svc" x="820" y="100" width="120" height="46" rx="6"/><text x="880" y="128" text-anchor="middle" class="svcT">Shipping service</text>
  <rect class="envFat" x="656" y="82" width="158" height="60" rx="4"/>
  <text x="735" y="100" text-anchor="middle" class="mono">{ OrderPlaced, id:42,</text>
  <text x="735" y="114" text-anchor="middle" class="mono">items:[...], address:{...},</text>
  <text x="735" y="128" text-anchor="middle" class="mono">total: 199.00 }</text>
  <line class="fwd" x1="650" y1="150" x2="818" y2="150" marker-end="url(#af4)"/>
  <text x="880" y="170" text-anchor="middle" class="cap">no callback —</text>
  <text x="880" y="184" text-anchor="middle" class="cap">proceeds offline</text>
  <text x="735" y="290" text-anchor="middle" class="cap">self-contained, survives producer downtime —</text>
  <text x="735" y="306" text-anchor="middle" class="cap">but binds to the payload schema, holds a possibly-stale snapshot</text>

  <text x="490" y="400" text-anchor="middle" class="cap">The choice lives entirely in the envelope size: a callback/round-trip vs schema coupling + snapshot staleness.</text>
</svg>
