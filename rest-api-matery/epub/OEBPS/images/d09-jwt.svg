<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" role="img">
  <title>JWT structure: header dot payload dot signature, with a validation checklist</title>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif;fill:#111}
    .seg{stroke:#222;stroke-width:1.5}
    .s1{fill:#fff} .s2{fill:#eee} .s3{fill:#222}
    .lbl{font-size:13px;font-weight:bold} .lblw{font-size:13px;font-weight:bold;fill:#fff}
    .n{font-size:11.5px;fill:#444} .dot{font-size:24px;font-weight:bold}
    .m{font-size:12px} .warn{font-size:12px;fill:#000;font-style:italic}
  </style>
  <rect class="seg s1" x="20"  y="40" width="160" height="46" rx="5"/><text class="lbl"  x="100" y="68" text-anchor="middle">HEADER</text>
  <text class="dot" x="190" y="74">.</text>
  <rect class="seg s2" x="210" y="40" width="200" height="46" rx="5"/><text class="lbl"  x="310" y="68" text-anchor="middle">PAYLOAD</text>
  <text class="dot" x="420" y="74">.</text>
  <rect class="seg s3" x="440" y="40" width="160" height="46" rx="5"/><text class="lblw" x="520" y="68" text-anchor="middle">SIGNATURE</text>
  <text class="n" x="100" y="104" text-anchor="middle">alg, typ</text>
  <text class="n" x="310" y="104" text-anchor="middle">claims: iss, aud, exp, sub, scope</text>
  <text class="n" x="520" y="104" text-anchor="middle">HMAC/RSA over header.payload</text>
  <line x1="20" y1="128" x2="600" y2="128" stroke="#ccc"/>
  <text class="lbl" x="20" y="156">Validate on every request:</text>
  <text class="m" x="34" y="180">• verify the signature</text>
  <text class="m" x="34" y="200">• pin the algorithm — reject "none" and alg-confusion</text>
  <text class="m" x="34" y="220">• check iss (issuer), aud (audience), exp (not expired)</text>
  <text class="warn" x="20" y="256">⚠ payload is base64, NOT encrypted — never put secrets in a JWT.</text>
  <text class="warn" x="20" y="278">⚠ hard to revoke before exp → short-lived access + rotating refresh + denylist.</text>
</svg>
