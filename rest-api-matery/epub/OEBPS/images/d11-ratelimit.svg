<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 320" role="img">
  <title>Token bucket rate limiting: tokens refill at a steady rate, requests spend a token, an empty bucket returns 429</title>
  <defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 z" fill="#222"/></marker></defs>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif;fill:#111}
    .bk{fill:#f2f2f2;stroke:#222;stroke-width:1.8}
    .tok{fill:#222} .ln{stroke:#222;stroke-width:1.5;fill:none}
    .m{font-size:12px} .lbl{font-size:13px;font-weight:bold} .n{font-size:11px;fill:#555}
  </style>
  <path class="ln" d="M250 30 L250 78" marker-end="url(#ar)"/>
  <text class="lbl" x="270" y="40">refill</text><text class="n" x="270" y="56">r tokens / second</text>
  <path class="bk" d="M180 80 L320 80 L305 220 L195 220 Z"/>
  <circle class="tok" cx="225" cy="180" r="11"/>
  <circle class="tok" cx="260" cy="180" r="11"/>
  <circle class="tok" cx="240" cy="150" r="11"/>
  <text class="n" x="250" y="244" text-anchor="middle">capacity = burst size</text>
  <path class="ln" d="M320 150 L430 150" marker-end="url(#ar)"/>
  <text class="m" x="330" y="142">spend 1 token</text>
  <rect x="430" y="128" width="150" height="44" rx="6" fill="#fff" stroke="#222"/>
  <text class="m" x="505" y="148" text-anchor="middle">request allowed</text>
  <text class="m" x="505" y="164" text-anchor="middle">→ 200 OK</text>
  <path class="ln" d="M250 220 L250 270" marker-end="url(#ar)"/>
  <text class="m" x="270" y="252">bucket empty?</text>
  <rect x="380" y="250" width="200" height="44" rx="6" fill="#222"/>
  <text class="m" x="480" y="270" text-anchor="middle" fill="#fff">429 Too Many Requests</text>
  <text class="m" x="480" y="286" text-anchor="middle" fill="#fff">+ Retry-After</text>
  <path class="ln" d="M300 280 L380 274" marker-end="url(#ar)"/>
  <text class="n" x="20" y="300">RateLimit-Limit / -Remaining / -Reset headers let well-behaved clients self-throttle.</text>
</svg>
