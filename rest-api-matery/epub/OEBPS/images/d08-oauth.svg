<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 400" role="img">
  <title>OAuth2 Authorization Code flow with PKCE, ending in a Bearer access token used against the API</title>
  <defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 z" fill="#222"/></marker></defs>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif;fill:#111}
    .hd{fill:#222} .ht{fill:#fff;font-weight:bold;font-size:12px}
    .life{stroke:#888;stroke-width:1.2;stroke-dasharray:4 4}
    .msg{stroke:#222;stroke-width:1.4;fill:none}
    .m{font-size:11.5px} .num{font-size:11.5px;font-weight:bold}
  </style>
  <rect class="hd" x="20"  y="14" width="150" height="30" rx="5"/><text class="ht" x="95"  y="34" text-anchor="middle">Client app</text>
  <rect class="hd" x="235" y="14" width="170" height="30" rx="5"/><text class="ht" x="320" y="34" text-anchor="middle">Authorization server</text>
  <rect class="hd" x="470" y="14" width="130" height="30" rx="5"/><text class="ht" x="535" y="34" text-anchor="middle">API</text>
  <line class="life" x1="95"  y1="44" x2="95"  y2="392"/>
  <line class="life" x1="320" y1="44" x2="320" y2="392"/>
  <line class="life" x1="535" y1="44" x2="535" y2="392"/>
  <line class="msg" x1="95"  y1="86"  x2="320" y2="86"  marker-end="url(#ar)"/><text class="num" x="100" y="80">1 authorize? + code_challenge (PKCE)</text>
  <text class="m" x="200" y="116" fill="#555">2 user authenticates &amp; consents</text>
  <line class="msg" x1="320" y1="146" x2="95"  y2="146" marker-end="url(#ar)"/><text class="num" x="105" y="140">3 redirect with auth code</text>
  <line class="msg" x1="95"  y1="190" x2="320" y2="190" marker-end="url(#ar)"/><text class="num" x="100" y="184">4 exchange code + code_verifier</text>
  <line class="msg" x1="320" y1="234" x2="95"  y2="234" marker-end="url(#ar)"/><text class="num" x="105" y="228">5 access token (+ refresh token)</text>
  <line class="msg" x1="95"  y1="290" x2="535" y2="290" marker-end="url(#ar)"/><text class="num" x="120" y="284">6 request + Authorization: Bearer &lt;token&gt;</text>
  <line class="msg" x1="535" y1="318" x2="95"  y2="318" marker-end="url(#ar)"/><text class="m" x="150" y="312">200 — token validated (sig, iss, aud, exp)</text>
  <text class="m" x="310" y="360" text-anchor="middle" fill="#555">PKCE protects public clients · Client Credentials grant replaces steps 1–3 for machine-to-machine</text>
</svg>
