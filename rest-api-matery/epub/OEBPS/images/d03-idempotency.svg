<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 450" role="img">
  <title>Idempotency-Key sequence: first request executes and stores, retry replays the stored response</title>
  <defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 z" fill="#222"/></marker></defs>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif;fill:#111}
    .hd{fill:#222} .ht{fill:#fff;font-weight:bold;font-size:13px}
    .life{stroke:#888;stroke-width:1.2;stroke-dasharray:4 4}
    .msg{stroke:#222;stroke-width:1.4;fill:none}
    .m{font-size:12px} .sec{font-size:12px;fill:#555;font-style:italic}
  </style>
  <rect class="hd" x="35"  y="14" width="110" height="30" rx="5"/><text class="ht" x="90"  y="34" text-anchor="middle">Client</text>
  <rect class="hd" x="255" y="14" width="110" height="30" rx="5"/><text class="ht" x="310" y="34" text-anchor="middle">Server</text>
  <rect class="hd" x="475" y="14" width="110" height="30" rx="5"/><text class="ht" x="530" y="34" text-anchor="middle">Key store</text>
  <line class="life" x1="90"  y1="44" x2="90"  y2="440"/>
  <line class="life" x1="310" y1="44" x2="310" y2="440"/>
  <line class="life" x1="530" y1="44" x2="530" y2="440"/>
  <text class="sec" x="20" y="70">First request</text>
  <line class="msg" x1="90"  y1="90"  x2="310" y2="90"  marker-end="url(#ar)"/><text class="m" x="96" y="84">POST /orders · Idempotency-Key: K</text>
  <line class="msg" x1="310" y1="120" x2="530" y2="120" marker-end="url(#ar)"/><text class="m" x="330" y="114">lookup K</text>
  <line class="msg" x1="530" y1="148" x2="310" y2="148" marker-end="url(#ar)" stroke-dasharray="5 3"/><text class="m" x="360" y="142">miss</text>
  <rect x="250" y="166" width="170" height="34" rx="5" fill="#f2f2f2" stroke="#222"/><text class="m" x="335" y="187" text-anchor="middle">execute + store K→response</text>
  <line class="msg" x1="310" y1="226" x2="90"  y2="226" marker-end="url(#ar)"/><text class="m" x="120" y="220">201 Created</text>
  <line x1="0" y1="258" x2="620" y2="258" stroke="#ccc" stroke-width="1"/>
  <text class="sec" x="20" y="284">Retry (network dropped the first reply)</text>
  <line class="msg" x1="90"  y1="306" x2="310" y2="306" marker-end="url(#ar)"/><text class="m" x="96" y="300">POST /orders · same Key: K</text>
  <line class="msg" x1="310" y1="336" x2="530" y2="336" marker-end="url(#ar)"/><text class="m" x="330" y="330">lookup K</text>
  <line class="msg" x1="530" y1="364" x2="310" y2="364" marker-end="url(#ar)" stroke-dasharray="5 3"/><text class="m" x="350" y="358">hit → stored response</text>
  <line class="msg" x1="310" y1="392" x2="90"  y2="392" marker-end="url(#ar)"/><text class="m" x="100" y="386">201 (replayed — no second order)</text>
  <text class="sec" x="90" y="426" text-anchor="middle">at-most-once effect, despite at-least-once delivery</text>
</svg>
