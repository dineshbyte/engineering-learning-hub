<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 640" role="img">
  <title>The eleven-step senior API design interview framework, top to bottom</title>
  <defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 z" fill="#222"/></marker></defs>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif;fill:#111}
    .b{fill:#f2f2f2;stroke:#222;stroke-width:1.4}
    .num{fill:#222} .nt{fill:#fff;font-weight:bold;font-size:13px}
    .t{font-size:13px} .ln{stroke:#222;stroke-width:1.3;fill:none}
  </style>
  <!-- 11 rows, step height 50, gap 4 -->
  <g>
    <rect class="b" x="60" y="14"  width="500" height="40" rx="6"/><circle class="num" cx="84" cy="34"  r="14"/><text class="nt" x="84" y="39" text-anchor="middle">1</text><text class="t" x="112" y="39">Clarify requirements &amp; constraints — clients, scale, consistency, SLAs</text>
    <rect class="b" x="60" y="68"  width="500" height="40" rx="6"/><circle class="num" cx="84" cy="88"  r="14"/><text class="nt" x="84" y="93" text-anchor="middle">2</text><text class="t" x="112" y="93">Resource model &amp; URIs — nouns, shallow nesting, opaque ids</text>
    <rect class="b" x="60" y="122" width="500" height="40" rx="6"/><circle class="num" cx="84" cy="142" r="14"/><text class="nt" x="84" y="147" text-anchor="middle">3</text><text class="t" x="112" y="147">Endpoints — right method + right status code</text>
    <rect class="b" x="60" y="176" width="500" height="40" rx="6"/><circle class="num" cx="84" cy="196" r="14"/><text class="nt" x="84" y="201" text-anchor="middle">4</text><text class="t" x="112" y="201">Make writes safe — idempotency keys</text>
    <rect class="b" x="60" y="230" width="500" height="40" rx="6"/><circle class="num" cx="84" cy="250" r="14"/><text class="nt" x="84" y="255" text-anchor="middle">5</text><text class="t" x="112" y="255">Collections — pagination (cursor), filtering, sorting</text>
    <rect class="b" x="60" y="284" width="500" height="40" rx="6"/><circle class="num" cx="84" cy="304" r="14"/><text class="nt" x="84" y="309" text-anchor="middle">6</text><text class="t" x="112" y="309">Caching &amp; concurrency — ETags, Cache-Control, If-Match</text>
    <rect class="b" x="60" y="338" width="500" height="40" rx="6"/><circle class="num" cx="84" cy="358" r="14"/><text class="nt" x="84" y="363" text-anchor="middle">7</text><text class="t" x="112" y="363">Versioning &amp; evolution — additive first, deprecate with Sunset</text>
    <rect class="b" x="60" y="392" width="500" height="40" rx="6"/><circle class="num" cx="84" cy="412" r="14"/><text class="nt" x="84" y="417" text-anchor="middle">8</text><text class="t" x="112" y="417">AuthN/AuthZ — OAuth2/JWT + object-level (stop BOLA)</text>
    <rect class="b" x="60" y="446" width="500" height="40" rx="6"/><circle class="num" cx="84" cy="466" r="14"/><text class="nt" x="84" y="471" text-anchor="middle">9</text><text class="t" x="112" y="471">Errors, rate limiting, observability — RFC 9457, 429, RED metrics</text>
    <rect class="b" x="60" y="500" width="500" height="40" rx="6"/><circle class="num" cx="84" cy="520" r="14"/><text class="nt" x="84" y="525" text-anchor="middle">10</text><text class="t" x="112" y="525">Async / webhooks where needed — 202 + status, signed events</text>
    <rect class="b" x="60" y="554" width="500" height="40" rx="6"/><circle class="num" cx="84" cy="574" r="14"/><text class="nt" x="84" y="579" text-anchor="middle">11</text><text class="t" x="112" y="579">Trade-offs &amp; "what changes at 100×" — name it, pick a side</text>
  </g>
  <path class="ln" d="M310 54 L310 68"   marker-end="url(#ar)"/>
  <path class="ln" d="M310 108 L310 122" marker-end="url(#ar)"/>
  <path class="ln" d="M310 162 L310 176" marker-end="url(#ar)"/>
  <path class="ln" d="M310 216 L310 230" marker-end="url(#ar)"/>
  <path class="ln" d="M310 270 L310 284" marker-end="url(#ar)"/>
  <path class="ln" d="M310 324 L310 338" marker-end="url(#ar)"/>
  <path class="ln" d="M310 378 L310 392" marker-end="url(#ar)"/>
  <path class="ln" d="M310 432 L310 446" marker-end="url(#ar)"/>
  <path class="ln" d="M310 486 L310 500" marker-end="url(#ar)"/>
  <path class="ln" d="M310 540 L310 554" marker-end="url(#ar)"/>
</svg>
