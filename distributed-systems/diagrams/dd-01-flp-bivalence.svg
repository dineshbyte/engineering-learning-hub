<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="sans-serif">
  <defs>
    <marker id="ab1d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .bi{fill:#fff0d0;stroke:#b58a3b;stroke-width:2}
      .zero{fill:#fbeaea;stroke:#b00000;stroke-width:1.6}
      .one{fill:#e7eef7;stroke:#2a6099;stroke-width:1.6}
      .ct{font-size:12px;font-weight:bold;fill:#111}
      .arr{stroke:#555;stroke-width:1.5;fill:none}
      .lbl{font-size:10.5px;fill:#444}
      .note{font-size:11px;fill:#555}
      .leg{font-size:11px;fill:#222}
    </style>
  </defs>
  <rect width="920" height="540" fill="#ffffff"/>
  <text x="460" y="28" text-anchor="middle" class="title">FLP: the adversary keeps the system bivalent forever</text>

  <!-- legend -->
  <circle class="bi" cx="640" cy="70" r="9"/><text x="654" y="74" class="leg">bivalent (undecided)</text>
  <circle class="one" cx="640" cy="94" r="9"/><text x="654" y="98" class="leg">1-valent (sealed on 1)</text>
  <circle class="zero" cx="640" cy="118" r="9"/><text x="654" y="122" class="leg">0-valent (sealed on 0)</text>

  <text x="60" y="78" class="note">Lemma 1: a bivalent initial configuration must exist.</text>

  <!-- bivalent spine -->
  <circle class="bi" cx="200" cy="120" r="26"/><text x="200" y="124" text-anchor="middle" class="ct">start</text>
  <circle class="bi" cx="200" cy="230" r="26"/>
  <circle class="bi" cx="200" cy="340" r="26"/>
  <circle class="bi" cx="200" cy="440" r="22"/><text x="200" y="445" text-anchor="middle" class="ct">⋮</text>

  <!-- univalent branches -->
  <circle class="zero" cx="420" cy="150" r="24"/><text x="420" y="154" text-anchor="middle" class="ct">0</text>
  <circle class="one" cx="420" cy="260" r="24"/><text x="420" y="264" text-anchor="middle" class="ct">1</text>
  <circle class="zero" cx="420" cy="370" r="24"/><text x="420" y="374" text-anchor="middle" class="ct">0</text>

  <!-- arrows: spine down -->
  <line class="arr" x1="200" y1="146" x2="200" y2="204" marker-end="url(#ab1d)"/>
  <line class="arr" x1="200" y1="256" x2="200" y2="314" marker-end="url(#ab1d)"/>
  <line class="arr" x1="200" y1="366" x2="200" y2="418" marker-end="url(#ab1d)"/>
  <text x="120" y="180" class="lbl">delay e,</text><text x="120" y="194" class="lbl">deliver e'</text>
  <text x="120" y="290" class="lbl">stays</text><text x="120" y="304" class="lbl">bivalent</text>

  <!-- arrows: to univalent -->
  <line class="arr" x1="224" y1="132" x2="394" y2="148" marker-end="url(#ab1d)"/><text x="270" y="128" class="lbl">deliver e → decided</text>
  <line class="arr" x1="224" y1="242" x2="394" y2="258" marker-end="url(#ab1d)"/>
  <line class="arr" x1="224" y1="352" x2="394" y2="368" marker-end="url(#ab1d)"/>

  <rect x="500" y="200" width="380" height="120" rx="8" fill="#f7f7f5" stroke="#ddd"/>
  <text x="516" y="226" class="note">Lemma 2: every bivalent configuration has a</text>
  <text x="516" y="244" class="note">bivalent successor. The scheduler always takes it —</text>
  <text x="516" y="262" class="note">while still eventually delivering every message.</text>
  <text x="516" y="290" class="note" fill="#b00000">⇒ the system stays bivalent forever and never decides.</text>
  <text x="516" y="308" class="note" fill="#b00000">Termination fails. (No drops, only ordering.)</text>

  <text x="200" y="490" text-anchor="middle" class="note">never reaches a decision</text>
</svg>
