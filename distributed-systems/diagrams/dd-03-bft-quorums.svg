<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="sans-serif">
  <defs>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .node{fill:#eef1f4;stroke:#444;stroke-width:1.6}
      .liar{fill:#fbeaea;stroke:#b00000;stroke-width:2}
      .ovl{fill:#fff3d6;stroke:#b58a3b;stroke-width:2}
      .nt{font-size:13px;font-weight:bold;fill:#111}
      .qA{fill:#2a6099;fill-opacity:0.10;stroke:#2a6099;stroke-width:1.6}
      .qB{fill:#1f7a1f;fill-opacity:0.10;stroke:#1f7a1f;stroke-width:1.6}
      .ql{font-size:11px;font-weight:bold;}
      .sub{font-size:11px;fill:#444}
      .cap{font-size:11px;fill:#555}
    </style>
  </defs>
  <rect width="960" height="480" fill="#ffffff"/>
  <text x="480" y="28" text-anchor="middle" class="title">Why Byzantine consensus needs 3f+1, not 2f+1</text>
  <line x1="480" y1="46" x2="480" y2="430" stroke="#dcdcdc"/>

  <!-- LEFT: crash -->
  <text x="240" y="74" text-anchor="middle" class="h">Crash faults (Raft/Paxos): N = 2f+1 = 3</text>
  <rect class="qA" x="70" y="150" width="200" height="70" rx="35"/><text x="100" y="142" class="ql" fill="#2a6099">Quorum A (2)</text>
  <rect class="qB" x="170" y="190" width="200" height="70" rx="35"/><text x="300" y="278" class="ql" fill="#1f7a1f">Quorum B (2)</text>
  <circle class="node" cx="120" cy="200" r="26"/><text x="120" y="205" text-anchor="middle" class="nt">N1</text>
  <circle class="ovl" cx="220" cy="205" r="28"/><text x="220" y="210" text-anchor="middle" class="nt">N2</text>
  <circle class="node" cx="320" cy="210" r="26"/><text x="320" y="215" text-anchor="middle" class="nt">N3</text>
  <text x="240" y="320" text-anchor="middle" class="sub">two majorities overlap in ≥ 1 node (N2).</text>
  <text x="240" y="338" text-anchor="middle" class="cap">A crashed node is silent, never lying —</text>
  <text x="240" y="354" text-anchor="middle" class="cap">so one shared node is enough to agree.</text>

  <!-- RIGHT: byzantine -->
  <text x="720" y="74" text-anchor="middle" class="h">Byzantine faults (PBFT): N = 3f+1 = 4</text>
  <rect class="qA" x="510" y="150" width="270" height="70" rx="35"/><text x="535" y="142" class="ql" fill="#2a6099">Quorum A (3)</text>
  <rect class="qB" x="610" y="190" width="270" height="70" rx="35"/><text x="800" y="278" class="ql" fill="#1f7a1f">Quorum B (3)</text>
  <circle class="node" cx="560" cy="200" r="24"/><text x="560" y="205" text-anchor="middle" class="nt">N1</text>
  <circle class="ovl" cx="660" cy="205" r="26"/><text x="660" y="210" text-anchor="middle" class="nt">N2</text>
  <circle class="ovl" cx="760" cy="205" r="26"/><text x="760" y="210" text-anchor="middle" class="nt">N3</text>
  <circle class="liar" cx="860" cy="210" r="24"/><text x="860" y="207" text-anchor="middle" class="nt" fill="#b00000">N4</text><text x="860" y="222" text-anchor="middle" class="cap" fill="#b00000">liar</text>
  <text x="720" y="320" text-anchor="middle" class="sub">two quorums (2f+1=3) overlap in ≥ f+1 = 2 nodes.</text>
  <text x="720" y="338" text-anchor="middle" class="cap">Even if one of the shared nodes lies, the other</text>
  <text x="720" y="354" text-anchor="middle" class="cap">is honest — so the overlap still carries the truth.</text>

  <rect x="120" y="392" width="720" height="50" rx="8" fill="#f6f7f6" stroke="#ddd"/>
  <text x="480" y="414" text-anchor="middle" class="h">Crash: 2f+1 nodes, majority quorum, overlap ≥ 1 correct.   Byzantine: 3f+1 nodes, 2f+1 quorum, overlap ≥ f+1 (≥ 1 honest).</text>
  <text x="480" y="432" text-anchor="middle" class="cap">The overlap must out-number the liars — that is the whole reason for the extra f nodes.</text>
</svg>
