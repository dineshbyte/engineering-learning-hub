<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="sans-serif">
  <defs>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .rep{font-size:13px;font-weight:bold;fill:#111}
      .val{font-size:13px;font-weight:bold;fill:#fff}
      .lbl{font-size:13px;font-weight:bold;fill:#111}
      .cap{font-size:12px;fill:#555}
      .eq{font-size:15px;font-weight:bold;fill:#111}
    </style>
  </defs>
  <rect width="760" height="470" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" class="title">A read quorum and a write quorum must overlap</text>
  <text x="380" y="54" text-anchor="middle" class="cap">N = 3 replicas</text>

  <!-- write quorum lasso (A,B) -->
  <rect x="70" y="150" width="360" height="150" rx="20" fill="#3b6fb0" fill-opacity="0.13" stroke="#3b6fb0" stroke-width="2"/>
  <text x="90" y="140" class="lbl" fill="#2a5a96">Write quorum  W = 2</text>

  <!-- read quorum lasso (B,C) -->
  <rect x="330" y="190" width="360" height="150" rx="20" fill="#2f8a4e" fill-opacity="0.13" stroke="#2f8a4e" stroke-width="2"/>
  <text x="470" y="360" class="lbl" fill="#236b3c">Read quorum  R = 2</text>

  <!-- replicas -->
  <circle cx="200" cy="225" r="46" fill="#eef2f6" stroke="#3b6fb0" stroke-width="2"/>
  <text x="200" y="214" text-anchor="middle" class="rep">Replica A</text>
  <circle cx="200" cy="244" r="15" fill="#3b6fb0"/><text x="200" y="249" text-anchor="middle" class="val">v2</text>

  <circle cx="380" cy="245" r="48" fill="#eef4ee" stroke="#6b4fa0" stroke-width="3"/>
  <text x="380" y="234" text-anchor="middle" class="rep">Replica B</text>
  <circle cx="380" cy="264" r="15" fill="#6b4fa0"/><text x="380" y="269" text-anchor="middle" class="val">v2</text>

  <circle cx="560" cy="265" r="46" fill="#f6f1ee" stroke="#2f8a4e" stroke-width="2"/>
  <text x="560" y="254" text-anchor="middle" class="rep">Replica C</text>
  <circle cx="560" cy="284" r="15" fill="#b07a3b"/><text x="560" y="289" text-anchor="middle" class="val">v1</text>

  <!-- overlap callout -->
  <text x="380" y="150" text-anchor="middle" class="cap" fill="#6b4fa0">Overlap node — in BOTH sets</text>
  <line x1="380" y1="156" x2="380" y2="196" stroke="#6b4fa0" stroke-width="1.4" stroke-dasharray="3 3"/>

  <text x="380" y="408" text-anchor="middle" class="eq">R + W &gt; N   →   2 + 2 &gt; 3   →   sets share ≥ 1 node</text>
  <text x="380" y="438" text-anchor="middle" class="cap">The read is guaranteed to touch a replica holding v2 — so it sees the latest write.</text>
</svg>
