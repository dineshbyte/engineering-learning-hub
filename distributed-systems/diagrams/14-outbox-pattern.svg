<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 450" font-family="sans-serif">
  <defs>
    <marker id="ah14" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .node{fill:#eee;stroke:#333;stroke-width:1.5}
      .nodeT{font-size:12.5px;font-weight:bold;fill:#111}
      .txn{fill:#f6f1e7;stroke:#b06000;stroke-width:2;stroke-dasharray:7 4}
      .txnT{font-size:12px;font-weight:bold;fill:#8a4d00}
      .cyl{fill:#ffffff;stroke:#666;stroke-width:1.3}
      .cylT{font-size:11px;font-weight:bold;fill:#111}
      .cylS{font-size:10px;fill:#444}
      .msg{stroke:#222;stroke-width:1.8;fill:none}
      .async{stroke:#666;stroke-width:1.6;fill:none;stroke-dasharray:5 4}
      .mlbl{font-size:11px;fill:#333}
      .cap{font-size:11.5px;fill:#555}
      .broker{fill:#e7edf3;stroke:#3b6fb0;stroke-width:1.5}
    </style>
  </defs>
  <rect width="880" height="450" fill="#ffffff"/>
  <text x="440" y="26" text-anchor="middle" class="title">The outbox pattern: one atomic write + an idempotent publish</text>

  <!-- service -->
  <rect class="node" x="24" y="150" width="100" height="46" rx="5"/><text x="74" y="178" text-anchor="middle" class="nodeT">Service</text>

  <!-- transaction box -->
  <rect class="txn" x="170" y="92" width="300" height="190" rx="10"/>
  <text x="320" y="116" text-anchor="middle" class="txnT">ONE database transaction (atomic)</text>

  <!-- orders cylinder -->
  <g>
    <rect class="cyl" x="196" y="150" width="110" height="86"/>
    <ellipse class="cyl" cx="251" cy="150" rx="55" ry="9"/>
    <ellipse class="cyl" cx="251" cy="236" rx="55" ry="9"/>
    <text x="251" y="182" text-anchor="middle" class="cylT">orders</text>
    <text x="251" y="200" text-anchor="middle" class="cylS">#42 · PAID</text>
  </g>
  <!-- outbox cylinder -->
  <g>
    <rect class="cyl" x="332" y="150" width="120" height="86"/>
    <ellipse class="cyl" cx="392" cy="150" rx="60" ry="9"/>
    <ellipse class="cyl" cx="392" cy="236" rx="60" ry="9"/>
    <text x="392" y="178" text-anchor="middle" class="cylT">outbox</text>
    <text x="392" y="196" text-anchor="middle" class="cylS">OrderPaid #42</text>
    <text x="392" y="210" text-anchor="middle" class="cylS">UNSENT</text>
  </g>

  <text x="120" y="142" class="mlbl">commit both, or neither</text>
  <line class="msg" x1="124" y1="166" x2="190" y2="178" marker-end="url(#ah14)"/>

  <!-- relay -->
  <rect class="node" x="540" y="150" width="120" height="46" rx="5"/><text x="600" y="172" text-anchor="middle" class="nodeT">Relay</text><text x="600" y="188" text-anchor="middle" class="cylS">poller / CDC</text>
  <line class="async" x1="452" y1="186" x2="538" y2="172" marker-end="url(#ah14)"/>
  <text x="456" y="150" class="mlbl">read UNSENT</text>
  <!-- mark sent loop -->
  <path class="async" d="M548,196 q-40,40 -120,30" marker-end="url(#ah14)"/>
  <text x="430" y="250" class="cap">mark row SENT</text>

  <!-- broker -->
  <rect class="broker" x="540" y="300" width="130" height="46" rx="5"/><text x="605" y="328" text-anchor="middle" class="nodeT">Broker (Kafka)</text>
  <line class="msg" x1="600" y1="196" x2="600" y2="300" marker-end="url(#ah14)"/>
  <text x="612" y="250" class="mlbl">publish OrderPaid</text>
  <text x="612" y="266" class="cap">(at-least-once)</text>

  <!-- consumer -->
  <rect class="node" x="724" y="300" width="120" height="46" rx="5"/><text x="784" y="322" text-anchor="middle" class="nodeT">Consumer</text><text x="784" y="338" text-anchor="middle" class="cylS">dedupe by id → once</text>
  <line class="msg" x1="670" y1="323" x2="722" y2="323" marker-end="url(#ah14)"/>

  <text x="440" y="400" text-anchor="middle" class="cap">The risky two-system dual write becomes one local ACID transaction. The only cross-system step — the relay's publish — is at-least-once,</text>
  <text x="440" y="420" text-anchor="middle" class="cap">made safe by consumer dedup. Crash before "mark SENT" ⇒ the row republishes (harmless).</text>
</svg>
