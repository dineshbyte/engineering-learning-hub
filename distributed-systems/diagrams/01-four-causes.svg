<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <style>
      .title{font-size:18px;font-weight:bold;fill:#111}
      .sub{font-size:13px;fill:#555}
      .h{font-size:15px;font-weight:bold;fill:#111}
      .lbl{font-size:12.5px;fill:#222}
      .cap{font-size:12.5px;fill:#444}
      .nodeT{font-size:13px;font-weight:bold;fill:#111}
      .node{fill:#eee;stroke:#333;stroke-width:1.5}
      .life{stroke:#9a9a9a;stroke-width:1;stroke-dasharray:3 3}
      .msg{stroke:#222;stroke-width:1.8;fill:none}
      .lost{stroke:#222;stroke-width:1.8;fill:none;stroke-dasharray:6 4}
      .busy{fill:#cfcfcf;stroke:#555;stroke-width:1}
      .xline{stroke:#b00000;stroke-width:2.4}
      .panel{fill:none;stroke:#dcdcdc;stroke-width:1}
    </style>
  </defs>

  <rect width="960" height="700" fill="#ffffff"/>
  <text x="480" y="30" text-anchor="middle" class="title">A reply never came back — which of these happened?</text>
  <text x="480" y="52" text-anchor="middle" class="sub">From A's point of view, all four are indistinguishable.</text>

  <!-- PANEL 1: Request lost -->
  <g transform="translate(30,80)">
    <rect class="panel" x="0" y="0" width="430" height="270"/>
    <text x="16" y="28" class="h">1. Request lost</text>
    <rect class="node" x="50" y="44" width="44" height="24" rx="4"/>
    <text x="72" y="61" text-anchor="middle" class="nodeT">A</text>
    <rect class="node" x="336" y="44" width="44" height="24" rx="4"/>
    <text x="358" y="61" text-anchor="middle" class="nodeT">B</text>
    <line class="life" x1="72" y1="68" x2="72" y2="240"/>
    <line class="life" x1="358" y1="68" x2="358" y2="240"/>
    <text x="92" y="100" class="lbl">request</text>
    <line class="lost" x1="72" y1="112" x2="210" y2="132"/>
    <line class="xline" x1="203" y1="124" x2="219" y2="140"/>
    <line class="xline" x1="219" y1="124" x2="203" y2="140"/>
    <text x="16" y="260" class="cap">B never received it.</text>
  </g>

  <!-- PANEL 2: B is slow -->
  <g transform="translate(500,80)">
    <rect class="panel" x="0" y="0" width="430" height="270"/>
    <text x="16" y="28" class="h">2. B is slow / paused</text>
    <rect class="node" x="50" y="44" width="44" height="24" rx="4"/>
    <text x="72" y="61" text-anchor="middle" class="nodeT">A</text>
    <rect class="node" x="336" y="44" width="44" height="24" rx="4"/>
    <text x="358" y="61" text-anchor="middle" class="nodeT">B</text>
    <line class="life" x1="72" y1="68" x2="72" y2="240"/>
    <line class="life" x1="358" y1="68" x2="358" y2="240"/>
    <text x="150" y="100" class="lbl">request</text>
    <line class="msg" x1="72" y1="108" x2="354" y2="126" marker-end="url(#arrow)"/>
    <rect class="busy" x="349" y="128" width="18" height="86" rx="3"/>
    <text x="200" y="170" class="cap">still working…</text>
    <text x="66" y="200" class="cap">A waits — no reply yet</text>
    <text x="16" y="260" class="cap">The reply is still on its way.</text>
  </g>

  <!-- PANEL 3: Reply lost -->
  <g transform="translate(30,400)">
    <rect class="panel" x="0" y="0" width="430" height="270"/>
    <text x="16" y="28" class="h">3. Reply lost</text>
    <rect class="node" x="50" y="44" width="44" height="24" rx="4"/>
    <text x="72" y="61" text-anchor="middle" class="nodeT">A</text>
    <rect class="node" x="336" y="44" width="44" height="24" rx="4"/>
    <text x="358" y="61" text-anchor="middle" class="nodeT">B</text>
    <line class="life" x1="72" y1="68" x2="72" y2="240"/>
    <line class="life" x1="358" y1="68" x2="358" y2="240"/>
    <text x="150" y="98" class="lbl">request</text>
    <line class="msg" x1="72" y1="104" x2="354" y2="120" marker-end="url(#arrow)"/>
    <rect class="busy" x="349" y="122" width="16" height="26" rx="3"/>
    <text x="232" y="150" class="lbl">reply</text>
    <line class="lost" x1="358" y1="158" x2="214" y2="176"/>
    <line class="xline" x1="207" y1="168" x2="223" y2="184"/>
    <line class="xline" x1="223" y1="168" x2="207" y2="184"/>
    <text x="16" y="260" class="cap">Work was done — the ack vanished.</text>
  </g>

  <!-- PANEL 4: B crashed -->
  <g transform="translate(500,400)">
    <rect class="panel" x="0" y="0" width="430" height="270"/>
    <text x="16" y="28" class="h">4. B crashed</text>
    <rect class="node" x="50" y="44" width="44" height="24" rx="4"/>
    <text x="72" y="61" text-anchor="middle" class="nodeT">A</text>
    <rect class="node" x="336" y="44" width="44" height="24" rx="4"/>
    <text x="358" y="61" text-anchor="middle" class="nodeT">B</text>
    <line class="life" x1="72" y1="68" x2="72" y2="240"/>
    <line class="life" x1="358" y1="68" x2="358" y2="148"/>
    <text x="150" y="100" class="lbl">request</text>
    <line class="msg" x1="72" y1="108" x2="354" y2="126" marker-end="url(#arrow)"/>
    <line class="xline" x1="346" y1="150" x2="370" y2="174"/>
    <line class="xline" x1="370" y1="150" x2="346" y2="174"/>
    <text x="215" y="196" text-anchor="middle" class="cap">(dead — timing unknown)</text>
    <text x="16" y="260" class="cap">No reply. State unknown.</text>
  </g>

  <text x="480" y="694" text-anchor="middle" class="sub">A sees the same thing every time: silence. A timeout only lets you <tspan font-style="italic">guess</tspan>.</text>
</svg>
