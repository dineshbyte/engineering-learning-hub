<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" font-family="sans-serif">
  <defs>
    <marker id="ah13" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:14px;font-weight:bold;fill:#111}
      .key{fill:#ffffff;stroke:#888;stroke-width:1}
      .keyT{font-size:10.5px;fill:#222}
      .node{fill:#e7edf3;stroke:#3b6fb0;stroke-width:1.4}
      .nodeT{font-size:12px;font-weight:bold;fill:#111}
      .nodeS{font-size:10px;fill:#444}
      .arr{stroke:#777;stroke-width:1.3;fill:none}
      .hash{fill:#efe7f2;stroke:#6b4fa0;stroke-width:1.5}
      .ok{font-size:11.5px;font-weight:bold;fill:#236b3c}
      .bad{font-size:11.5px;font-weight:bold;fill:#b00000}
      .cap{font-size:11px;fill:#555}
    </style>
  </defs>
  <rect width="980" height="520" fill="#ffffff"/>
  <text x="490" y="26" text-anchor="middle" class="title">Two ways to map keys to partitions — and what each costs</text>
  <line x1="490" y1="44" x2="490" y2="500" stroke="#dcdcdc"/>

  <!-- LEFT: key-range -->
  <text x="245" y="66" text-anchor="middle" class="h">Key-range partitioning</text>
  <!-- keys -->
  <g class="keyT">
    <rect class="key" x="28" y="84" width="50" height="20" rx="3"/><text x="53" y="98" text-anchor="middle">apple</text>
    <rect class="key" x="86" y="84" width="48" height="20" rx="3"/><text x="110" y="98" text-anchor="middle">date</text>
    <rect class="key" x="142" y="84" width="48" height="20" rx="3"/><text x="166" y="98" text-anchor="middle">kiwi</text>
    <rect class="key" x="198" y="84" width="54" height="20" rx="3"/><text x="225" y="98" text-anchor="middle">lemon</text>
    <rect class="key" x="260" y="84" width="48" height="20" rx="3"/><text x="284" y="98" text-anchor="middle">plum</text>
    <rect class="key" x="316" y="84" width="62" height="20" rx="3"/><text x="347" y="98" text-anchor="middle">quince</text>
    <rect class="key" x="386" y="84" width="44" height="20" rx="3"/><text x="408" y="98" text-anchor="middle">yam</text>
  </g>
  <!-- nodes -->
  <rect class="node" x="40" y="300" width="120" height="40" rx="5"/><text x="100" y="318" text-anchor="middle" class="nodeT">Node 0</text><text x="100" y="333" text-anchor="middle" class="nodeS">A–H</text>
  <rect class="node" x="185" y="300" width="120" height="40" rx="5"/><text x="245" y="318" text-anchor="middle" class="nodeT">Node 1</text><text x="245" y="333" text-anchor="middle" class="nodeS">I–P</text>
  <rect class="node" x="330" y="300" width="120" height="40" rx="5"/><text x="390" y="318" text-anchor="middle" class="nodeT">Node 2</text><text x="390" y="333" text-anchor="middle" class="nodeS">Q–Z</text>
  <!-- range arrows (contiguous) -->
  <path class="arr" d="M53,104 L90,298" marker-end="url(#ah13)"/>
  <path class="arr" d="M110,104 L100,298" marker-end="url(#ah13)"/>
  <path class="arr" d="M166,104 L235,298" marker-end="url(#ah13)"/>
  <path class="arr" d="M225,104 L245,298" marker-end="url(#ah13)"/>
  <path class="arr" d="M284,104 L255,298" marker-end="url(#ah13)"/>
  <path class="arr" d="M347,104 L385,298" marker-end="url(#ah13)"/>
  <path class="arr" d="M408,104 L398,298" marker-end="url(#ah13)"/>
  <text x="245" y="206" text-anchor="middle" class="cap">adjacent keys → adjacent nodes</text>
  <text x="40" y="376" class="ok">✓ range scan = one adjacent node</text>
  <text x="40" y="396" class="bad">✗ sequential keys → one hot node</text>

  <!-- RIGHT: hash -->
  <text x="735" y="66" text-anchor="middle" class="h">Hash partitioning</text>
  <g class="keyT">
    <rect class="key" x="518" y="84" width="50" height="20" rx="3"/><text x="543" y="98" text-anchor="middle">apple</text>
    <rect class="key" x="576" y="84" width="48" height="20" rx="3"/><text x="600" y="98" text-anchor="middle">date</text>
    <rect class="key" x="632" y="84" width="48" height="20" rx="3"/><text x="656" y="98" text-anchor="middle">kiwi</text>
    <rect class="key" x="688" y="84" width="54" height="20" rx="3"/><text x="715" y="98" text-anchor="middle">lemon</text>
    <rect class="key" x="750" y="84" width="48" height="20" rx="3"/><text x="774" y="98" text-anchor="middle">plum</text>
    <rect class="key" x="806" y="84" width="62" height="20" rx="3"/><text x="837" y="98" text-anchor="middle">quince</text>
    <rect class="key" x="876" y="84" width="44" height="20" rx="3"/><text x="898" y="98" text-anchor="middle">yam</text>
  </g>
  <!-- hash box -->
  <rect class="hash" x="650" y="150" width="170" height="36" rx="18"/><text x="735" y="173" text-anchor="middle" class="nodeT">hash(key)</text>
  <path class="arr" d="M543,104 L710,148" marker-end="url(#ah13)"/>
  <path class="arr" d="M600,104 L720,148" marker-end="url(#ah13)"/>
  <path class="arr" d="M656,104 L730,148" marker-end="url(#ah13)"/>
  <path class="arr" d="M715,104 L740,148" marker-end="url(#ah13)"/>
  <path class="arr" d="M774,104 L748,148" marker-end="url(#ah13)"/>
  <path class="arr" d="M837,104 L758,148" marker-end="url(#ah13)"/>
  <path class="arr" d="M898,104 L768,148" marker-end="url(#ah13)"/>
  <!-- nodes with scattered key sets -->
  <rect class="node" x="528" y="300" width="120" height="56" rx="5"/><text x="588" y="318" text-anchor="middle" class="nodeT">Node 0</text><text x="588" y="338" text-anchor="middle" class="nodeS">date · plum · yam</text>
  <rect class="node" x="675" y="300" width="120" height="56" rx="5"/><text x="735" y="318" text-anchor="middle" class="nodeT">Node 1</text><text x="735" y="338" text-anchor="middle" class="nodeS">kiwi · quince</text>
  <rect class="node" x="822" y="300" width="120" height="56" rx="5"/><text x="882" y="318" text-anchor="middle" class="nodeT">Node 2</text><text x="882" y="338" text-anchor="middle" class="nodeS">apple · lemon</text>
  <path class="arr" d="M720,188 L600,298" marker-end="url(#ah13)"/>
  <path class="arr" d="M735,188 L735,298" marker-end="url(#ah13)"/>
  <path class="arr" d="M750,188 L870,298" marker-end="url(#ah13)"/>
  <text x="735" y="240" text-anchor="middle" class="cap">adjacency destroyed → even spread</text>
  <text x="528" y="392" class="ok">✓ even load across all nodes</text>
  <text x="528" y="412" class="bad">✗ range scan → hits every node</text>
</svg>
