<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" font-family="sans-serif">
  <defs>
    <marker id="a4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <style>
      .title{font-size:18px;font-weight:bold;fill:#111}
      .h{font-size:15px;font-weight:bold;fill:#111}
      .lbl{font-size:12.5px;fill:#222}
      .cap{font-size:12.5px;fill:#444}
      .nodeT{font-size:13px;font-weight:bold;fill:#111}
      .node{fill:#eee;stroke:#333;stroke-width:1.5}
      .life{stroke:#9a9a9a;stroke-width:1;stroke-dasharray:3 3}
      .msg{stroke:#222;stroke-width:1.8;fill:none}
      .panel{fill:none;stroke:#dcdcdc;stroke-width:1}
      .x2{font-size:14px;font-weight:bold;fill:#b00000}
      .chk{stroke:#1f7a1f;stroke-width:3;fill:none}
      .foot{font-size:13px;fill:#333}
    </style>
  </defs>

  <rect width="980" height="430" fill="#ffffff"/>
  <text x="490" y="30" text-anchor="middle" class="title">Three delivery guarantees — choose your failure mode</text>

  <!-- Panel 1: at-most-once -->
  <g transform="translate(16,56)">
    <rect class="panel" x="0" y="0" width="305" height="316"/>
    <text x="14" y="28" class="h">At-most-once</text>
    <rect class="node" x="40" y="46" width="40" height="24" rx="4"/><text x="60" y="63" text-anchor="middle" class="nodeT">A</text>
    <rect class="node" x="220" y="46" width="40" height="24" rx="4"/><text x="240" y="63" text-anchor="middle" class="nodeT">B</text>
    <line class="life" x1="60" y1="70" x2="60" y2="250"/>
    <line class="life" x1="240" y1="70" x2="240" y2="250"/>
    <text x="116" y="104" class="lbl">send</text>
    <line class="msg" x1="60" y1="110" x2="236" y2="128" marker-end="url(#a4)"/>
    <text x="96" y="160" class="cap">(no ack, no retry)</text>
    <text x="14" y="284" class="cap">0 or 1 delivery.</text>
    <text x="14" y="304" class="cap">May be lost · never duplicated.</text>
  </g>

  <!-- Panel 2: at-least-once -->
  <g transform="translate(337,56)">
    <rect class="panel" x="0" y="0" width="305" height="316"/>
    <text x="14" y="28" class="h">At-least-once</text>
    <rect class="node" x="40" y="46" width="40" height="24" rx="4"/><text x="60" y="63" text-anchor="middle" class="nodeT">A</text>
    <rect class="node" x="220" y="46" width="40" height="24" rx="4"/><text x="240" y="63" text-anchor="middle" class="nodeT">B</text>
    <line class="life" x1="60" y1="70" x2="60" y2="250"/>
    <line class="life" x1="240" y1="70" x2="240" y2="250"/>
    <text x="116" y="100" class="lbl">send</text>
    <line class="msg" x1="60" y1="106" x2="236" y2="122" marker-end="url(#a4)"/>
    <text x="110" y="158" class="lbl">retry</text>
    <line class="msg" x1="60" y1="164" x2="236" y2="180" marker-end="url(#a4)"/>
    <text x="176" y="210" class="x2">B receives it ×2</text>
    <text x="14" y="284" class="cap">1 or more deliveries.</text>
    <text x="14" y="304" class="cap">Never lost · may duplicate.</text>
  </g>

  <!-- Panel 3: exactly-once -->
  <g transform="translate(658,56)">
    <rect class="panel" x="0" y="0" width="305" height="316"/>
    <text x="14" y="28" class="h">Exactly-once *</text>
    <rect class="node" x="40" y="46" width="40" height="24" rx="4"/><text x="60" y="63" text-anchor="middle" class="nodeT">A</text>
    <rect class="node" x="220" y="46" width="40" height="24" rx="4"/><text x="240" y="63" text-anchor="middle" class="nodeT">B</text>
    <line class="life" x1="60" y1="70" x2="60" y2="250"/>
    <line class="life" x1="240" y1="70" x2="240" y2="250"/>
    <text x="116" y="118" class="lbl">send</text>
    <line class="msg" x1="60" y1="124" x2="236" y2="142" marker-end="url(#a4)"/>
    <polyline class="chk" points="248,150 256,160 272,138"/>
    <text x="14" y="284" class="cap">Exactly 1 effect.</text>
    <text x="14" y="304" class="cap">The goal — see note below.</text>
  </g>

  <text x="490" y="416" text-anchor="middle" class="foot">* Exactly-once <tspan font-style="italic">delivery</tspan> is impossible. We build exactly-once <tspan font-weight="bold">effects</tspan> = at-least-once + idempotency.</text>
</svg>
