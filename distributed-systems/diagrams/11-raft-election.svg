<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="sans-serif">
  <defs>
    <marker id="ah11" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .nodeT{font-size:12px;font-weight:bold;fill:#111}
      .node{fill:#eee;stroke:#333;stroke-width:1.4}
      .foll{font-size:10.5px;fill:#777}
      .life{stroke:#9a9a9a;stroke-width:1;stroke-dasharray:3 3}
      .msg{stroke:#222;stroke-width:1.6;fill:none}
      .none{stroke:#999;stroke-width:1.4;fill:none;stroke-dasharray:6 4}
      .mlbl{font-size:11.5px;fill:#333}
      .cand{fill:#fff0d0;stroke:#b58a3b;stroke-width:1.6}
      .lead{fill:#d8efd8;stroke:#2f8a4e;stroke-width:1.8}
      .stT{font-size:12px;font-weight:bold;fill:#111}
      .cap{font-size:12px;fill:#555}
      .tick{stroke:#b00000;stroke-width:2.4}
    </style>
  </defs>
  <rect width="900" height="560" fill="#ffffff"/>
  <text x="450" y="26" text-anchor="middle" class="title">Raft leader election: a majority elects one leader per term</text>

  <!-- nodes -->
  <g>
    <rect class="node" x="92" y="44" width="56" height="24" rx="4"/><text x="120" y="61" text-anchor="middle" class="nodeT">N1</text>
    <rect class="node" x="262" y="44" width="56" height="24" rx="4"/><text x="290" y="61" text-anchor="middle" class="nodeT">N2</text>
    <rect class="node" x="432" y="44" width="56" height="24" rx="4"/><text x="460" y="61" text-anchor="middle" class="nodeT">N3</text>
    <rect class="node" x="602" y="44" width="56" height="24" rx="4"/><text x="630" y="61" text-anchor="middle" class="nodeT">N4</text>
    <rect class="node" x="772" y="44" width="56" height="24" rx="4"/><text x="800" y="61" text-anchor="middle" class="nodeT">N5</text>
  </g>
  <text x="120" y="84" text-anchor="middle" class="foll">Follower·t4</text>
  <text x="290" y="84" text-anchor="middle" class="foll">Follower·t4</text>
  <text x="460" y="84" text-anchor="middle" class="foll">Follower·t4</text>
  <text x="630" y="84" text-anchor="middle" class="foll">Follower·t4</text>
  <text x="800" y="84" text-anchor="middle" class="foll">Follower·t4</text>
  <line class="life" x1="120" y1="92" x2="120" y2="520"/>
  <line class="life" x1="290" y1="92" x2="290" y2="520"/>
  <line class="life" x1="460" y1="92" x2="460" y2="520"/>
  <line class="life" x1="630" y1="92" x2="630" y2="520"/>
  <line class="life" x1="800" y1="92" x2="800" y2="520"/>

  <!-- timeout + candidate -->
  <line class="tick" x1="438" y1="118" x2="482" y2="118"/>
  <text x="460" y="110" text-anchor="middle" class="mlbl">election timeout fires first</text>
  <rect class="cand" x="396" y="130" width="128" height="28" rx="5"/>
  <text x="460" y="149" text-anchor="middle" class="stT">Candidate · term 5</text>
  <text x="540" y="150" class="cap">term 4 → 5, votes for itself</text>

  <!-- RequestVote -->
  <text x="250" y="186" class="mlbl">RequestVote(term 5) →</text>
  <line class="msg" x1="430" y1="180" x2="126" y2="214" marker-end="url(#ah11)"/>
  <line class="msg" x1="432" y1="182" x2="296" y2="210" marker-end="url(#ah11)"/>
  <line class="msg" x1="488" y1="182" x2="624" y2="210" marker-end="url(#ah11)"/>
  <line class="msg" x1="490" y1="184" x2="794" y2="216" marker-end="url(#ah11)"/>

  <!-- voteGranted -->
  <text x="250" y="270" class="mlbl">voteGranted</text>
  <line class="msg" x1="120" y1="250" x2="424" y2="290" marker-end="url(#ah11)"/>
  <line class="msg" x1="290" y1="252" x2="424" y2="288" marker-end="url(#ah11)"/>
  <line class="msg" x1="630" y1="252" x2="496" y2="288" marker-end="url(#ah11)"/>
  <line class="none" x1="800" y1="252" x2="500" y2="292" marker-end="url(#ah11)"/>
  <text x="700" y="250" class="cap">N5 silent (slow/down) — fine</text>

  <text x="460" y="328" text-anchor="middle" class="cap">votes = self + N1 + N2 + N4 = 4 of 5  ≥  majority (3)</text>

  <!-- leader -->
  <rect class="lead" x="400" y="350" width="120" height="30" rx="5"/>
  <text x="460" y="370" text-anchor="middle" class="stT">Leader · term 5</text>
  <text x="250" y="412" class="mlbl">heartbeat (AppendEntries) →</text>
  <line class="msg" x1="430" y1="398" x2="126" y2="430" marker-end="url(#ah11)"/>
  <line class="msg" x1="432" y1="400" x2="296" y2="428" marker-end="url(#ah11)"/>
  <line class="msg" x1="488" y1="400" x2="624" y2="428" marker-end="url(#ah11)"/>
  <line class="msg" x1="490" y1="402" x2="794" y2="432" marker-end="url(#ah11)"/>

  <text x="450" y="500" text-anchor="middle" class="cap">Randomized timeouts make one node time out first. A majority of votes elects exactly one leader per term —</text>
  <text x="450" y="520" text-anchor="middle" class="cap">so two leaders in the same term is impossible. Missing/slow votes don't block the win.</text>
</svg>
