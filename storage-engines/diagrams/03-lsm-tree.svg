<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="sans-serif">
  <defs>
    <marker id="al3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2a6099"/></marker>
    <marker id="ag3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker>
    <marker id="ared3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b00000"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:12px;font-weight:bold;fill:#333;letter-spacing:1px}
      .mem{fill:#eaf2fb;stroke:#2a6099;stroke-width:1.5}
      .sst{fill:#f4f4f0;stroke:#666;stroke-width:1.3}
      .sstM{fill:#e9f6ec;stroke:#1f7a1f;stroke-width:1.6}
      .lbl{font-size:11px;fill:#222}
      .small{font-size:10px;fill:#555}
      .blue{stroke:#2a6099;stroke-width:1.8;fill:none}
      .grey{stroke:#777;stroke-width:1.5;fill:none}
      .red{stroke:#b00000;stroke-width:1.6;fill:none;stroke-dasharray:5 3}
      .cap{font-size:11.5px;fill:#555}
      .bloom{fill:#f3eef7;stroke:#6b4fa0;stroke-width:1.5}
    </style>
  </defs>
  <rect width="980" height="620" fill="#ffffff"/>
  <text x="490" y="26" text-anchor="middle" class="title">LSM-tree: sequential writes, multi-file reads</text>

  <!-- WRITE PATH -->
  <text x="40" y="58" class="h">WRITE PATH</text>
  <path class="sst" d="M44,80 a30,8 0 0 1 60,0 v54 a30,8 0 0 1 -60,0 z"/>
  <ellipse class="sst" cx="74" cy="80" rx="30" ry="8"/>
  <text x="74" y="108" text-anchor="middle" class="small">WAL</text><text x="74" y="122" text-anchor="middle" class="small">append</text>
  <rect class="mem" x="150" y="74" width="180" height="80" rx="6"/>
  <text x="240" y="96" text-anchor="middle" class="lbl" fill="#26577e">MEMTABLE (RAM, sorted)</text>
  <text x="166" y="118" class="small">user:50 → Cy</text>
  <text x="166" y="134" class="small">user:51 → Dot</text>
  <line class="blue" x1="104" y1="100" x2="146" y2="100" marker-end="url(#al3)"/>
  <line class="blue" x1="240" y1="154" x2="240" y2="196" marker-end="url(#al3)"/>
  <text x="250" y="180" class="small" fill="#2a6099">FLUSH when full → new SSTable</text>

  <!-- SSTABLE STACK -->
  <text x="400" y="58" class="h">SSTables on disk (immutable, sorted)</text>
  <rect class="sst" x="370" y="200" width="200" height="44" rx="4"/><text x="384" y="220" class="small">SSTable-4 (newest)</text><text x="384" y="236" class="small">user:51 → Dot</text>
  <rect class="sst" x="370" y="252" width="200" height="44" rx="4"/><text x="384" y="272" class="small">SSTable-3</text><text x="384" y="288" class="small">user:60 → Eli</text>
  <rect class="sst" x="370" y="304" width="200" height="44" rx="4"/><text x="384" y="324" class="small">SSTable-2</text><text x="384" y="340" class="small" fill="#b00000">user:42 → Bea</text>
  <rect class="sst" x="370" y="356" width="200" height="44" rx="4"/><text x="384" y="376" class="small">SSTable-1 (oldest)</text><text x="384" y="392" class="small" fill="#999">user:42 → Ann</text>
  <ellipse cx="520" cy="372" rx="60" ry="40" fill="none" stroke="#b00000" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="582" y="58" class="cap">↑ newest</text><text x="582" y="408" class="cap">↓ oldest</text>

  <!-- COMPACTION -->
  <text x="640" y="300" class="h">COMPACTION (background)</text>
  <line class="grey" x1="572" y1="378" x2="640" y2="350" marker-end="url(#ag3)"/>
  <text x="600" y="345" class="small">merge</text>
  <rect class="sstM" x="640" y="320" width="210" height="60" rx="5"/>
  <text x="745" y="342" text-anchor="middle" class="lbl" fill="#236b3c">SSTable merged</text>
  <text x="656" y="362" class="small">user:42 → Bea  (newest wins)</text>
  <text x="656" y="376" class="small" fill="#b00000">stale user:42 → Ann dropped</text>

  <!-- READ PATH -->
  <line x1="40" y1="446" x2="940" y2="446" stroke="#e0e0e0"/>
  <text x="40" y="474" class="h">READ PATH</text>
  <rect class="sst" x="40" y="486" width="120" height="40" rx="5"/><text x="100" y="511" text-anchor="middle" class="lbl">Read user:42</text>
  <line class="grey" x1="160" y1="506" x2="230" y2="506" marker-end="url(#ag3)"/>
  <rect class="mem" x="232" y="486" width="120" height="40" rx="5"/><text x="292" y="506" text-anchor="middle" class="small">1. memtable?</text><text x="292" y="520" text-anchor="middle" class="small">(miss)</text>
  <line class="grey" x1="352" y1="506" x2="420" y2="506" marker-end="url(#ag3)"/>
  <path class="bloom" d="M424,486 h120 l-24,40 h-72 z"/>
  <text x="484" y="503" text-anchor="middle" class="small" fill="#52407e">2. Bloom filter</text><text x="484" y="517" text-anchor="middle" class="small" fill="#52407e">per SSTable</text>
  <line class="red" x1="500" y1="530" x2="500" y2="566" marker-end="url(#ared3)"/>
  <text x="510" y="556" class="small" fill="#b00000">absent → skip file</text>
  <line class="blue" x1="544" y1="506" x2="620" y2="506" marker-end="url(#al3)"/>
  <text x="560" y="498" class="small" fill="#2a6099">present →</text>
  <rect class="sst" x="624" y="478" width="230" height="56" rx="5"/>
  <text x="739" y="500" text-anchor="middle" class="lbl">3. scan SSTables</text><text x="739" y="518" text-anchor="middle" class="small">newest → oldest, return first match</text>

  <text x="490" y="598" text-anchor="middle" class="cap">Writes are sequential and cheap; a read may touch the memtable plus several SSTables — Bloom filters cut the misses, compaction cuts the files.</text>
</svg>
