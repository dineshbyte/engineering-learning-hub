<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="sans-serif">
  <defs>
    <marker id="ax8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#333"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .rec{fill:#f4f4f2;stroke:#777;stroke-width:1.3}
      .field{font-size:12px;fill:#222;font-family:monospace}
      .newF{fill:#eaf2fb;stroke:#2a6099;stroke-width:1.5}
      .newT{font-size:12px;fill:#26577e;font-family:monospace;font-weight:bold}
      .arr{stroke:#333;stroke-width:1.8;fill:none}
      .arrL{font-size:12px;font-weight:bold;fill:#111}
      .ann{font-size:11px;fill:#555}
      .compat{font-size:11px;font-weight:bold;fill:#1f7a1f}
      .chk{stroke:#1f7a1f;stroke-width:3;fill:none}
      .cap{font-size:12px;fill:#444}
    </style>
  </defs>
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="28" text-anchor="middle" class="title">Schema evolution: old and new code read each other's data</text>

  <line x1="450" y1="70" x2="450" y2="400" stroke="#888" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="450" y="62" text-anchor="middle" class="ann">version boundary (rolling deploy)</text>

  <!-- v1 -->
  <text x="240" y="96" text-anchor="middle" class="h">v1 schema (OLD code)</text>
  <rect class="rec" x="120" y="110" width="240" height="92" rx="6"/>
  <text x="135" y="140" class="field">[1] id   : 1234</text>
  <text x="135" y="172" class="field">[2] name : "Ada"</text>

  <!-- v2 -->
  <text x="660" y="96" text-anchor="middle" class="h">v2 schema (NEW code)</text>
  <rect class="rec" x="540" y="110" width="240" height="124" rx="6"/>
  <text x="555" y="140" class="field">[1] id    : 1234</text>
  <text x="555" y="170" class="field">[2] name  : "Ada"</text>
  <rect class="newF" x="548" y="184" width="224" height="34" rx="4"/>
  <text x="558" y="206" class="newT">[3] email : (optional, null)</text>
  <text x="790" y="205" class="ann">NEW in v2</text>

  <!-- arrow 1: NEW reads OLD -->
  <line class="arr" x1="362" y1="150" x2="538" y2="150" marker-end="url(#ax8)"/>
  <text x="450" y="142" text-anchor="middle" class="arrL">NEW code reads OLD data</text>
  <text x="450" y="246" text-anchor="middle" class="ann">field [3] absent → filled with default (null)</text>
  <text x="450" y="266" text-anchor="middle" class="compat">BACKWARD COMPATIBLE</text>
  <polyline class="chk" points="556,260 564,268 580,250"/>

  <!-- arrow 2: OLD reads NEW -->
  <line class="arr" x1="538" y1="330" x2="362" y2="330" marker-end="url(#ax8)"/>
  <text x="450" y="322" text-anchor="middle" class="arrL">OLD code reads NEW data</text>
  <text x="450" y="356" text-anchor="middle" class="ann">unknown tag [3] → skipped, not an error</text>
  <text x="450" y="376" text-anchor="middle" class="compat">FORWARD COMPATIBLE</text>
  <polyline class="chk" points="320,370 328,378 344,360"/>

  <rect x="120" y="430" width="660" height="44" rx="8" fill="#f6f7f6" stroke="#ddd"/>
  <text x="450" y="457" text-anchor="middle" class="cap">With the right rules — optional fields, stable tag numbers, never reuse a tag — old and new versions coexist during a rollout.</text>
</svg>
