<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" font-family="sans-serif">
  <defs>
    <marker id="af5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .box{fill:#eef1f4;stroke:#444;stroke-width:1.3}
      .feed{fill:#f6f6f4;stroke:#888;stroke-width:1}
      .post{fill:#fff3d6;stroke:#b58a3b;stroke-width:1}
      .boxT{font-size:11px;font-weight:bold;fill:#111}
      .sub{font-size:9.5px;fill:#444}
      .arr{stroke:#444;stroke-width:1.5;fill:none}
      .good{font-size:11px;font-weight:bold;fill:#1f7a1f}
      .bad{font-size:11px;font-weight:bold;fill:#b00000}
      .row{fill:#fff;stroke:#ccc;stroke-width:0.8}
    </style>
  </defs>
  <rect width="1040" height="560" fill="#ffffff"/>
  <text x="520" y="26" text-anchor="middle" class="title">News feed: fan-out on write (push) vs fan-out on read (pull)</text>
  <line x1="520" y1="46" x2="520" y2="430" stroke="#dcdcdc"/>

  <!-- FAN-OUT ON WRITE -->
  <text x="260" y="68" text-anchor="middle" class="h">FAN-OUT ON WRITE (push)</text>
  <rect class="box" x="30" y="90" width="120" height="40" rx="5"/><text x="90" y="114" text-anchor="middle" class="boxT">User A posts</text>
  <line class="arr" x1="150" y1="110" x2="190" y2="110" marker-end="url(#af5)"/>
  <rect class="box" x="192" y="90" width="110" height="40" rx="5"/><text x="247" y="114" text-anchor="middle" class="boxT">Fan-out worker</text>
  <!-- follower feeds -->
  <g>
    <rect class="feed" x="350" y="80" width="130" height="60" rx="4"/><text x="415" y="96" text-anchor="middle" class="sub">Follower 1 feed</text><rect class="post" x="356" y="102" width="118" height="14"/><rect class="row" x="356" y="118" width="118" height="12"/>
    <rect class="feed" x="350" y="160" width="130" height="60" rx="4"/><text x="415" y="176" text-anchor="middle" class="sub">Follower 2 feed</text><rect class="post" x="356" y="182" width="118" height="14"/><rect class="row" x="356" y="198" width="118" height="12"/>
    <rect class="feed" x="350" y="240" width="130" height="60" rx="4"/><text x="415" y="256" text-anchor="middle" class="sub">Follower 3 feed</text><rect class="post" x="356" y="262" width="118" height="14"/><rect class="row" x="356" y="278" width="118" height="12"/>
  </g>
  <line class="arr" x1="302" y1="110" x2="348" y2="110" marker-end="url(#af5)"/>
  <line class="arr" x1="302" y1="120" x2="348" y2="190" marker-end="url(#af5)"/>
  <line class="arr" x1="302" y1="125" x2="348" y2="270" marker-end="url(#af5)"/>
  <text x="260" y="340" text-anchor="middle" class="bad">expensive writes — copy to every follower</text>
  <text x="260" y="360" text-anchor="middle" class="good">cheap reads — feed precomputed</text>

  <!-- FAN-OUT ON READ -->
  <text x="780" y="68" text-anchor="middle" class="h">FAN-OUT ON READ (pull)</text>
  <rect class="box" x="900" y="90" width="120" height="40" rx="5"/><text x="960" y="114" text-anchor="middle" class="boxT">Follower opens</text>
  <line class="arr" x1="900" y1="110" x2="862" y2="110" marker-end="url(#af5)"/>
  <rect class="box" x="748" y="90" width="110" height="40" rx="5"/><text x="803" y="114" text-anchor="middle" class="boxT">Feed builder</text>
  <g>
    <rect class="feed" x="560" y="84" width="120" height="30" rx="4"/><text x="620" y="103" text-anchor="middle" class="sub">Followee 1 posts</text>
    <rect class="feed" x="560" y="120" width="120" height="30" rx="4"/><text x="620" y="139" text-anchor="middle" class="sub">Followee 2 posts</text>
    <rect class="feed" x="560" y="156" width="120" height="30" rx="4"/><text x="620" y="175" text-anchor="middle" class="sub">Followee 3 posts</text>
  </g>
  <line class="arr" x1="748" y1="105" x2="682" y2="100" marker-end="url(#af5)"/>
  <line class="arr" x1="748" y1="112" x2="682" y2="135" marker-end="url(#af5)"/>
  <line class="arr" x1="748" y1="118" x2="682" y2="170" marker-end="url(#af5)"/>
  <rect class="box" x="600" y="220" width="120" height="36" rx="5"/><text x="660" y="242" text-anchor="middle" class="boxT">Merge by time</text>
  <line class="arr" x1="620" y1="186" x2="650" y2="218" marker-end="url(#af5)"/>
  <line class="arr" x1="660" y1="256" x2="760" y2="256" marker-end="url(#af5)"/>
  <rect class="feed" x="762" y="238" width="120" height="36" rx="5"/><text x="822" y="260" text-anchor="middle" class="boxT">Assembled feed</text>
  <text x="780" y="340" text-anchor="middle" class="good">cheap writes — one insert</text>
  <text x="780" y="360" text-anchor="middle" class="bad">expensive reads — merge at request time</text>

  <!-- hybrid -->
  <rect x="60" y="450" width="920" height="80" rx="10" fill="#f6f7f6" stroke="#ddd"/>
  <text x="520" y="474" text-anchor="middle" class="h">HYBRID</text>
  <text x="280" y="500" text-anchor="middle" class="sub">normal user → <tspan class="good">PUSH</tspan> (precompute)</text>
  <text x="760" y="500" text-anchor="middle" class="sub">celebrity (millions of followers) → <tspan class="bad">PULL</tspan> at read time</text>
  <text x="520" y="520" text-anchor="middle" class="sub">Push for most users; pull for celebrities to avoid the fan-out explosion.</text>
</svg>
