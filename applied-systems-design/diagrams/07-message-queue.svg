<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 600" font-family="sans-serif">
  <defs>
    <marker id="aq7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <marker id="arep7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2a6099"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .band{font-size:12px;font-weight:bold;fill:#666}
      .box{fill:#eef1f4;stroke:#444;stroke-width:1.3}
      .cell{fill:#f6f6f4;stroke:#888;stroke-width:1}
      .lead{fill:#e9f6ec;stroke:#1f7a1f;stroke-width:1.8}
      .foll{fill:#eef1f4;stroke:#888;stroke-width:1;stroke-dasharray:4 3}
      .grp{fill:none;stroke:#2a6099;stroke-width:1.4;stroke-dasharray:5 4}
      .boxT{font-size:11px;font-weight:bold;fill:#111}
      .sub{font-size:9.5px;fill:#555}
      .off{font-size:8px;fill:#999}
      .arr{stroke:#444;stroke-width:1.4;fill:none}
      .rep{stroke:#2a6099;stroke-width:1.4;fill:none}
      .tag{font-size:9px;font-weight:bold;fill:#1f7a1f}
    </style>
  </defs>
  <rect width="1120" height="600" fill="#ffffff"/>
  <text x="560" y="26" text-anchor="middle" class="title">A message queue = Book 4's partitioned log + Book 1's leader–follower replication</text>

  <!-- producers -->
  <text x="90" y="64" text-anchor="middle" class="band">PRODUCERS</text>
  <rect class="box" x="30" y="100" width="120" height="34" rx="5"/><text x="90" y="121" text-anchor="middle" class="sub">Producer A</text>
  <rect class="box" x="30" y="200" width="120" height="34" rx="5"/><text x="90" y="221" text-anchor="middle" class="sub">Producer B</text>
  <rect class="box" x="30" y="300" width="120" height="34" rx="5"/><text x="90" y="321" text-anchor="middle" class="sub">Producer C</text>
  <text x="90" y="360" text-anchor="middle" class="sub">partition = hash(key) mod N</text>

  <!-- partitions -->
  <text x="470" y="64" text-anchor="middle" class="band">TOPIC: orders (3 partitions)</text>
  <!-- P0 -->
  <text x="200" y="124" class="boxT">P0</text>
  <g><rect class="cell" x="226" y="106" width="30" height="28"/><rect class="cell" x="256" y="106" width="30" height="28"/><rect class="cell" x="286" y="106" width="30" height="28"/><rect class="cell" x="316" y="106" width="30" height="28"/></g>
  <text x="226" y="148" class="off">0</text><text x="316" y="148" class="off">tail →</text>
  <rect class="lead" x="360" y="104" width="110" height="32" rx="4"/><text x="415" y="124" text-anchor="middle" class="tag">LEADER · Broker 1</text>
  <rect class="foll" x="490" y="100" width="100" height="18" rx="3"/><text x="540" y="113" text-anchor="middle" class="off">follower · B2</text>
  <rect class="foll" x="490" y="122" width="100" height="18" rx="3"/><text x="540" y="135" text-anchor="middle" class="off">follower · B3</text>
  <line class="rep" x1="470" y1="116" x2="488" y2="109" marker-end="url(#arep7)"/><line class="rep" x1="470" y1="124" x2="488" y2="131" marker-end="url(#arep7)"/>
  <!-- P1 -->
  <text x="200" y="224" class="boxT">P1</text>
  <g><rect class="cell" x="226" y="206" width="30" height="28"/><rect class="cell" x="256" y="206" width="30" height="28"/><rect class="cell" x="286" y="206" width="30" height="28"/></g>
  <rect class="lead" x="360" y="204" width="110" height="32" rx="4"/><text x="415" y="224" text-anchor="middle" class="tag">LEADER · Broker 2</text>
  <rect class="foll" x="490" y="200" width="100" height="18" rx="3"/><text x="540" y="213" text-anchor="middle" class="off">follower · B1</text>
  <rect class="foll" x="490" y="222" width="100" height="18" rx="3"/><text x="540" y="235" text-anchor="middle" class="off">follower · B3</text>
  <line class="rep" x1="470" y1="216" x2="488" y2="209" marker-end="url(#arep7)"/><line class="rep" x1="470" y1="224" x2="488" y2="231" marker-end="url(#arep7)"/>
  <!-- P2 -->
  <text x="200" y="324" class="boxT">P2</text>
  <g><rect class="cell" x="226" y="306" width="30" height="28"/><rect class="cell" x="256" y="306" width="30" height="28"/><rect class="cell" x="286" y="306" width="30" height="28"/><rect class="cell" x="316" y="306" width="30" height="28"/><rect class="cell" x="346" y="306" width="30" height="28"/></g>
  <rect class="lead" x="390" y="304" width="110" height="32" rx="4"/><text x="445" y="324" text-anchor="middle" class="tag">LEADER · Broker 3</text>
  <rect class="foll" x="520" y="300" width="100" height="18" rx="3"/><text x="570" y="313" text-anchor="middle" class="off">follower · B1</text>
  <rect class="foll" x="520" y="322" width="100" height="18" rx="3"/><text x="570" y="335" text-anchor="middle" class="off">follower · B2</text>
  <line class="rep" x1="500" y1="316" x2="518" y2="309" marker-end="url(#arep7)"/><line class="rep" x1="500" y1="324" x2="518" y2="331" marker-end="url(#arep7)"/>

  <!-- producer arrows to leaders -->
  <line class="arr" x1="150" y1="114" x2="358" y2="118" marker-end="url(#aq7)"/>
  <line class="arr" x1="150" y1="217" x2="358" y2="218" marker-end="url(#aq7)"/>
  <line class="arr" x1="150" y1="314" x2="388" y2="318" marker-end="url(#aq7)"/>

  <!-- consumer group -->
  <rect class="grp" x="760" y="90" width="320" height="270" rx="8"/>
  <text x="920" y="84" text-anchor="middle" class="band">CONSUMER GROUP: billing</text>
  <rect class="box" x="800" y="106" width="240" height="40" rx="5"/><text x="820" y="130" class="boxT">Consumer 1</text><text x="1010" y="130" text-anchor="end" class="tag" fill="#2a6099">offset: 3</text>
  <rect class="box" x="800" y="206" width="240" height="40" rx="5"/><text x="820" y="230" class="boxT">Consumer 2</text><text x="1010" y="230" text-anchor="end" class="tag" fill="#2a6099">offset: 2</text>
  <rect class="box" x="800" y="306" width="240" height="40" rx="5"/><text x="820" y="330" class="boxT">Consumer 3</text><text x="1010" y="330" text-anchor="end" class="tag" fill="#2a6099">offset: 4</text>
  <line class="arr" x1="590" y1="120" x2="798" y2="126" marker-end="url(#aq7)"/>
  <line class="arr" x1="590" y1="222" x2="798" y2="226" marker-end="url(#aq7)"/>
  <line class="arr" x1="620" y1="322" x2="798" y2="326" marker-end="url(#aq7)"/>

  <rect x="120" y="430" width="880" height="40" rx="8" fill="#f6f7f6" stroke="#ddd"/>
  <text x="560" y="455" text-anchor="middle" class="boxT">partition = ordering + parallelism   ·   replication (leader → followers) = durability   ·   offset = consumer position</text>
</svg>
