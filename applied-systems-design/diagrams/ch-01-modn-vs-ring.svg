<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 540" font-family="sans-serif">
  <defs>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .th{font-size:11px;font-weight:bold;fill:#444}
      .cell{font-size:12px;fill:#222;font-family:monospace}
      .moved{font-size:11px;font-weight:bold;fill:#b00000}
      .ring{fill:none;stroke:#bbb;stroke-width:2}
      .node{fill:#26356b;stroke:#1a2350;stroke-width:1}
      .newn{fill:#fff;stroke:#b06000;stroke-width:2;stroke-dasharray:3 2}
      .nt{font-size:12px;font-weight:bold;fill:#111}
      .key{fill:#888}
      .sub{font-size:10.5px;fill:#555}
      .good{font-size:11px;font-weight:bold;fill:#1f7a1f}
    </style>
  </defs>
  <rect width="1020" height="540" fill="#ffffff"/>
  <text x="510" y="26" text-anchor="middle" class="title">Why the ring beats hash(key) mod N</text>
  <line x1="500" y1="46" x2="500" y2="500" stroke="#dcdcdc"/>

  <!-- mod N -->
  <text x="40" y="72" class="h">hash(key) mod N — add a node (4 → 5)</text>
  <text x="60" y="104" class="th">key</text><text x="180" y="104" class="th">mod 4</text><text x="280" y="104" class="th">mod 5</text><text x="380" y="104" class="th">result</text>
  <line x1="55" y1="110" x2="460" y2="110" stroke="#ddd"/>
  <text x="60" y="132" class="cell">10</text><text x="190" y="132" class="cell">2</text><text x="290" y="132" class="cell">0</text><text x="380" y="132" class="moved">moved ✗</text>
  <text x="60" y="158" class="cell">11</text><text x="190" y="158" class="cell">3</text><text x="290" y="158" class="cell">1</text><text x="380" y="158" class="moved">moved ✗</text>
  <text x="60" y="184" class="cell">12</text><text x="190" y="184" class="cell">0</text><text x="290" y="184" class="cell">2</text><text x="380" y="184" class="moved">moved ✗</text>
  <text x="60" y="210" class="cell">13</text><text x="190" y="210" class="cell">1</text><text x="290" y="210" class="cell">3</text><text x="380" y="210" class="moved">moved ✗</text>
  <text x="60" y="236" class="cell">14</text><text x="190" y="236" class="cell">2</text><text x="290" y="236" class="cell">4</text><text x="380" y="236" class="moved">moved ✗</text>
  <text x="60" y="262" class="cell">15</text><text x="190" y="262" class="cell">3</text><text x="290" y="262" class="cell">0</text><text x="380" y="262" class="moved">moved ✗</text>
  <text x="40" y="320" class="moved">≈ N/(N+1) of ALL keys remap — nearly everything moves.</text>
  <text x="40" y="344" class="sub">Cache → total miss storm. Shard → re-shuffle the whole dataset.</text>

  <!-- ring -->
  <text x="760" y="72" text-anchor="middle" class="h">Consistent hashing ring — add a node</text>
  <circle class="ring" cx="760" cy="250" r="130"/>
  <!-- shaded moving arc D -> E (top-left) -->
  <path d="M760,250 L630,250 A130,130 0 0 1 700,143 Z" fill="#ffe0b3" opacity="0.6"/>
  <circle class="node" cx="760" cy="120" r="11"/><text x="760" y="112" text-anchor="middle" class="nt">A</text>
  <circle class="node" cx="890" cy="250" r="11"/><text x="908" y="254" text-anchor="middle" class="nt">B</text>
  <circle class="node" cx="760" cy="380" r="11"/><text x="760" y="400" text-anchor="middle" class="nt">C</text>
  <circle class="node" cx="630" cy="250" r="11"/><text x="606" y="254" text-anchor="middle" class="nt">D</text>
  <circle class="newn" cx="700" cy="143" r="11"/><text x="676" y="138" text-anchor="middle" class="nt" fill="#b06000">E (new)</text>
  <!-- keys -->
  <circle class="key" cx="672" cy="180" r="5"/><circle class="key" cx="700" cy="200" r="5"/><circle class="key" cx="850" cy="190" r="5"/><circle class="key" cx="820" cy="340" r="5"/><circle class="key" cx="660" cy="320" r="5"/>
  <text x="760" y="450" text-anchor="middle" class="good">only ~K/N keys move (the shaded arc, now owned by E)</text>
  <text x="760" y="468" text-anchor="middle" class="sub">every other key stays exactly where it was</text>
</svg>
