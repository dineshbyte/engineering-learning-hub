<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 600" font-family="sans-serif">
  <defs>
    <marker id="am1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#444;letter-spacing:1px}
      .step{fill:#eef1f7;stroke:#5566aa;stroke-width:1.4}
      .stepT{font-size:13px;font-weight:bold;fill:#26356b}
      .sub{font-size:9.5px;fill:#555}
      .blk{fill:#eef1f4;stroke:#444;stroke-width:1.3}
      .cache{fill:#fff3d6;stroke:#b58a3b;stroke-width:1.4}
      .blkT{font-size:11px;font-weight:bold;fill:#111}
      .gl{font-size:8.5px;fill:#666}
      .arr{stroke:#555;stroke-width:1.5;fill:none}
      .num{font-size:12px;font-weight:bold;fill:#fff}
    </style>
  </defs>
  <rect width="1020" height="600" fill="#ffffff"/>
  <text x="510" y="28" text-anchor="middle" class="title">The systems-design method assembles the same building blocks</text>
  <line x1="390" y1="48" x2="390" y2="560" stroke="#dcdcdc"/>

  <!-- METHOD -->
  <text x="200" y="66" text-anchor="middle" class="h">THE METHOD</text>
  <g>
    <rect class="step" x="40" y="80" width="320" height="50" rx="6"/><circle cx="62" cy="105" r="11" fill="#5566aa"/><text x="62" y="109" text-anchor="middle" class="num">1</text><text x="82" y="101" class="stepT">Clarify requirements</text><text x="82" y="118" class="sub">functional + non-functional (scale, latency, availability, consistency)</text>
    <rect class="step" x="40" y="156" width="320" height="50" rx="6"/><circle cx="62" cy="181" r="11" fill="#5566aa"/><text x="62" y="185" text-anchor="middle" class="num">2</text><text x="82" y="177" class="stepT">Estimate scale</text><text x="82" y="194" class="sub">QPS, storage, bandwidth (Lesson 2)</text>
    <rect class="step" x="40" y="232" width="320" height="50" rx="6"/><circle cx="62" cy="257" r="11" fill="#5566aa"/><text x="62" y="261" text-anchor="middle" class="num">3</text><text x="82" y="253" class="stepT">API &amp; data model</text><text x="82" y="270" class="sub">the contract + the hot query</text>
    <rect class="step" x="40" y="308" width="320" height="50" rx="6"/><circle cx="62" cy="333" r="11" fill="#5566aa"/><text x="62" y="337" text-anchor="middle" class="num">4</text><text x="82" y="329" class="stepT">High-level design</text><text x="82" y="346" class="sub">boxes and arrows</text>
    <rect class="step" x="40" y="384" width="320" height="50" rx="6"/><circle cx="62" cy="409" r="11" fill="#5566aa"/><text x="62" y="413" text-anchor="middle" class="num">5</text><text x="82" y="405" class="stepT">Deep-dive &amp; trade-offs</text><text x="82" y="422" class="sub">find the bottleneck, name the cost</text>
  </g>
  <line class="arr" x1="200" y1="130" x2="200" y2="156" marker-end="url(#am1)"/>
  <line class="arr" x1="200" y1="206" x2="200" y2="232" marker-end="url(#am1)"/>
  <line class="arr" x1="200" y1="282" x2="200" y2="308" marker-end="url(#am1)"/>
  <line class="arr" x1="200" y1="358" x2="200" y2="384" marker-end="url(#am1)"/>

  <!-- BUILDING BLOCKS -->
  <text x="710" y="66" text-anchor="middle" class="h">THE BUILDING BLOCKS</text>
  <rect class="blk" x="404" y="120" width="80" height="40" rx="5"/><text x="444" y="144" text-anchor="middle" class="blkT">Client</text>
  <line class="arr" x1="484" y1="140" x2="510" y2="140" marker-end="url(#am1)"/>
  <rect class="blk" x="512" y="120" width="70" height="40" rx="5"/><text x="547" y="144" text-anchor="middle" class="blkT">CDN</text>
  <line class="arr" x1="582" y1="140" x2="608" y2="140" marker-end="url(#am1)"/>
  <rect class="blk" x="610" y="120" width="90" height="40" rx="5"/><text x="655" y="138" text-anchor="middle" class="blkT">Load</text><text x="655" y="152" text-anchor="middle" class="blkT">Balancer</text>
  <!-- app stack -->
  <rect class="blk" x="730" y="98" width="96" height="30" rx="4"/><text x="778" y="118" text-anchor="middle" class="gl">App (stateless)</text>
  <rect class="blk" x="730" y="132" width="96" height="30" rx="4"/><text x="778" y="152" text-anchor="middle" class="gl">App (stateless)</text>
  <rect class="blk" x="730" y="166" width="96" height="30" rx="4"/><text x="778" y="186" text-anchor="middle" class="gl">App (stateless)</text>
  <line class="arr" x1="700" y1="140" x2="728" y2="120" marker-end="url(#am1)"/>
  <line class="arr" x1="700" y1="140" x2="728" y2="147" marker-end="url(#am1)"/>
  <line class="arr" x1="700" y1="140" x2="728" y2="180" marker-end="url(#am1)"/>
  <!-- cache + db -->
  <rect class="cache" x="870" y="98" width="120" height="38" rx="5"/><text x="930" y="115" text-anchor="middle" class="blkT">Cache</text><text x="930" y="129" text-anchor="middle" class="gl">hot reads &lt;1ms</text>
  <rect class="blk" x="870" y="160" width="120" height="40" rx="5"/><text x="930" y="178" text-anchor="middle" class="blkT">Database</text><text x="930" y="192" text-anchor="middle" class="gl">source of truth</text>
  <line class="arr" x1="826" y1="120" x2="868" y2="116" marker-end="url(#am1)"/>
  <line class="arr" x1="826" y1="170" x2="868" y2="178" marker-end="url(#am1)"/>
  <line x1="930" y1="136" x2="930" y2="160" class="arr" stroke-dasharray="3 3" marker-end="url(#am1)"/><text x="940" y="152" class="gl">miss → DB</text>
  <!-- queue + workers -->
  <rect class="blk" x="730" y="280" width="96" height="38" rx="5"/><text x="778" y="303" text-anchor="middle" class="blkT">Queue</text>
  <line class="arr" x1="778" y1="196" x2="778" y2="278" marker-end="url(#am1)"/><text x="786" y="245" class="gl">defer work</text>
  <rect class="blk" x="870" y="280" width="120" height="38" rx="5"/><text x="930" y="303" text-anchor="middle" class="blkT">Workers</text>
  <line class="arr" x1="826" y1="299" x2="868" y2="299" marker-end="url(#am1)"/>
  <!-- object store -->
  <rect class="blk" x="730" y="350" width="260" height="36" rx="5"/><text x="860" y="373" text-anchor="middle" class="blkT">Object Store — large immutable blobs (images, video)</text>
  <line class="arr" x1="778" y1="318" x2="800" y2="348" marker-end="url(#am1)"/>
  <line class="arr" x1="930" y1="318" x2="910" y2="348" marker-end="url(#am1)"/>

  <text x="710" y="440" text-anchor="middle" class="sub">Reads: Client → CDN → LB → App → Cache/DB.   Deferred work: App → Queue → Workers.   Blobs → Object Store.</text>
</svg>
