<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 560" font-family="sans-serif">
  <defs>
    <marker id="ac6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <marker id="ag6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f7a1f"/></marker>
    <marker id="am6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b06000"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .box{fill:#eef1f4;stroke:#444;stroke-width:1.4}
      .cache{fill:#fff3d6;stroke:#b58a3b;stroke-width:1.4}
      .boxT{font-size:12px;font-weight:bold;fill:#111}
      .sub{font-size:10px;fill:#555}
      .hit{stroke:#1f7a1f;stroke-width:2;fill:none}
      .miss{stroke:#b06000;stroke-width:2;fill:none}
      .arr{stroke:#444;stroke-width:1.6;fill:none}
      .num{font-size:12px;font-weight:bold;fill:#fff}
      .warn{fill:#fbeaea;stroke:#b00000;stroke-width:1.3}
      .bad{font-size:10px;font-weight:bold;fill:#b00000}
      .node{fill:#26356b;stroke:#1a2350;stroke-width:1}
      .nodeNew{fill:#fff;stroke:#b06000;stroke-width:2;stroke-dasharray:3 2}
      .key{fill:#fff;stroke:#888;stroke-width:1}
      .ring{fill:none;stroke:#bbb;stroke-width:2}
    </style>
  </defs>
  <rect width="1020" height="560" fill="#ffffff"/>
  <text x="510" y="26" text-anchor="middle" class="title">Distributed cache: cache-aside reads + consistent-hashing placement</text>
  <line x1="470" y1="46" x2="470" y2="500" stroke="#dcdcdc"/>

  <!-- cache-aside -->
  <text x="230" y="68" text-anchor="middle" class="h">Cache-aside read (numbered)</text>
  <rect class="box" x="40" y="130" width="90" height="44" rx="6"/><text x="85" y="157" text-anchor="middle" class="boxT">App</text>
  <rect class="cache" x="240" y="120" width="120" height="44" rx="6"/><text x="300" y="147" text-anchor="middle" class="boxT">Cache (RAM)</text>
  <rect class="box" x="240" y="240" width="120" height="44" rx="6"/><text x="300" y="267" text-anchor="middle" class="boxT">Database</text>
  <line class="arr" x1="130" y1="146" x2="236" y2="138" marker-end="url(#ac6)"/><circle cx="180" cy="128" r="10" fill="#444"/><text x="180" y="132" text-anchor="middle" class="num">1</text><text x="150" y="120" class="sub">read key</text>
  <path class="hit" d="M240,156 C 170,200 110,200 88,176" marker-end="url(#ag6)"/><text x="120" y="210" class="sub" fill="#1f7a1f">HIT: return at step 1</text>
  <line class="miss" x1="300" y1="164" x2="300" y2="238" marker-end="url(#am6)"/><circle cx="300" cy="200" r="10" fill="#b06000"/><text x="300" y="204" text-anchor="middle" class="num">2</text><text x="312" y="204" class="sub" fill="#b06000">MISS → read DB</text>
  <path class="miss" d="M360,250 C 410,210 410,160 362,142" marker-end="url(#am6)"/><circle cx="400" cy="196" r="10" fill="#b06000"/><text x="400" y="200" text-anchor="middle" class="num">3</text><text x="406" y="200" class="sub">populate</text>
  <rect class="warn" x="40" y="330" width="400" height="56" rx="6"/>
  <text x="56" y="352" class="bad">Cache stampede: one hot key expires →</text>
  <text x="56" y="370" class="sub">many requests all MISS → all hit the DB at once (fix: coalesce, stagger TTLs).</text>

  <!-- ring -->
  <text x="745" y="68" text-anchor="middle" class="h">Consistent hashing ring</text>
  <circle class="ring" cx="745" cy="270" r="130"/>
  <text x="745" y="128" text-anchor="middle" class="sub">0 / hash space (clockwise)</text>
  <circle class="node" cx="745" cy="140" r="9"/><text x="745" y="132" text-anchor="middle" class="sub">Node A</text>
  <circle class="node" cx="875" cy="270" r="9"/><text x="900" y="274" text-anchor="middle" class="sub">Node B</text>
  <circle class="node" cx="745" cy="400" r="9"/><text x="745" y="420" text-anchor="middle" class="sub">Node C</text>
  <circle class="node" cx="615" cy="270" r="9"/><text x="585" y="274" text-anchor="middle" class="sub">Node D</text>
  <!-- new node E in arc A->B -->
  <circle class="nodeNew" cx="838" cy="190" r="9"/><text x="858" y="180" class="sub" fill="#b06000">Node E (new)</text>
  <path d="M745,140 A130,130 0 0 1 838,190" fill="none" stroke="#ffcf9a" stroke-width="10" opacity="0.7"/>
  <!-- keys -->
  <rect class="key" x="800" y="160" width="12" height="12"/><text x="790" y="158" class="sub">k1</text>
  <rect class="key" x="868" y="320" width="12" height="12"/><text x="884" y="330" class="sub">k2</text>
  <rect class="key" x="690" y="392" width="12" height="12"/><text x="676" y="404" class="sub">k3</text>
  <rect class="key" x="612" y="200" width="12" height="12"/><text x="596" y="198" class="sub">k4</text>
  <text x="745" y="470" text-anchor="middle" class="sub">each key → next node clockwise.  Adding Node E remaps only the keys in the shaded arc (≈ K/N).</text>
</svg>
