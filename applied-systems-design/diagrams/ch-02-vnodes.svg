<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 540" font-family="sans-serif">
  <defs>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .ring{fill:none;stroke:#bbb;stroke-width:2}
      .nA{fill:#2a6099}.nB{fill:#1f7a1f}.nC{fill:#b06000}.nD{fill:#6b4fa0}
      .nt{font-size:11px;font-weight:bold;fill:#111}
      .sub{font-size:10.5px;fill:#555}
      .bad{font-size:11px;font-weight:bold;fill:#b00000}
      .good{font-size:11px;font-weight:bold;fill:#1f7a1f}
      .barbg{fill:#eee;stroke:#ccc;stroke-width:1}
    </style>
  </defs>
  <rect width="1020" height="540" fill="#ffffff"/>
  <text x="510" y="26" text-anchor="middle" class="title">Virtual nodes smooth the load on the ring</text>
  <line x1="510" y1="46" x2="510" y2="500" stroke="#dcdcdc"/>

  <!-- no vnodes -->
  <text x="250" y="72" text-anchor="middle" class="h">No vnodes — 1 token each</text>
  <circle class="ring" cx="250" cy="220" r="110"/>
  <!-- A owns the big arc (left+top) -->
  <path d="M250,220 L140,220 A110,110 0 0 1 320,140 Z" fill="#bcd0e0" opacity="0.7"/>
  <circle class="nA" cx="320" cy="140" r="11"/><text x="334" y="134" class="nt">A</text>
  <circle class="nB" cx="350" cy="220" r="11"/><text x="368" y="224" class="nt">B</text>
  <circle class="nC" cx="320" cy="300" r="11"/><text x="336" y="318" class="nt">C</text>
  <circle class="nD" cx="140" cy="220" r="11"/><text x="116" y="224" class="nt">D</text>
  <text x="250" y="360" text-anchor="middle" class="bad">A owns a huge arc — overloaded.</text>
  <!-- load bars -->
  <text x="60" y="388" class="sub">load per node:</text>
  <rect class="barbg" x="60" y="396" width="360" height="18"/><rect x="60" y="396" width="180" height="18" fill="#2a6099"/><text x="245" y="409" class="sub">A ≈ 50%</text>
  <rect class="barbg" x="60" y="420" width="360" height="14"/><rect x="60" y="420" width="80" height="14" fill="#1f7a1f"/><text x="145" y="431" class="sub">B ≈ 22%</text>
  <rect class="barbg" x="60" y="440" width="360" height="14"/><rect x="60" y="440" width="64" height="14" fill="#b06000"/><text x="129" y="451" class="sub">C ≈ 18%</text>
  <rect class="barbg" x="60" y="460" width="360" height="14"/><rect x="60" y="460" width="40" height="14" fill="#6b4fa0"/><text x="105" y="471" class="sub">D ≈ 10%</text>

  <!-- with vnodes -->
  <text x="760" y="72" text-anchor="middle" class="h">With vnodes — many tokens each</text>
  <circle class="ring" cx="760" cy="220" r="110"/>
  <!-- scattered vnodes (16): cycle colors -->
  <g>
    <circle class="nA" cx="760" cy="110" r="7"/><circle class="nB" cx="805" cy="120" r="7"/><circle class="nC" cx="845" cy="150" r="7"/><circle class="nD" cx="865" cy="195" r="7"/>
    <circle class="nA" cx="868" cy="245" r="7"/><circle class="nB" cx="850" cy="290" r="7"/><circle class="nC" cx="815" cy="318" r="7"/><circle class="nD" cx="770" cy="330" r="7"/>
    <circle class="nA" cx="720" cy="325" r="7"/><circle class="nB" cx="678" cy="300" r="7"/><circle class="nC" cx="652" cy="262" r="7"/><circle class="nD" cx="650" cy="212" r="7"/>
    <circle class="nA" cx="662" cy="168" r="7"/><circle class="nB" cx="690" cy="135" r="7"/><circle class="nC" cx="725" cy="116" r="7"/><circle class="nD" cx="828" cy="278" r="7"/>
  </g>
  <text x="760" y="360" text-anchor="middle" class="good">every node owns many small arcs → load ≈ 1/N.</text>
  <text x="560" y="388" class="sub">load per node (std dev ∝ 1/√V):</text>
  <rect class="barbg" x="560" y="396" width="360" height="14"/><rect x="560" y="396" width="92" height="14" fill="#2a6099"/><text x="657" y="407" class="sub">A ≈ 26%</text>
  <rect class="barbg" x="560" y="416" width="360" height="14"/><rect x="560" y="416" width="86" height="14" fill="#1f7a1f"/><text x="651" y="427" class="sub">B ≈ 24%</text>
  <rect class="barbg" x="560" y="436" width="360" height="14"/><rect x="560" y="436" width="90" height="14" fill="#b06000"/><text x="655" y="447" class="sub">C ≈ 25%</text>
  <rect class="barbg" x="560" y="456" width="360" height="14"/><rect x="560" y="456" width="88" height="14" fill="#6b4fa0"/><text x="653" y="467" class="sub">D ≈ 25%</text>

  <text x="510" y="500" text-anchor="middle" class="sub">Vnodes also spread a failed node's load across many successors, and let a bigger node take more tokens (weighting).</text>
</svg>
