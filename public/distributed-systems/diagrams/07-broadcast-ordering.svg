<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 540" font-family="sans-serif">
  <defs>
    <marker id="ah7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:14px;font-weight:bold;fill:#111}
      .rung{font-size:13px;font-weight:bold;fill:#111}
      .add{font-size:11.5px;fill:#444}
      .nodeT{font-size:12px;font-weight:bold;fill:#111}
      .node{fill:#eee;stroke:#333;stroke-width:1.4}
      .life{stroke:#9a9a9a;stroke-width:1;stroke-dasharray:3 3}
      .msg{stroke:#222;stroke-width:1.7;fill:none}
      .slow{stroke:#888;stroke-width:1.7;fill:none;stroke-dasharray:6 4}
      .mlbl{font-size:11px;fill:#444}
      .cap{font-size:11.5px;fill:#555}
      .bad{font-size:12px;font-weight:bold;fill:#b00000}
      .xline{stroke:#b00000;stroke-width:2.4}
    </style>
  </defs>
  <rect width="980" height="540" fill="#ffffff"/>
  <text x="490" y="26" text-anchor="middle" class="title">The broadcast ladder — and the causal violation it prevents</text>
  <line x1="490" y1="44" x2="490" y2="520" stroke="#dcdcdc" stroke-width="1"/>

  <!-- LEFT: ladder -->
  <text x="40" y="70" class="h">Stronger ↑ (more cost)</text>
  <!-- rungs bottom-to-top -->
  <g>
    <rect x="60" y="430" width="360" height="48" rx="4" fill="#f3f3f3" stroke="#ccc"/>
    <text x="74" y="452" class="rung">Best-effort</text><text x="74" y="470" class="add">try once; may not reach everyone</text>

    <rect x="60" y="372" width="360" height="48" rx="4" fill="#e9eef2" stroke="#bcc"/>
    <text x="74" y="394" class="rung">Reliable</text><text x="74" y="412" class="add">if one correct node gets it, all do</text>

    <rect x="60" y="314" width="360" height="48" rx="4" fill="#dfe7ee" stroke="#aabbc8"/>
    <text x="74" y="336" class="rung">FIFO</text><text x="74" y="354" class="add">one sender's messages keep send order</text>

    <rect x="60" y="256" width="360" height="48" rx="4" fill="#d2dde8" stroke="#9ab"/>
    <text x="74" y="278" class="rung">Causal</text><text x="74" y="296" class="add">if A → B, everyone delivers A before B</text>

    <rect x="60" y="198" width="360" height="48" rx="4" fill="#bcd0e0" stroke="#789aac"/>
    <text x="74" y="220" class="rung">Total order</text><text x="74" y="238" class="add">all nodes deliver every message in ONE order</text>
  </g>
  <text x="436" y="216" class="cap" transform="rotate(90 436 216)">needs consensus</text>
  <text x="40" y="500" class="cap">FIFO ⊂ Causal ⊂ Total order — each rung adds exactly one promise.</text>

  <!-- RIGHT: causal violation -->
  <text x="690" y="70" text-anchor="middle" class="h">A causal-order violation</text>
  <rect class="node" x="540" y="84" width="58" height="24" rx="4"/><text x="569" y="101" text-anchor="middle" class="nodeT">Alice</text>
  <rect class="node" x="690" y="84" width="58" height="24" rx="4"/><text x="719" y="101" text-anchor="middle" class="nodeT">Bob</text>
  <rect class="node" x="838" y="84" width="58" height="24" rx="4"/><text x="867" y="101" text-anchor="middle" class="nodeT">Carol</text>
  <line class="life" x1="569" y1="108" x2="569" y2="470"/>
  <line class="life" x1="719" y1="108" x2="719" y2="470"/>
  <line class="life" x1="867" y1="108" x2="867" y2="470"/>

  <!-- M1 from Alice to Bob (prompt) and Carol (slow) -->
  <text x="582" y="150" class="mlbl">M1: "seen my keys?"</text>
  <line class="msg" x1="569" y1="156" x2="715" y2="186" marker-end="url(#ah7)"/>
  <line class="slow" x1="569" y1="158" x2="863" y2="320" marker-end="url(#ah7)"/>
  <text x="690" y="270" class="cap" transform="rotate(29 690 270)">M1 slow…</text>

  <!-- Bob replies M2 to Carol, arrives before M1 -->
  <text x="640" y="210" class="mlbl">M2: "on the table"</text>
  <line class="msg" x1="719" y1="214" x2="863" y2="244" marker-end="url(#ah7)"/>
  <text x="700" y="200" class="cap">M1 → M2</text>

  <line class="xline" x1="859" y1="240" x2="875" y2="256"/>
  <line class="xline" x1="875" y1="240" x2="859" y2="256"/>
  <text x="867" y="280" text-anchor="middle" class="bad">reply before</text>
  <text x="867" y="296" text-anchor="middle" class="bad">the question!</text>

  <text x="690" y="500" text-anchor="middle" class="cap">Causal broadcast holds M2 back until M1 is delivered.</text>
</svg>
