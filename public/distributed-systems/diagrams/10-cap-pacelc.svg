<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="sans-serif">
  <defs>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .dia{fill:#eef1f4;stroke:#555;stroke-width:1.6}
      .diaT{font-size:12.5px;font-weight:bold;fill:#111}
      .edge{stroke:#666;stroke-width:1.5;fill:none}
      .eL{font-size:12px;font-weight:bold;fill:#333}
      .leafC{fill:#d6e4f0;stroke:#3b6fb0;stroke-width:1.6}
      .leafA{fill:#f6ead2;stroke:#b58a3b;stroke-width:1.6}
      .lt{font-size:13px;font-weight:bold;fill:#111}
      .ls{font-size:10.5px;fill:#444}
      .ex{font-size:10px;font-style:italic;fill:#555}
      .cap{font-size:12px;fill:#555}
    </style>
  </defs>
  <rect width="960" height="560" fill="#ffffff"/>
  <text x="480" y="28" text-anchor="middle" class="title">PACELC: the trade-off you can't escape</text>

  <!-- edges first -->
  <line class="edge" x1="430" y1="100" x2="270" y2="172"/>
  <line class="edge" x1="530" y1="100" x2="700" y2="172"/>
  <text x="320" y="138" class="eL">P  (partition)</text>
  <text x="560" y="138" class="eL">Else  (healthy — common case)</text>

  <line class="edge" x1="210" y1="226" x2="150" y2="296"/>
  <line class="edge" x1="290" y1="226" x2="375" y2="296"/>
  <text x="168" y="268" class="eL">A</text>
  <text x="338" y="268" class="eL">C</text>

  <line class="edge" x1="680" y1="226" x2="620" y2="296"/>
  <line class="edge" x1="760" y1="226" x2="845" y2="296"/>
  <text x="636" y="268" class="eL">L</text>
  <text x="808" y="268" class="eL">C</text>

  <!-- root diamond -->
  <polygon class="dia" points="480,32 632,70 480,108 328,70"/>
  <text x="480" y="74" text-anchor="middle" class="diaT">Is there a network Partition?</text>

  <!-- left diamond -->
  <polygon class="dia" points="250,168 348,202 250,236 152,202"/>
  <text x="250" y="206" text-anchor="middle" class="diaT">CAP choice</text>
  <!-- right diamond -->
  <polygon class="dia" points="720,168 828,202 720,236 612,202"/>
  <text x="720" y="206" text-anchor="middle" class="diaT">normal-case choice</text>

  <!-- leaves -->
  <rect class="leafA" x="60" y="298" width="170" height="96" rx="6"/>
  <text x="74" y="322" class="lt">PA — stay Available</text>
  <text x="74" y="344" class="ls">serve possibly-stale data;</text>
  <text x="74" y="360" class="ls">every reachable node answers</text>
  <text x="74" y="384" class="ex">Cassandra · DynamoDB · Riak</text>

  <rect class="leafC" x="292" y="298" width="186" height="96" rx="6"/>
  <text x="306" y="322" class="lt">PC — stay Consistent</text>
  <text x="306" y="344" class="ls">minority side stops serving;</text>
  <text x="306" y="360" class="ls">refuse rather than return stale</text>
  <text x="306" y="384" class="ex">MongoDB · HBase · etcd · ZooKeeper</text>

  <rect class="leafA" x="538" y="298" width="170" height="96" rx="6"/>
  <text x="552" y="322" class="lt">EL — low Latency</text>
  <text x="552" y="344" class="ls">answer from nearest replica;</text>
  <text x="552" y="360" class="ls">skip coordination</text>
  <text x="552" y="384" class="ex">Cassandra · DynamoDB</text>

  <rect class="leafC" x="760" y="298" width="186" height="96" rx="6"/>
  <text x="774" y="322" class="lt">EC — Consistency</text>
  <text x="774" y="344" class="ls">coordinate a quorum first;</text>
  <text x="774" y="360" class="ls">slower but current</text>
  <text x="774" y="384" class="ex">MongoDB · VoltDB · Spanner</text>

  <text x="480" y="470" text-anchor="middle" class="cap">Blue = give up responsiveness for correctness.  Amber = give up correctness for responsiveness.</text>
  <text x="480" y="496" text-anchor="middle" class="cap">A real system needs BOTH letters: PA/EL (DynamoDB) · PC/EC (MongoDB) · PC/EL (PNUTS).</text>
  <text x="480" y="522" text-anchor="middle" class="cap">Partitions are rare — but the Latency-vs-Consistency choice (Else) is paid on every request.</text>
</svg>
