<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1920" font-family="sans-serif">
  <defs>
    <marker id="cArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cdd4dd"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="1920" fill="#14171c"/>
  <rect x="40" y="40" width="1120" height="1840" fill="none" stroke="#2b313b" stroke-width="2" rx="14"/>

  <!-- kicker -->
  <text x="600" y="230" text-anchor="middle" fill="#7f8a98" font-size="34" letter-spacing="10">A GUIDED LEARNING TRACK</text>

  <!-- title -->
  <text x="600" y="430" text-anchor="middle" fill="#f5f7fa" font-size="140" font-weight="bold" letter-spacing="2">DISTRIBUTED</text>
  <text x="600" y="575" text-anchor="middle" fill="#f5f7fa" font-size="140" font-weight="bold" letter-spacing="2">SYSTEMS</text>

  <line x1="430" y1="630" x2="770" y2="630" stroke="#e8b53f" stroke-width="4"/>
  <text x="600" y="700" text-anchor="middle" fill="#e8b53f" font-size="48" letter-spacing="14">FUNDAMENTALS</text>

  <!-- HERO: space-time diagram motif -->
  <g transform="translate(180,770)">
    <rect x="0" y="0" width="840" height="620" rx="16" fill="#1b1f26" stroke="#2c323c" stroke-width="2"/>

    <!-- nodes -->
    <rect x="140" y="58" width="92" height="56" rx="9" fill="#262b33" stroke="#cdd4dd" stroke-width="2"/>
    <text x="186" y="96" text-anchor="middle" fill="#f5f7fa" font-size="36" font-weight="bold">A</text>
    <rect x="608" y="58" width="92" height="56" rx="9" fill="#262b33" stroke="#cdd4dd" stroke-width="2"/>
    <text x="654" y="96" text-anchor="middle" fill="#f5f7fa" font-size="36" font-weight="bold">B</text>

    <!-- lifelines -->
    <line x1="186" y1="116" x2="186" y2="540" stroke="#454d58" stroke-width="2" stroke-dasharray="5 6"/>
    <line x1="654" y1="116" x2="654" y2="540" stroke="#454d58" stroke-width="2" stroke-dasharray="5 6"/>

    <!-- request: delivered -->
    <text x="300" y="186" fill="#cdd4dd" font-size="30">request</text>
    <line x1="186" y1="200" x2="648" y2="252" stroke="#cdd4dd" stroke-width="3" marker-end="url(#cArrow)"/>

    <!-- reply: lost -->
    <text x="430" y="330" fill="#e8b53f" font-size="30">reply</text>
    <line x1="654" y1="344" x2="430" y2="392" stroke="#e8b53f" stroke-width="3" stroke-dasharray="8 6"/>
    <line x1="421" y1="382" x2="441" y2="402" stroke="#e8b53f" stroke-width="4"/>
    <line x1="441" y1="382" x2="421" y2="402" stroke="#e8b53f" stroke-width="4"/>

    <!-- uncertainty -->
    <text x="170" y="486" text-anchor="middle" fill="#8a93a0" font-size="54" font-weight="bold">?</text>
    <text x="420" y="582" text-anchor="middle" fill="#8a93a0" font-size="28">silence — four possible causes, all identical</text>
  </g>

  <!-- bottom plate -->
  <rect x="120" y="1470" width="960" height="300" rx="16" fill="none" stroke="#e8b53f" stroke-width="2"/>
  <text x="600" y="1545" text-anchor="middle" fill="#e8b53f" font-size="30" letter-spacing="8">A 10-LESSON PATH</text>
  <text x="600" y="1625" text-anchor="middle" fill="#f5f7fa" font-size="60" font-weight="bold">From First Principles</text>
  <text x="600" y="1700" text-anchor="middle" fill="#aab2bd" font-size="30">Partial failure · time · replication ·</text>
  <text x="600" y="1742" text-anchor="middle" fill="#aab2bd" font-size="30">consensus · real-world patterns</text>

  <text x="600" y="1840" text-anchor="middle" fill="#646e7a" font-size="26">Sources inside · Kleppmann · DDIA · MIT 6.5840</text>
</svg>
