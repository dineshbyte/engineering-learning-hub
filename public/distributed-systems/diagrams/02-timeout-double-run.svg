<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <style>
      .title{font-size:17px;font-weight:bold;fill:#111}
      .lbl{font-size:12.5px;fill:#222}
      .cap{font-size:12.5px;fill:#444}
      .warn{font-size:13px;font-weight:bold;fill:#b00000}
      .nodeT{font-size:13px;font-weight:bold;fill:#111}
      .node{fill:#eee;stroke:#333;stroke-width:1.5}
      .life{stroke:#9a9a9a;stroke-width:1;stroke-dasharray:3 3}
      .msg{stroke:#222;stroke-width:1.8;fill:none}
      .late{stroke:#222;stroke-width:1.6;fill:none;stroke-dasharray:6 4}
      .busy{fill:#cfcfcf;stroke:#555;stroke-width:1}
      .tick{stroke:#b00000;stroke-width:2.4}
    </style>
  </defs>

  <rect width="760" height="470" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" class="title">A slow node looks exactly like a dead one</text>

  <rect class="node" x="118" y="50" width="48" height="26" rx="4"/>
  <text x="142" y="68" text-anchor="middle" class="nodeT">A</text>
  <rect class="node" x="566" y="50" width="48" height="26" rx="4"/>
  <text x="590" y="68" text-anchor="middle" class="nodeT">B</text>
  <line class="life" x1="142" y1="76" x2="142" y2="430"/>
  <line class="life" x1="590" y1="76" x2="590" y2="430"/>

  <!-- request 1 -->
  <text x="300" y="104" class="lbl">charge()</text>
  <line class="msg" x1="142" y1="110" x2="586" y2="128" marker-end="url(#arrow2)"/>
  <rect class="busy" x="580" y="130" width="20" height="64" rx="3"/>
  <text x="430" y="156" class="cap">B is working (slow)…</text>

  <!-- timeout fires on A -->
  <line class="tick" x1="120" y1="178" x2="164" y2="178"/>
  <text x="40" y="174" class="cap">timeout fires —</text>
  <text x="40" y="192" class="warn">A assumes B is dead</text>

  <!-- retry -->
  <text x="290" y="214" class="lbl">charge()  (retry)</text>
  <line class="msg" x1="142" y1="220" x2="586" y2="238" marker-end="url(#arrow2)"/>
  <rect class="busy" x="580" y="240" width="20" height="64" rx="3"/>
  <text x="430" y="266" class="warn">B runs the charge AGAIN</text>

  <!-- late reply 1 -->
  <text x="300" y="304" class="cap">late reply #1 arrives</text>
  <line class="late" x1="586" y1="320" x2="146" y2="338" marker-end="url(#arrow2)"/>

  <text x="380" y="402" text-anchor="middle" class="cap">B was alive the whole time. The retry charged the customer twice.</text>
  <text x="380" y="424" text-anchor="middle" class="cap">Fix preview (Lesson 2): make charge() <tspan font-style="italic">idempotent</tspan> so a retry is harmless.</text>
</svg>
