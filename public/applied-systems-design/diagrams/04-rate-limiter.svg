<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="sans-serif">
  <defs>
    <marker id="ar4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <marker id="ag4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f7a1f"/></marker>
    <marker id="ax4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b00000"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .bucket{fill:#eef5ff;stroke:#2a6099;stroke-width:1.8}
      .empty{fill:#fafafa;stroke:#bbb;stroke-width:1.4;stroke-dasharray:4 3}
      .tok{fill:#5b7bbf;stroke:#26356b;stroke-width:0.8}
      .box{fill:#eef1f4;stroke:#444;stroke-width:1.3}
      .redis{fill:#f6eeee;stroke:#a33;stroke-width:1.4}
      .boxT{font-size:11px;font-weight:bold;fill:#111}
      .sub{font-size:9.5px;fill:#555}
      .arr{stroke:#444;stroke-width:1.5;fill:none}
      .good{font-size:11px;font-weight:bold;fill:#1f7a1f}
      .bad{font-size:11px;font-weight:bold;fill:#b00000}
      .warn{fill:#fbeaea;stroke:#b00000;stroke-width:1.4}
    </style>
  </defs>
  <rect width="1000" height="560" fill="#ffffff"/>
  <text x="500" y="26" text-anchor="middle" class="title">Rate limiting: the token bucket, and an atomic shared counter</text>
  <line x1="500" y1="46" x2="500" y2="500" stroke="#dcdcdc"/>

  <!-- token bucket -->
  <text x="250" y="68" text-anchor="middle" class="h">Token Bucket (per client)</text>
  <text x="150" y="100" text-anchor="middle" class="sub">refill: +10 tokens / sec</text>
  <line class="arr" x1="150" y1="104" x2="150" y2="128" marker-end="url(#ar4)"/>
  <path class="bucket" d="M100,130 L200,130 L188,250 L112,250 Z"/>
  <text x="206" y="138" class="sub">capacity B=10</text>
  <g class="tok"><circle cx="125" cy="170" r="8"/><circle cx="150" cy="172" r="8"/><circle cx="175" cy="170" r="8"/><circle cx="135" cy="195" r="8"/><circle cx="162" cy="197" r="8"/><circle cx="148" cy="220" r="8"/></g>
  <!-- request A allowed -->
  <rect class="box" x="40" y="290" width="90" height="32" rx="5"/><text x="85" y="310" text-anchor="middle" class="boxT">Request A</text>
  <line class="arr" x1="130" y1="300" x2="170" y2="250" marker-end="url(#ar4)"/>
  <line x1="190" y1="300" x2="240" y2="300" stroke="#1f7a1f" stroke-width="1.8" marker-end="url(#ag4)"/>
  <text x="250" y="296" class="good">token taken → ALLOWED (200)</text>
  <!-- request B rejected -->
  <rect class="box" x="40" y="360" width="90" height="32" rx="5"/><text x="85" y="380" text-anchor="middle" class="boxT">Request B</text>
  <path class="empty" d="M160,350 L240,350 L230,430 L170,430 Z"/><text x="200" y="395" text-anchor="middle" class="sub">empty</text>
  <line x1="250" y1="390" x2="300" y2="390" stroke="#b00000" stroke-width="1.8" marker-end="url(#ax4)"/>
  <text x="310" y="386" class="bad">empty → REJECTED (429)</text>
  <text x="250" y="470" text-anchor="middle" class="sub">store only {tokens, last_refill_ts} · refill lazily on read</text>

  <!-- distributed -->
  <text x="750" y="68" text-anchor="middle" class="h">Distributed rate limiting</text>
  <rect class="box" x="540" y="100" width="90" height="32" rx="5"/><text x="585" y="120" text-anchor="middle" class="sub">Load Balancer</text>
  <rect class="box" x="540" y="150" width="120" height="28" rx="4"/><text x="600" y="168" text-anchor="middle" class="sub">App replica 1</text>
  <rect class="box" x="540" y="186" width="120" height="28" rx="4"/><text x="600" y="204" text-anchor="middle" class="sub">App replica 2</text>
  <rect class="box" x="540" y="222" width="120" height="28" rx="4"/><text x="600" y="240" text-anchor="middle" class="sub">App replica 3</text>
  <line class="arr" x1="585" y1="132" x2="585" y2="150" marker-end="url(#ar4)"/>
  <line class="arr" x1="660" y1="164" x2="780" y2="180" marker-end="url(#ar4)"/>
  <line class="arr" x1="660" y1="200" x2="780" y2="194" marker-end="url(#ar4)"/>
  <line class="arr" x1="660" y1="236" x2="780" y2="208" marker-end="url(#ar4)"/>
  <text x="700" y="160" class="sub">INCR rl:{user}:{min}</text>
  <rect class="redis" x="784" y="166" width="130" height="56" rx="8"/><text x="849" y="188" text-anchor="middle" class="boxT" fill="#a33">Redis</text><text x="849" y="204" text-anchor="middle" class="sub">rl:user42:11:01 = 7</text><text x="849" y="216" text-anchor="middle" class="sub">TTL 60s</text>

  <rect class="warn" x="540" y="280" width="400" height="56" rx="6"/>
  <text x="740" y="302" text-anchor="middle" class="bad">Increment MUST be atomic — one Redis INCR / Lua script.</text>
  <text x="740" y="320" text-anchor="middle" class="sub">Else two replicas GET→+1→SET in parallel and an update is LOST (under-count).</text>

  <rect x="160" y="510" width="680" height="34" rx="8" fill="#f6f7f6" stroke="#ddd"/>
  <text x="500" y="532" text-anchor="middle" class="h">Token bucket is the common choice; the shared counter must be incremented atomically.</text>
</svg>
