<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" font-family="sans-serif">
  <defs>
    <marker id="ai5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b06000"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:12.5px;font-weight:bold;fill:#111}
      .heap{fill:#f1f1ef;stroke:#777;stroke-width:1.3}
      .heapHi{fill:#fff0d8;stroke:#b06000;stroke-width:2.2}
      .sec{fill:#eaf2fb;stroke:#2a6099;stroke-width:1.3}
      .secHi{fill:#cfe2f5;stroke:#2a6099;stroke-width:2.2}
      .pri{fill:#e9f6ec;stroke:#1f7a1f;stroke-width:1.3}
      .mono{font-size:11px;fill:#222;font-family:monospace}
      .cap{font-size:11px;fill:#555}
      .step{stroke:#b06000;stroke-width:2.4;fill:none}
      .stepT{font-size:12px;font-weight:bold;fill:#b06000}
      .ptr{font-size:11px;font-weight:bold;fill:#2a6099;font-family:monospace}
    </style>
  </defs>
  <rect width="980" height="600" fill="#ffffff"/>
  <text x="490" y="26" text-anchor="middle" class="title">Clustered leaf IS the row (1 hop); secondary leaf is key + pointer (2 hops)</text>

  <!-- TABLE HEAP -->
  <text x="40" y="74" class="h">TABLE HEAP (rows by row id, unordered)</text>
  <rect class="heap" x="40" y="84" width="300" height="40" rx="4"/><text x="52" y="109" class="mono">rid101 | id:1 name:Ada email:ada@x.io</text>
  <rect class="heapHi" x="40" y="128" width="300" height="40" rx="4"/><text x="52" y="153" class="mono">rid102 | id:2 name:Lin email:lin@x.io</text>
  <rect class="heap" x="40" y="172" width="300" height="40" rx="4"/><text x="52" y="197" class="mono">rid103 | id:3 name:Mo  email:mo@x.io</text>
  <rect class="heap" x="40" y="216" width="300" height="40" rx="4"/><text x="52" y="241" class="mono">rid104 | id:4 name:Sol email:sol@x.io</text>

  <!-- SECONDARY INDEX -->
  <text x="420" y="74" class="h" fill="#26577e">SECONDARY INDEX (on email) — leaves = key + pointer</text>
  <rect class="sec"   x="420" y="84"  width="300" height="36" rx="4"/><text x="436" y="107" class="mono">ada@x.io  → <tspan class="ptr">rid101</tspan></text>
  <rect class="secHi" x="420" y="124" width="300" height="36" rx="4"/><text x="436" y="147" class="mono">lin@x.io  → <tspan class="ptr">rid102</tspan></text>
  <rect class="sec"   x="420" y="164" width="300" height="36" rx="4"/><text x="436" y="187" class="mono">mo@x.io   → <tspan class="ptr">rid103</tspan></text>
  <rect class="sec"   x="420" y="204" width="300" height="36" rx="4"/><text x="436" y="227" class="mono">sol@x.io  → <tspan class="ptr">rid104</tspan></text>
  <text x="730" y="147" class="cap">pointer, not data</text>

  <!-- PRIMARY clustered -->
  <text x="420" y="324" class="h" fill="#236b3c">PRIMARY INDEX (clustered on id) — leaves ARE the rows</text>
  <rect class="pri" x="420" y="334" width="300" height="34" rx="4"/><text x="436" y="356" class="mono">id:1  Ada  ada@x.io   (full row)</text>
  <rect class="pri" x="420" y="372" width="300" height="34" rx="4"/><text x="436" y="394" class="mono">id:2  Lin  lin@x.io   (full row)</text>
  <rect class="pri" x="420" y="410" width="300" height="34" rx="4"/><text x="436" y="432" class="mono">id:3  Mo   mo@x.io    (full row)</text>
  <text x="730" y="394" class="cap">no second fetch — one hop</text>

  <!-- lookup -->
  <rect x="40" y="320" width="320" height="36" rx="5" fill="#fff7ee" stroke="#b06000"/>
  <text x="200" y="343" text-anchor="middle" class="stepT">SELECT * WHERE email = lin@x.io</text>
  <path class="step" d="M360,338 C 400,300 410,210 418,150" marker-end="url(#ai5)"/>
  <text x="372" y="250" class="stepT">1. walk index</text>
  <path class="step" d="M418,148 C 380,150 350,150 342,148" marker-end="url(#ai5)"/>
  <text x="350" y="124" class="stepT">2. follow pointer → row rid102</text>

  <rect x="560" y="470" width="380" height="44" rx="6" fill="#fbeaea" stroke="#b00000"/>
  <text x="750" y="491" text-anchor="middle" class="cap">Every INSERT writes the heap + every index.</text>
  <text x="750" y="507" text-anchor="middle" class="cap">1 secondary index = 1 extra sorted write per row.</text>

  <text x="200" y="430" text-anchor="middle" class="cap">heap is unordered by email →</text>
  <text x="200" y="446" text-anchor="middle" class="cap">you need the secondary index to find by email</text>
</svg>
