<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 540" font-family="sans-serif">
  <defs>
    <marker id="ap1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker>
    <marker id="ag1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f7a1f"/></marker>
    <marker id="ab1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2a6099"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .band{font-size:12.5px;font-weight:bold;fill:#111}
      .ram{fill:#eef1f7;stroke:#5566aa;stroke-width:1.4}
      .idxRow{font-size:13px;font-weight:bold;fill:#26356b}
      .cell{fill:#ffffff;stroke:#555;stroke-width:1.3}
      .stale{fill:#f0f0f0;stroke:#bbb;stroke-width:1.1}
      .cellT{font-size:12px;font-weight:bold;fill:#111}
      .staleT{font-size:11.5px;fill:#999}
      .off{font-size:10px;fill:#888}
      .ptr{stroke:#777;stroke-width:1.3;fill:none;stroke-dasharray:4 3}
      .get{stroke:#1f7a1f;stroke-width:1.8;fill:none}
      .put{stroke:#2a6099;stroke-width:1.8;fill:none}
      .ghost{fill:#eaf2fb;stroke:#2a6099;stroke-width:1.4;stroke-dasharray:4 3}
      .cap{font-size:11.5px;fill:#555}
      .getT{font-size:12px;font-weight:bold;fill:#1f7a1f}
      .putT{font-size:12px;font-weight:bold;fill:#2a6099}
    </style>
  </defs>
  <rect width="980" height="540" fill="#ffffff"/>
  <text x="490" y="28" text-anchor="middle" class="title">Append-only log + in-memory hash index</text>

  <!-- index (RAM) -->
  <text x="80" y="70" class="band">In-memory hash index  (key → byte offset)</text>
  <rect class="ram" x="80" y="80" width="220" height="110" rx="8"/>
  <text x="100" y="110" class="idxRow">foo → 64</text>
  <text x="100" y="140" class="idxRow">bar → 24</text>
  <text x="100" y="170" class="idxRow">baz → 88</text>

  <!-- GET annotation -->
  <rect x="340" y="90" width="120" height="34" rx="5" fill="#e9f6ec" stroke="#1f7a1f"/>
  <text x="400" y="112" text-anchor="middle" class="getT">GET foo</text>
  <path class="get" d="M340,108 q-20,2 -38,0" marker-end="url(#ag1)"/>
  <text x="470" y="108" class="cap">1. hash lookup → 64  2. seek to offset 64</text>

  <!-- log band -->
  <text x="80" y="300" class="band">Append-only log on disk</text>
  <g font-family="sans-serif">
    <rect class="stale" x="40"  y="312" width="118" height="44" rx="3"/><text x="99"  y="339" text-anchor="middle" class="staleT">bar=7</text><text x="99"  y="372" text-anchor="middle" class="off">0 (stale)</text>
    <rect class="stale" x="162" y="312" width="118" height="44" rx="3"/><text x="221" y="339" text-anchor="middle" class="staleT">foo=1</text><text x="221" y="372" text-anchor="middle" class="off">12 (stale)</text>
    <rect class="cell"  x="284" y="312" width="118" height="44" rx="3"/><text x="343" y="339" text-anchor="middle" class="cellT">bar=9</text><text x="343" y="372" text-anchor="middle" class="off">24</text>
    <rect class="stale" x="406" y="312" width="118" height="44" rx="3"/><text x="465" y="339" text-anchor="middle" class="staleT">baz=2</text><text x="465" y="372" text-anchor="middle" class="off">40 (stale)</text>
    <rect class="cell"  x="528" y="312" width="118" height="44" rx="3"/><text x="587" y="339" text-anchor="middle" class="cellT">foo=42</text><text x="587" y="372" text-anchor="middle" class="off">64</text>
    <rect class="cell"  x="650" y="312" width="118" height="44" rx="3"/><text x="709" y="339" text-anchor="middle" class="cellT">baz=5</text><text x="709" y="372" text-anchor="middle" class="off">88</text>
    <rect class="ghost" x="772" y="312" width="118" height="44" rx="3"/><text x="831" y="339" text-anchor="middle" class="putT">foo=99</text><text x="831" y="372" text-anchor="middle" class="off">100 (new)</text>
  </g>

  <!-- index pointers to latest -->
  <path class="ptr" d="M190,178 C 240,260 320,300 343,310" marker-end="url(#ap1)"/>
  <path class="get" d="M150,118 C 200,260 540,300 587,310" marker-end="url(#ag1)"/>
  <path class="ptr" d="M210,178 C 500,250 690,300 709,310" marker-end="url(#ap1)"/>

  <!-- PUT annotation -->
  <rect x="780" y="240" width="160" height="34" rx="5" fill="#eaf2fb" stroke="#2a6099"/>
  <text x="860" y="262" text-anchor="middle" class="putT">PUT foo=99</text>
  <path class="put" d="M860,274 C 850,288 840,298 833,310" marker-end="url(#ab1)"/>
  <text x="831" y="392" text-anchor="middle" class="cap">append at end</text>
  <path class="put" d="M790,330 C 400,420 180,260 175,192" marker-end="url(#ab1)"/>
  <text x="430" y="430" class="cap" fill="#2a6099">then repoint index: foo → 100</text>

  <text x="490" y="500" text-anchor="middle" class="cap">Writes append at the end. Reads follow the index. Stale versions linger until compaction reclaims them.</text>
</svg>
