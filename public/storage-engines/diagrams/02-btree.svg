<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 580" font-family="sans-serif">
  <defs>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .pageL{font-size:10.5px;fill:#777}
      .page{fill:#eef1f4;stroke:#666;stroke-width:1.4}
      .pageHi{fill:#fff3d6;stroke:#b58a3b;stroke-width:2.4}
      .leafHi{fill:#ffe9b0;stroke:#b58a3b;stroke-width:2.4}
      .key{font-size:13px;font-weight:bold;fill:#111}
      .keyHi{font-size:13px;font-weight:bold;fill:#7a5a10}
      .ptr{stroke:#9a9a9a;stroke-width:1.6;fill:none}
      .ptrHi{stroke:#b58a3b;stroke-width:3;fill:none}
      .sib{stroke:#bbb;stroke-width:1.2;fill:none;stroke-dasharray:4 3}
      .rng{font-size:10px;fill:#888}
      .rngHi{font-size:10px;font-weight:bold;fill:#a6791f}
      .note{font-size:11px;fill:#555}
      .greyT{font-size:12px;fill:#999}
    </style>
  </defs>
  <rect width="980" height="580" fill="#ffffff"/>
  <text x="490" y="28" text-anchor="middle" class="title">B-tree: a lookup for key 215 descends root → internal → leaf</text>

  <!-- ROOT -->
  <text x="490" y="58" text-anchor="middle" class="pageL">ROOT PAGE (4 KB · fixed size · updated in place)</text>
  <rect class="page" x="370" y="66" width="240" height="40" rx="6"/>
  <text x="445" y="92" text-anchor="middle" class="key">200</text>
  <text x="535" y="92" text-anchor="middle" class="key">400</text>
  <line x1="400" y1="106" x2="400" y2="150" class="ptr"/>
  <line x1="490" y1="106" x2="490" y2="150" class="ptrHi"/>
  <line x1="580" y1="106" x2="580" y2="150" class="ptr"/>
  <text x="370" y="124" class="rng">&lt;200</text>
  <text x="500" y="124" class="rngHi">200–399 ✓</text>
  <text x="588" y="124" class="rng">≥400</text>

  <!-- INTERNAL tier -->
  <rect class="page" x="80" y="152" width="180" height="40" rx="6"/><text x="170" y="178" text-anchor="middle" class="greyT">100</text>
  <rect class="pageHi" x="360" y="152" width="260" height="40" rx="6"/>
  <text x="410" y="178" text-anchor="middle" class="keyHi">210</text><text x="490" y="178" text-anchor="middle" class="keyHi">230</text><text x="570" y="178" text-anchor="middle" class="keyHi">260</text>
  <rect class="page" x="720" y="152" width="180" height="40" rx="6"/><text x="810" y="178" text-anchor="middle" class="greyT">400 · 600</text>
  <text x="365" y="210" class="rngHi">210–229 ✓</text>

  <!-- internal child pointers (from middle) -->
  <line x1="390" y1="192" x2="380" y2="280" class="ptrHi"/>
  <line x1="470" y1="192" x2="540" y2="280" class="ptr"/>
  <line x1="560" y1="192" x2="700" y2="280" class="ptr"/>

  <!-- LEAF tier -->
  <rect class="page" x="80" y="282" width="150" height="44" rx="6"/><text x="155" y="309" text-anchor="middle" class="greyT">100·150·175</text>
  <rect class="leafHi" x="300" y="282" width="200" height="44" rx="6"/>
  <text x="332" y="309" class="key">210</text><text x="372" y="309" class="keyHi" font-size="15">215</text><text x="416" y="309" class="key">220</text><text x="456" y="309" class="key">225</text>
  <rect class="page" x="520" y="282" width="160" height="44" rx="6"/><text x="600" y="309" text-anchor="middle" class="greyT">230·240·255</text>
  <rect class="page" x="720" y="282" width="150" height="44" rx="6"/><text x="795" y="309" text-anchor="middle" class="greyT">400·420</text>

  <!-- sibling links -->
  <line x1="230" y1="304" x2="300" y2="304" class="sib"/>
  <line x1="500" y1="304" x2="520" y2="304" class="sib"/>
  <line x1="680" y1="304" x2="720" y2="304" class="sib"/>

  <text x="400" y="370" text-anchor="middle" class="keyHi" font-size="14">found: 215 → row</text>
  <text x="490" y="430" text-anchor="middle" class="note">3 page reads: root → internal → leaf. One pointer per level, chosen by binary search over sorted keys.</text>
  <text x="490" y="454" text-anchor="middle" class="note">Leaves sit at the same depth (balanced) and are linked in sorted order, so range scans walk sideways (dashed).</text>
</svg>
