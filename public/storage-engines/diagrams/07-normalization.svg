<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 540" font-family="sans-serif">
  <defs>
    <marker id="afk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b06000"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:14px;font-weight:bold;fill:#111}
      .tblH{fill:#e7e7e3;stroke:#888;stroke-width:1.2}
      .tbl{fill:#f5f5f3;stroke:#888;stroke-width:1.1}
      .mono{font-size:11px;fill:#222;font-family:monospace}
      .dup{fill:#fff0d8;stroke:#b06000;stroke-width:1.3}
      .fk{stroke:#b06000;stroke-width:1.5;fill:none}
      .good{font-size:11.5px;fill:#236b3c}
      .warn{font-size:11.5px;fill:#a6601a}
      .cap{font-size:12px;fill:#444}
    </style>
  </defs>
  <rect width="980" height="540" fill="#ffffff"/>
  <text x="490" y="26" text-anchor="middle" class="title">Same data, two layouts: normalize vs denormalize</text>
  <line x1="490" y1="44" x2="490" y2="470" stroke="#dcdcdc"/>

  <!-- NORMALIZED -->
  <text x="240" y="70" text-anchor="middle" class="h">NORMALIZED</text>
  <rect class="tblH" x="60" y="84" width="360" height="24"/><text x="72" y="101" class="mono">orders:  order_id | customer_id | total</text>
  <rect class="tbl" x="60" y="108" width="360" height="22"/><text x="72" y="124" class="mono">1001 | C-7 | $40</text>
  <rect class="tbl" x="60" y="130" width="360" height="22"/><text x="72" y="146" class="mono">1002 | C-7 | $90</text>
  <rect class="tbl" x="60" y="152" width="360" height="22"/><text x="72" y="168" class="mono">1003 | C-9 | $25</text>

  <rect class="tblH" x="60" y="230" width="360" height="24"/><text x="72" y="247" class="mono">customers:  customer_id | name | address</text>
  <rect class="tbl" x="60" y="254" width="360" height="22"/><text x="72" y="270" class="mono">C-7 | Ada Lovelace | 12 Mill Rd</text>
  <rect class="tbl" x="60" y="276" width="360" height="22"/><text x="72" y="292" class="mono">C-9 | Alan Turing  | 5 King St</text>

  <path class="fk" d="M150,174 C 130,210 130,228 150,252" marker-end="url(#afk)"/>
  <path class="fk" d="M170,196 C 200,220 200,236 175,254" marker-end="url(#afk)"/>
  <text x="240" y="212" class="warn">foreign key — join on read</text>

  <text x="240" y="340" text-anchor="middle" class="good">✓ no duplication — each fact stored once</text>
  <text x="240" y="360" text-anchor="middle" class="cap">but a read needs a join</text>

  <!-- DENORMALIZED -->
  <text x="735" y="70" text-anchor="middle" class="h">DENORMALIZED</text>
  <rect class="tblH" x="540" y="84" width="400" height="24"/><text x="552" y="101" class="mono">orders:  order_id | cust | name | address | total</text>
  <rect class="tbl" x="540" y="108" width="400" height="22"/><text x="552" y="124" class="mono">1001 | C-7 | </text>
  <rect class="dup" x="612" y="108" width="260" height="22"/><text x="620" y="124" class="mono">Ada Lovelace | 12 Mill Rd</text><text x="876" y="124" class="mono">| $40</text>
  <rect class="tbl" x="540" y="130" width="400" height="22"/><text x="552" y="146" class="mono">1002 | C-7 | </text>
  <rect class="dup" x="612" y="130" width="260" height="22"/><text x="620" y="146" class="mono">Ada Lovelace | 12 Mill Rd</text><text x="876" y="146" class="mono">| $90</text>
  <rect class="tbl" x="540" y="152" width="400" height="22"/><text x="552" y="168" class="mono">1003 | C-9 | Alan Turing  | 5 King St | $25</text>
  <path class="fk" d="M884,130 C 910,134 910,126 884,130" />
  <text x="735" y="196" text-anchor="middle" class="warn">↑ same customer fact, stored twice (shaded)</text>

  <text x="735" y="340" text-anchor="middle" class="warn">✓ fast reads — no join</text>
  <text x="735" y="360" text-anchor="middle" class="cap">but every copy must be updated on change</text>

  <rect x="60" y="420" width="880" height="40" rx="8" fill="#f6f5f2" stroke="#ddd"/>
  <text x="490" y="445" text-anchor="middle" class="cap">Normalize = consistency by construction, slower reads.   Denormalize = fast reads, you own the sync.  (Recall Part 2: keeping copies consistent is work.)</text>
</svg>
