<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 520" font-family="sans-serif">
  <defs>
    <marker id="az3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#444"/></marker>
    <marker id="azb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b00000"/></marker>
    <marker id="azg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f7a1f"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .coord{fill:#eef1f4;stroke:#444;stroke-width:1.6}
      .zombie{fill:#fbeaea;stroke:#b00000;stroke-width:1.5}
      .live{fill:#e9f6ec;stroke:#1f7a1f;stroke-width:1.5}
      .pause{fill:#f0f0f0;stroke:#aaa;stroke-width:1.2;stroke-dasharray:4 3}
      .boxT{font-size:12px;font-weight:bold;fill:#111}
      .sub{font-size:10.5px;fill:#555}
      .arr{stroke:#444;stroke-width:1.5;fill:none}
      .bad{font-size:11.5px;font-weight:bold;fill:#b00000}
      .good{font-size:11.5px;font-weight:bold;fill:#1f7a1f}
    </style>
  </defs>
  <rect width="1020" height="520" fill="#ffffff"/>
  <text x="510" y="26" text-anchor="middle" class="title">Zombie fencing: the epoch lets only the latest producer act</text>

  <!-- coordinator -->
  <rect class="coord" x="400" y="220" width="220" height="76" rx="8"/><text x="510" y="248" text-anchor="middle" class="boxT">Transaction Coordinator</text><text x="510" y="266" text-anchor="middle" class="sub">transactional.id = tx-1</text><text x="510" y="282" text-anchor="middle" class="bad">current epoch = 6</text>

  <!-- zombie (top) -->
  <rect class="zombie" x="40" y="70" width="170" height="50" rx="6"/><text x="125" y="92" text-anchor="middle" class="boxT" fill="#b00000">Producer P (original)</text><text x="125" y="108" text-anchor="middle" class="sub">epoch 5</text>
  <rect class="pause" x="230" y="78" width="260" height="34" rx="5"/><text x="360" y="99" text-anchor="middle" class="sub">long GC pause / network partition…</text>
  <rect class="zombie" x="510" y="70" width="200" height="50" rx="6"/><text x="610" y="92" text-anchor="middle" class="sub">wakes → commit @ epoch 5</text><text x="610" y="108" text-anchor="middle" class="bad">(thinks it still owns tx-1)</text>
  <line class="arr" x1="610" y1="120" x2="540" y2="218" stroke="#b00000" stroke-width="1.6" marker-end="url(#azb)"/>
  <rect class="zombie" x="720" y="200" width="260" height="44" rx="6"/><text x="850" y="220" text-anchor="middle" class="bad">✗ ProducerFenced</text><text x="850" y="236" text-anchor="middle" class="sub">old epoch 5 &lt; 6 → rejected</text>
  <line class="arr" x1="620" y1="250" x2="718" y2="228" stroke="#b00000" stroke-width="1.4" marker-end="url(#azb)"/>

  <!-- replacement (bottom) -->
  <rect class="live" x="40" y="400" width="200" height="50" rx="6"/><text x="140" y="422" text-anchor="middle" class="boxT" fill="#1f7a1f">Producer P′ (replacement)</text><text x="140" y="438" text-anchor="middle" class="sub">initTransactions(tx-1)</text>
  <line class="arr" x1="240" y1="420" x2="450" y2="300" stroke="#1f7a1f" stroke-width="1.6" marker-end="url(#azg)"/>
  <text x="320" y="378" class="good">bump epoch 5 → 6</text>
  <rect class="live" x="560" y="400" width="320" height="50" rx="6"/><text x="720" y="422" text-anchor="middle" class="good">produce + commit @ epoch 6 ✓</text><text x="720" y="438" text-anchor="middle" class="sub">the only producer the coordinator will accept</text>
  <line class="arr" x1="620" y1="296" x2="700" y2="398" stroke="#1f7a1f" stroke-width="1.4" marker-end="url(#azg)"/>

  <rect x="120" y="468" width="780" height="40" rx="8" fill="#f6f7f6" stroke="#ddd"/>
  <text x="510" y="493" text-anchor="middle" class="boxT">No need to detect that P died (impossible — Part 1). Only the latest epoch can act, so a zombie does no harm.</text>
</svg>
