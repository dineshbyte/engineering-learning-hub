<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="sans-serif">
  <defs>
    <marker id="ao3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#333"/></marker>
    <marker id="ar3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b00000"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .h{font-size:13px;font-weight:bold;fill:#111}
      .step{fill:#eef1f4;stroke:#444;stroke-width:1.3}
      .cell{fill:#f6f6f4;stroke:#888;stroke-width:1}
      .hot{fill:#ffe0b3;stroke:#b06000;stroke-width:1.2}
      .off{font-size:10px;fill:#888}
      .lbl{font-size:11.5px;fill:#222}
      .flow{stroke:#333;stroke-width:1.7;fill:none}
      .crash{stroke:#b00000;stroke-width:2.4;fill:none}
      .restart{stroke:#b00000;stroke-width:1.5;fill:none;stroke-dasharray:5 4}
      .badT{font-size:11px;font-weight:bold;fill:#b00000}
      .chipG{fill:#e9f6ec;stroke:#1f7a1f;stroke-width:1.3}
      .chipA{fill:#fdf1df;stroke:#b06000;stroke-width:1.3}
      .cap{font-size:11.5px;fill:#444}
    </style>
  </defs>
  <rect width="960" height="540" fill="#ffffff"/>
  <text x="480" y="26" text-anchor="middle" class="title">The offset-commit point decides the delivery guarantee</text>

  <!-- TOP: at-least-once -->
  <text x="40" y="64" class="h">AT-LEAST-ONCE  (commit AFTER processing)</text>
  <g><rect class="cell" x="40" y="78" width="30" height="28"/><text x="55" y="120" text-anchor="middle" class="off">40</text>
     <rect class="cell" x="70" y="78" width="30" height="28"/><text x="85" y="120" text-anchor="middle" class="off">41</text>
     <rect class="hot" x="100" y="78" width="30" height="28"/><text x="115" y="120" text-anchor="middle" class="off">42</text>
     <rect class="cell" x="130" y="78" width="30" height="28"/><text x="145" y="120" text-anchor="middle" class="off">43</text></g>
  <rect class="step" x="200" y="78" width="120" height="34" rx="4"/><text x="260" y="100" text-anchor="middle" class="lbl">READ 42</text>
  <rect class="step" x="370" y="78" width="140" height="34" rx="4"/><text x="440" y="100" text-anchor="middle" class="lbl">PROCESS (effect)</text>
  <rect class="step" x="620" y="78" width="120" height="34" rx="4"/><text x="680" y="100" text-anchor="middle" class="lbl">COMMIT 42</text>
  <line class="flow" x1="320" y1="95" x2="368" y2="95" marker-end="url(#ao3)"/>
  <line class="flow" x1="510" y1="95" x2="618" y2="95" marker-end="url(#ao3)"/>
  <polyline class="crash" points="548,86 566,96 552,104 572,114"/>
  <text x="560" y="76" text-anchor="middle" class="badT">crash before commit</text>
  <path class="restart" d="M560,116 C 460,150 420,150 400,140" marker-end="url(#ar3)"/>
  <rect class="step" x="280" y="140" width="120" height="30" rx="4"/><text x="340" y="160" text-anchor="middle" class="lbl">RE-READ 42</text>
  <rect class="step" x="430" y="140" width="150" height="30" rx="4"/><text x="505" y="160" text-anchor="middle" class="badT">PROCESS AGAIN</text>
  <line class="flow" x1="400" y1="155" x2="428" y2="155" marker-end="url(#ao3)"/>
  <text x="505" y="186" text-anchor="middle" class="badT">→ DUPLICATE effect</text>
  <rect class="chipG" x="780" y="120" width="150" height="40" rx="6"/><text x="855" y="138" text-anchor="middle" class="cap" fill="#236b3c">no loss ·</text><text x="855" y="153" text-anchor="middle" class="cap" fill="#236b3c">duplicates possible</text>

  <line x1="40" y1="220" x2="920" y2="220" stroke="#e0e0e0"/>

  <!-- BOTTOM: at-most-once -->
  <text x="40" y="258" class="h">AT-MOST-ONCE  (commit BEFORE processing)</text>
  <g><rect class="cell" x="40" y="272" width="30" height="28"/><text x="55" y="314" text-anchor="middle" class="off">40</text>
     <rect class="cell" x="70" y="272" width="30" height="28"/><text x="85" y="314" text-anchor="middle" class="off">41</text>
     <rect class="hot" x="100" y="272" width="30" height="28"/><text x="115" y="314" text-anchor="middle" class="off">42</text>
     <rect class="cell" x="130" y="272" width="30" height="28"/><text x="145" y="314" text-anchor="middle" class="off">43</text></g>
  <rect class="step" x="200" y="272" width="120" height="34" rx="4"/><text x="260" y="294" text-anchor="middle" class="lbl">READ 42</text>
  <rect class="step" x="370" y="272" width="120" height="34" rx="4"/><text x="430" y="294" text-anchor="middle" class="lbl">COMMIT 42</text>
  <rect class="step" x="600" y="272" width="150" height="34" rx="4" opacity="0.5"/><text x="675" y="294" text-anchor="middle" class="lbl" text-decoration="line-through">PROCESS 42</text>
  <line class="flow" x1="320" y1="289" x2="368" y2="289" marker-end="url(#ao3)"/>
  <line class="flow" x1="490" y1="289" x2="598" y2="289" marker-end="url(#ao3)"/>
  <polyline class="crash" points="528,280 546,290 532,298 552,308"/>
  <text x="540" y="270" text-anchor="middle" class="badT">crash before processing</text>
  <path class="restart" d="M540,310 C 520,340 200,340 158,304" marker-end="url(#ar3)"/>
  <text x="360" y="338" text-anchor="middle" class="badT">restart jumps to offset 43 — record 42 LOST, never processed</text>
  <rect class="chipA" x="780" y="312" width="150" height="40" rx="6"/><text x="855" y="330" text-anchor="middle" class="cap" fill="#a6601a">no duplicates ·</text><text x="855" y="345" text-anchor="middle" class="cap" fill="#a6601a">loss possible</text>

  <rect x="160" y="420" width="640" height="44" rx="8" fill="#f6f7f6" stroke="#ddd"/>
  <text x="480" y="447" text-anchor="middle" class="h">The commit point decides the guarantee.  Default: at-least-once + idempotent processing.</text>
</svg>
