<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 460" font-family="sans-serif">
  <defs>
    <marker id="as7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#333"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .box{fill:#ffffff;stroke:#444;stroke-width:1.5}
      .src{fill:#f3f3f0;stroke:#666;stroke-width:1.3}
      .cell{fill:#eef1f4;stroke:#888;stroke-width:1}
      .store{fill:#e3ebf5;stroke:#3a5a8c;stroke-width:1.5}
      .change{fill:#eef2f8;stroke:#3a5a8c;stroke-width:1;stroke-dasharray:4 3}
      .boxT{font-size:12px;font-weight:bold;fill:#111}
      .lbl{font-size:11px;fill:#222}
      .cap{font-size:10.5px;fill:#555}
      .arr{stroke:#333;stroke-width:1.7;fill:none}
      .edge{font-size:10px;font-style:italic;fill:#444}
      .off{font-size:8px;fill:#999}
    </style>
  </defs>
  <rect width="1020" height="460" fill="#ffffff"/>
  <text x="510" y="28" text-anchor="middle" class="title">A streaming job is a dataflow graph: source → stateless → stateful → sink</text>

  <!-- SOURCE -->
  <text x="130" y="120" text-anchor="middle" class="lbl">SOURCE — Kafka topic "clicks"</text>
  <g>
    <rect class="cell" x="50" y="130" width="26" height="34"/><rect class="cell" x="76" y="130" width="26" height="34"/><rect class="cell" x="102" y="130" width="26" height="34"/><rect class="cell" x="128" y="130" width="26" height="34"/><rect class="cell" x="154" y="130" width="26" height="34"/><rect class="cell" x="180" y="130" width="26" height="34"/>
  </g>
  <text x="50" y="178" class="off">0</text><text x="180" y="178" class="off">5</text>
  <line class="arr" x1="208" y1="147" x2="288" y2="147" marker-end="url(#as7)"/><text x="212" y="138" class="edge">click events</text>

  <!-- STATELESS -->
  <rect class="box" x="292" y="120" width="150" height="56" rx="6"/><text x="367" y="153" text-anchor="middle" class="boxT">filter(valid)</text>
  <text x="367" y="196" text-anchor="middle" class="cap">stateless — keeps nothing</text>
  <line class="arr" x1="444" y1="147" x2="524" y2="147" marker-end="url(#as7)"/><text x="446" y="138" class="edge">valid clicks</text>

  <!-- STATEFUL -->
  <rect class="box" x="528" y="120" width="160" height="56" rx="6"/><text x="608" y="153" text-anchor="middle" class="boxT">countByUser</text>
  <text x="608" y="196" text-anchor="middle" class="cap">stateful — keeps local state</text>
  <rect class="store" x="540" y="230" width="136" height="44" rx="8"/><text x="608" y="252" text-anchor="middle" class="lbl" fill="#2a4a76">STATE STORE</text><text x="608" y="267" text-anchor="middle" class="cap" fill="#2a4a76">RocksDB / LSM</text>
  <line x1="608" y1="176" x2="608" y2="228" stroke="#3a5a8c" stroke-width="1.6" marker-start="url(#as7)" marker-end="url(#as7)"/>
  <rect class="change" x="520" y="300" width="176" height="30" rx="4"/><text x="608" y="320" text-anchor="middle" class="cap" fill="#2a4a76">changelog topic (compacted)</text>
  <line x1="608" y1="274" x2="608" y2="298" stroke="#3a5a8c" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#as7)"/>
  <line class="arr" x1="690" y1="147" x2="770" y2="147" marker-end="url(#as7)"/><text x="700" y="138" class="edge">user → count</text>

  <!-- SINK -->
  <rect class="src" x="774" y="120" width="200" height="56" rx="10"/><text x="874" y="146" text-anchor="middle" class="boxT">SINK</text><text x="874" y="164" text-anchor="middle" class="cap">output topic "click-counts" / DB</text>

  <text x="510" y="392" text-anchor="middle" class="cap">Stateless operators process one event and forget it; stateful operators keep local state, made fault-tolerant by a changelog topic (a log again).</text>
</svg>
