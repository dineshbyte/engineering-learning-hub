<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" font-family="sans-serif">
  <defs>
    <marker id="ad9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .dec{fill:#eef1f4;stroke:#555;stroke-width:1.5}
      .decT{font-size:12.5px;font-weight:bold;fill:#111}
      .fix{fill:#dff0ee;stroke:#2f8a82;stroke-width:1.6}
      .fixT{font-size:12px;font-weight:bold;fill:#1d5a54}
      .fine{fill:#f3f3f1;stroke:#bbb;stroke-width:1.3}
      .edge{stroke:#777;stroke-width:1.5;fill:none}
      .eL{font-size:11px;font-weight:bold;fill:#333}
      .tag{font-size:10.5px;font-weight:bold;fill:#b00000}
      .cap{font-size:11.5px;fill:#555}
    </style>
  </defs>
  <rect width="920" height="640" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" class="title">Choosing concurrency control: follow the shape of your write</text>

  <!-- edges -->
  <line class="edge" x1="300" y1="92" x2="170" y2="120" marker-end="url(#ad9)"/>
  <text x="200" y="108" class="eL">no</text>
  <line class="edge" x1="300" y1="92" x2="300" y2="172" marker-end="url(#ad9)"/>
  <text x="308" y="120" class="eL">yes</text>

  <line class="edge" x1="420" y1="200" x2="556" y2="200" marker-end="url(#ad9)"/>
  <text x="470" y="192" class="eL">yes</text><text x="470" y="220" class="tag">LOST UPDATE</text>
  <line class="edge" x1="300" y1="228" x2="300" y2="302" marker-end="url(#ad9)"/><text x="308" y="266" class="eL">no</text>

  <line class="edge" x1="420" y1="330" x2="556" y2="330" marker-end="url(#ad9)"/>
  <text x="470" y="322" class="eL">yes</text><text x="470" y="350" class="tag">WRITE SKEW</text>
  <line class="edge" x1="300" y1="358" x2="300" y2="432" marker-end="url(#ad9)"/><text x="308" y="396" class="eL">no</text>

  <line class="edge" x1="420" y1="460" x2="556" y2="460" marker-end="url(#ad9)"/>
  <text x="470" y="452" class="eL">yes</text><text x="470" y="480" class="tag">CROSS-BOUNDARY</text>
  <line class="edge" x1="300" y1="488" x2="300" y2="540" marker-end="url(#ad9)"/><text x="308" y="520" class="eL">no</text>

  <!-- top decision -->
  <rect class="dec" x="180" y="56" width="240" height="38" rx="8"/>
  <text x="300" y="80" text-anchor="middle" class="decT">Concurrent writes to same data?</text>
  <rect class="fine" x="50" y="118" width="200" height="40" rx="6"/>
  <text x="150" y="136" text-anchor="middle" class="cap">Read Committed is fine</text>
  <text x="150" y="151" text-anchor="middle" class="cap">(read-mostly, no invariant)</text>

  <!-- D1 -->
  <rect class="dec" x="180" y="174" width="240" height="54" rx="8"/>
  <text x="300" y="196" text-anchor="middle" class="decT">Read-modify-write</text>
  <text x="300" y="214" text-anchor="middle" class="decT">on ONE row?</text>
  <rect class="fix" x="558" y="176" width="300" height="48" rx="6"/>
  <text x="708" y="196" text-anchor="middle" class="fixT">Atomic UPDATE  (set bal = bal − n)</text>
  <text x="708" y="214" text-anchor="middle" class="fixT">or  SELECT … FOR UPDATE</text>

  <!-- D2 -->
  <rect class="dec" x="180" y="304" width="240" height="54" rx="8"/>
  <text x="300" y="326" text-anchor="middle" class="decT">Check-then-act invariant</text>
  <text x="300" y="344" text-anchor="middle" class="decT">across MANY rows?</text>
  <rect class="fix" x="558" y="306" width="300" height="48" rx="6"/>
  <text x="708" y="326" text-anchor="middle" class="fixT">SERIALIZABLE (+ retry loop)</text>
  <text x="708" y="344" text-anchor="middle" class="fixT">or materialize the conflict into one row</text>

  <!-- D3 -->
  <rect class="dec" x="180" y="434" width="240" height="54" rx="8"/>
  <text x="300" y="456" text-anchor="middle" class="decT">Workflow spans</text>
  <text x="300" y="474" text-anchor="middle" class="decT">MULTIPLE services?</text>
  <rect class="fix" x="558" y="436" width="300" height="48" rx="6"/>
  <text x="708" y="456" text-anchor="middle" class="fixT">SAGA + IDEMPOTENCY KEYS</text>
  <text x="708" y="474" text-anchor="middle" class="fixT">(no isolation level reaches across services)</text>

  <!-- terminal -->
  <rect class="fine" x="180" y="542" width="240" height="40" rx="6"/>
  <text x="300" y="566" text-anchor="middle" class="cap">Single row, no invariant → Read Committed suffices</text>

  <text x="460" y="616" text-anchor="middle" class="cap">Raising the isolation level only fixes the <tspan fill="#b00000" font-weight="bold">WRITE SKEW</tspan> branch — locks fix lost update, sagas fix cross-service.</text>
</svg>
