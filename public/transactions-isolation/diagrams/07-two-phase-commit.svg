<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 740" font-family="sans-serif">
  <defs>
    <marker id="am7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#222"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .sc{font-size:13px;font-weight:bold;fill:#111}
      .scBad{font-size:13px;font-weight:bold;fill:#b00000}
      .nodeT{font-size:12px;font-weight:bold;fill:#111}
      .node{fill:#eee;stroke:#333;stroke-width:1.5}
      .life{stroke:#9a9a9a;stroke-width:1.2;stroke-dasharray:3 3}
      .lifeDead{stroke:#b00000;stroke-width:1.2;stroke-dasharray:4 4}
      .msg{stroke:#222;stroke-width:1.7;fill:none}
      .lbl{font-size:11px;fill:#333}
      .cap{font-size:11px;fill:#555}
      .lock{font-size:11px;fill:#a65c10}
      .crash{stroke:#b00000;stroke-width:2.6;fill:none}
      .doubt{stroke:#b00000;stroke-width:1.6;fill:none;stroke-dasharray:5 4}
      .good{font-size:12px;font-weight:bold;fill:#1f7a1f}
      .badT{font-size:12px;font-weight:bold;fill:#b00000}
    </style>
  </defs>
  <rect width="840" height="740" fill="#ffffff"/>
  <text x="420" y="26" text-anchor="middle" class="title">Two-Phase Commit: clean when nobody fails, blocking when the coordinator does</text>

  <!-- ===== Scenario A ===== -->
  <text x="40" y="60" class="sc">A · happy path: all commit</text>
  <rect class="node" x="120" y="70" width="56" height="24" rx="4"/><text x="148" y="87" text-anchor="middle" class="nodeT">P1</text>
  <rect class="node" x="392" y="70" width="96" height="24" rx="4"/><text x="440" y="87" text-anchor="middle" class="nodeT">Coordinator</text>
  <rect class="node" x="664" y="70" width="56" height="24" rx="4"/><text x="692" y="87" text-anchor="middle" class="nodeT">P2</text>
  <line class="life" x1="148" y1="94" x2="148" y2="330"/>
  <line class="life" x1="440" y1="94" x2="440" y2="330"/>
  <line class="life" x1="692" y1="94" x2="692" y2="330"/>

  <text x="250" y="120" class="lbl">PREPARE</text>
  <line class="msg" x1="436" y1="126" x2="152" y2="140" marker-end="url(#am7)"/>
  <line class="msg" x1="444" y1="126" x2="688" y2="140" marker-end="url(#am7)"/>
  <text x="148" y="160" text-anchor="middle" class="lock">prepared, locks held</text>
  <text x="692" y="160" text-anchor="middle" class="lock">prepared, locks held</text>
  <text x="250" y="190" class="lbl">VOTE YES</text>
  <line class="msg" x1="152" y1="176" x2="436" y2="196" marker-end="url(#am7)"/>
  <line class="msg" x1="688" y1="176" x2="444" y2="196" marker-end="url(#am7)"/>
  <circle cx="440" cy="216" r="5" fill="#222"/>
  <text x="440" y="232" text-anchor="middle" class="cap">write COMMIT to log (point of no return)</text>
  <text x="250" y="262" class="lbl">COMMIT</text>
  <line class="msg" x1="436" y1="258" x2="152" y2="272" marker-end="url(#am7)"/>
  <line class="msg" x1="444" y1="258" x2="688" y2="272" marker-end="url(#am7)"/>
  <text x="148" y="292" text-anchor="middle" class="cap">commit, release</text>
  <text x="692" y="292" text-anchor="middle" class="cap">commit, release</text>
  <text x="420" y="320" text-anchor="middle" class="good">All committed — atomic</text>

  <line x1="40" y1="356" x2="800" y2="356" stroke="#ccc"/>

  <!-- ===== Scenario B ===== -->
  <text x="40" y="392" class="scBad">B · coordinator crashes after prepare</text>
  <rect class="node" x="120" y="404" width="56" height="24" rx="4"/><text x="148" y="421" text-anchor="middle" class="nodeT">P1</text>
  <rect class="node" x="392" y="404" width="96" height="24" rx="4"/><text x="440" y="421" text-anchor="middle" class="nodeT">Coordinator</text>
  <rect class="node" x="664" y="404" width="56" height="24" rx="4"/><text x="692" y="421" text-anchor="middle" class="nodeT">P2</text>
  <line class="life" x1="148" y1="428" x2="148" y2="690"/>
  <line class="lifeDead" x1="440" y1="428" x2="440" y2="540"/>
  <line class="life" x1="692" y1="428" x2="692" y2="690"/>

  <text x="250" y="452" class="lbl">PREPARE</text>
  <line class="msg" x1="436" y1="458" x2="152" y2="472" marker-end="url(#am7)"/>
  <line class="msg" x1="444" y1="458" x2="688" y2="472" marker-end="url(#am7)"/>
  <text x="148" y="492" text-anchor="middle" class="lock">prepared, locks held</text>
  <text x="692" y="492" text-anchor="middle" class="lock">prepared, locks held</text>
  <text x="250" y="520" class="lbl">VOTE YES</text>
  <line class="msg" x1="152" y1="508" x2="436" y2="526" marker-end="url(#am7)"/>
  <line class="msg" x1="688" y1="508" x2="444" y2="526" marker-end="url(#am7)"/>
  <polyline class="crash" points="416,538 436,550 420,560 446,572"/>
  <text x="440" y="592" text-anchor="middle" class="badT">COORDINATOR CRASHES</text>
  <text x="440" y="608" text-anchor="middle" class="cap">(before sending the verdict)</text>

  <path class="doubt" d="M120,560 h-8 v110 h8" />
  <path class="doubt" d="M720,560 h8 v110 h-8" />
  <text x="148" y="640" text-anchor="middle" class="lock">still held</text>
  <text x="692" y="640" text-anchor="middle" class="lock">still held</text>
  <text x="420" y="660" text-anchor="middle" class="badT">IN DOUBT — can't commit, can't abort</text>
  <text x="420" y="684" text-anchor="middle" class="badT">Blocked indefinitely — 2PC is a blocking protocol</text>
</svg>
