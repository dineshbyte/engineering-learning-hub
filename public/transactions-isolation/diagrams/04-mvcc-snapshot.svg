<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="sans-serif">
  <defs>
    <marker id="ac4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker>
    <marker id="aTa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6fb0"/></marker>
    <marker id="aTb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1f7a1f"/></marker>
    <marker id="aw4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c8761f"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .ver{fill:#eee;stroke:#555;stroke-width:1.4}
      .verT{font-size:13px;font-weight:bold;fill:#111}
      .verS{font-size:10.5px;fill:#555}
      .chain{stroke:#888;stroke-width:1.6;fill:none}
      .nodeT{font-size:13px;font-weight:bold;fill:#111}
      .life{stroke:#9a9a9a;stroke-width:1.2;stroke-dasharray:3 3}
      .ta{stroke:#3b6fb0;stroke-width:1.7;fill:none;stroke-dasharray:5 3}
      .tb{stroke:#1f7a1f;stroke-width:1.7;fill:none;stroke-dasharray:5 3}
      .write{stroke:#c8761f;stroke-width:1.8;fill:none}
      .lbl{font-size:12px;fill:#222}
      .cap{font-size:11.5px;fill:#555}
    </style>
  </defs>
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="480" y="26" text-anchor="middle" class="title">MVCC: two snapshots, one row, no blocking</text>

  <text x="190" y="74" text-anchor="middle" class="cap">version chain · row x</text>
  <!-- versions -->
  <rect class="ver" x="90" y="86" width="200" height="52" rx="5"/><text x="105" y="110" class="verT">x = 100</text><text x="105" y="128" class="verS">xmin 50 · xmax 70  (superseded)</text>
  <rect class="ver" x="90" y="176" width="200" height="52" rx="5"/><text x="105" y="200" class="verT">x = 150</text><text x="105" y="218" class="verS">xmin 70 · xmax 90  (superseded)</text>
  <rect class="ver" x="90" y="266" width="200" height="52" rx="5"/><text x="105" y="290" class="verT">x = 200</text><text x="105" y="308" class="verS">xmin 90 · live (xmax —)</text>
  <line class="chain" x1="190" y1="138" x2="190" y2="176" marker-end="url(#ac4)"/>
  <line class="chain" x1="190" y1="228" x2="190" y2="266" marker-end="url(#ac4)"/>

  <!-- writer append -->
  <text x="300" y="350" class="lbl" fill="#a65c10">txn 90: UPDATE x → 200</text>
  <line class="write" x1="300" y1="356" x2="240" y2="320" marker-end="url(#aw4)"/>
  <text x="300" y="368" class="cap">appends a new version (V3)</text>

  <!-- lifelines -->
  <rect class="ver" x="572" y="84" width="56" height="26" rx="4" fill="#e7eef6"/><text x="600" y="102" text-anchor="middle" class="nodeT" fill="#26577e">Ta</text>
  <rect class="ver" x="772" y="84" width="56" height="26" rx="4" fill="#e8f4ea"/><text x="800" y="102" text-anchor="middle" class="nodeT" fill="#236b3c">Tb</text>
  <line class="life" x1="600" y1="110" x2="600" y2="420"/>
  <line class="life" x1="800" y1="110" x2="800" y2="420"/>

  <text x="600" y="150" text-anchor="middle" class="cap" fill="#26577e">BEGIN — snapshot</text>
  <text x="600" y="164" text-anchor="middle" class="cap" fill="#26577e">(after txn 70, before 90)</text>
  <line class="ta" x1="596" y1="200" x2="294" y2="202" marker-end="url(#aTa)"/>
  <text x="430" y="194" text-anchor="middle" class="lbl" fill="#26577e">Ta reads → x = 150</text>

  <text x="800" y="250" text-anchor="middle" class="cap" fill="#236b3c">BEGIN — snapshot</text>
  <text x="800" y="264" text-anchor="middle" class="cap" fill="#236b3c">(after txn 90)</text>
  <line class="tb" x1="796" y1="292" x2="294" y2="292" marker-end="url(#aTb)"/>
  <text x="500" y="286" text-anchor="middle" class="lbl" fill="#236b3c">Tb reads → x = 200</text>

  <rect x="520" y="338" width="360" height="30" rx="6" fill="#eef6ef" stroke="#9ac3a4"/>
  <text x="700" y="358" text-anchor="middle" class="cap" fill="#236b3c">the writer's append never touches V2 — Ta is unaffected</text>

  <text x="480" y="448" text-anchor="middle" class="cap">Concurrent transactions read <tspan font-weight="bold">different consistent snapshots</tspan> of the same row.</text>
  <text x="480" y="468" text-anchor="middle" class="cap">Writers append new versions; readers keep their pinned version — <tspan font-weight="bold">readers never block writers</tspan>.</text>
</svg>
