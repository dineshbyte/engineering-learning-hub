<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 520" font-family="sans-serif">
  <defs>
    <marker id="aw2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c8761f"/></marker>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3b6fb0"/></marker>
    <style>
      .title{font-size:16px;font-weight:bold;fill:#111}
      .nodeT{font-size:13px;font-weight:bold;fill:#111}
      .node{fill:#eee;stroke:#333;stroke-width:1.5}
      .life{stroke:#9a9a9a;stroke-width:1.2;stroke-dasharray:3 3}
      .read{stroke:#3b6fb0;stroke-width:1.6;fill:none;stroke-dasharray:5 3}
      .write{stroke:#c8761f;stroke-width:1.8;fill:none}
      .lbl{font-size:12.5px;fill:#222}
      .cap{font-size:11.5px;fill:#555}
      .cell{fill:#f3eee2;stroke:#9a7b3b;stroke-width:1.5}
      .bad{font-size:13px;font-weight:bold;fill:#b00000}
    </style>
  </defs>
  <rect width="840" height="520" fill="#ffffff"/>
  <text x="420" y="28" text-anchor="middle" class="title">Lost update: two +1s collapse into one</text>

  <rect class="node" x="120" y="48" width="60" height="26" rx="4"/><text x="150" y="66" text-anchor="middle" class="nodeT">T1</text>
  <rect class="node" x="660" y="48" width="60" height="26" rx="4"/><text x="690" y="66" text-anchor="middle" class="nodeT">T2</text>
  <line class="life" x1="150" y1="74" x2="150" y2="470"/>
  <line class="life" x1="690" y1="74" x2="690" y2="470"/>

  <!-- shared counter cell, center -->
  <rect class="cell" x="378" y="92" width="84" height="34" rx="5"/><text x="420" y="114" text-anchor="middle" class="nodeT">counter</text>
  <text x="420" y="146" text-anchor="middle" class="cap">value: 10</text>

  <!-- T1 read -->
  <line class="read" x1="376" y1="110" x2="156" y2="150" marker-end="url(#ar2)"/>
  <text x="150" y="172" text-anchor="middle" class="lbl">read → 10</text>
  <text x="150" y="188" text-anchor="middle" class="cap">10 + 1 = 11</text>
  <!-- T2 read -->
  <line class="read" x1="464" y1="112" x2="684" y2="200" marker-end="url(#ar2)"/>
  <text x="690" y="222" text-anchor="middle" class="lbl">read → 10</text>
  <text x="690" y="238" text-anchor="middle" class="cap">10 + 1 = 11</text>
  <text x="420" y="200" text-anchor="middle" class="cap">both read the same 10</text>

  <!-- T1 write -->
  <line class="write" x1="156" y1="280" x2="376" y2="296" marker-end="url(#aw2)"/>
  <text x="150" y="276" text-anchor="middle" class="lbl">write 11 · commit</text>
  <text x="420" y="322" text-anchor="middle" class="cap">counter = 11</text>
  <!-- T2 write -->
  <line class="write" x1="684" y1="360" x2="464" y2="346" marker-end="url(#aw2)"/>
  <text x="690" y="356" text-anchor="middle" class="lbl">write 11 · commit</text>
  <text x="500" y="372" class="bad">← overwrites; T1's update lost</text>

  <rect x="300" y="410" width="240" height="44" rx="6" fill="#fbeaea" stroke="#b00000" stroke-width="1.6"/>
  <text x="420" y="430" text-anchor="middle" class="bad">final counter = 11</text>
  <text x="420" y="448" text-anchor="middle" class="cap">a correct serial run would give 12</text>
</svg>
